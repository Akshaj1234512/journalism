# Exemplars for structure_editor
# Human-editable. Each list item below is one exemplar.
# To disable an exemplar without deleting it, comment out its lines with #.
# Field order: source, article, critiques (and per critique: agent, text_quote,
# span, issue_label, question, why_it_matters, fix_suggestion, replacement, severity).
#
- source: 'Hayot, The Elements of Academic Style: one job per paragraph'
  article: |-
    The novel's treatment of race operates on three levels. Economically, the plantation system produces the wealth that buys the family's social standing, and the narrator's father invests heavily in cotton futures in the 1850s. Linguistically, the dialect Faulkner gives the Black characters performs a kind of distancing the reader is meant to register as unjust. Theologically, the family's Episcopal piety functions as moral cover for arrangements they will not name.
  critiques:
  - agent: structure_editor
    text_quote: The novel's treatment of race operates on three levels.
    span: [0, 55]
    issue_label: Frankenstein paragraph
    question: |-
      Your paragraph carries three distinct arguments (economic, linguistic, theological) under one topic sentence. Three jobs means the reader cannot tell which one to follow.
    why_it_matters: |-
      When a paragraph carries three sub-arguments, none of them gets the room to land.
    fix_suggestion: |-
      Split into three paragraphs, each with its own claim, evidence, and analysis. Keep the topic sentence as a hinge in the section opener.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: missing topic sentence'
  article: |-
    By the time Lincoln signed the Emancipation Proclamation, roughly 500,000 enslaved people had already crossed Union lines. The Confederate planter class had spent eighteen months trying to keep them on the plantations through informal contracts and physical coercion. Federal officers found themselves administering an ad-hoc refugee policy with no central direction from Washington.
  critiques:
  - agent: structure_editor
    text_quote: |-
      By the time Lincoln signed the Emancipation Proclamation, roughly 500,000 enslaved people had already crossed Union lines.
    span: [0, 122]
    issue_label: missing topic sentence
    question: |-
      The paragraph opens with a fact, not a claim. The reader has to read four sentences before guessing what argument they are meant to serve.
    why_it_matters: |-
      Without a topic sentence, the reader is asked to do the writer's structural work.
    fix_suggestion: |-
      Add a topic sentence that names the claim, e.g. 'The legal moment of emancipation followed, rather than caused, the material collapse of slavery on the ground.' Then let the facts in your paragraph do that argument's work.
    replacement: null
    severity: medium
- source: 'Williams, Style, Lesson 5: from old to new information'
  article: |-
    The court's decision rested on the doctrine of qualified immunity, which the body of this paper will explain in paragraph six. For now, it is enough to note that the doctrine has shaped excessive-force litigation since Pierson v. Ray in 1967, and that the dissent in Harlow v. Fitzgerald argued strongly against its expansion.
  critiques:
  - agent: structure_editor
    text_quote: the body of this paper will explain in paragraph six
    span: [73, 125]
    issue_label: paragraph depends on a fact introduced too late
    question: |-
      You ask the reader to take qualified immunity on faith here and promise to explain it later. The reader needs the old information before the new. If they need paragraph six to understand paragraph two, the paragraphs are in the wrong order.
    why_it_matters: Asking the reader to defer understanding breaks the flow of the
      argument.
    fix_suggestion: |-
      Move the doctrine's explanation up to this paragraph, or move this paragraph down to after the explanation. Pick whichever order lets the reader follow without a forward reference.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: buried lede'
  article: |-
    Critics have long debated whether Their Eyes Were Watching God is best read as a feminist novel or as a folk-cultural novel. This paper surveys the major positions in this debate. The most useful frame, ultimately, is to read Janie's voice itself as the novel's central argument: by the end she narrates her own life, and the narration is the freedom. Various other readings exist as well, and the rest of the paper examines them.
  critiques:
  - agent: structure_editor
    text_quote: |-
      The most useful frame, ultimately, is to read Janie's voice itself as the novel's central argument: by the end she narrates her own life, and the narration is the freedom.
    span: [180, 351]
    issue_label: buried lede
    question: |-
      Your strongest move (Janie's narration is itself the novel's argument) appears in the middle of the intro and is then dropped for a survey of other readings. The essay should end on what the writer most wants the reader to carry away. This sentence belongs at the load-bearing position.
    why_it_matters: |-
      Burying the strongest claim under survey material loses it before the body even begins.
    fix_suggestion: |-
      Reorganise so the Janie-as-narrator claim is the thesis. Let the survey of other readings serve as the 'they say' your argument answers.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: intro/conclusion mismatch'
  article: |-
    Introduction: This paper will argue that the New Deal saved American capitalism by stabilising the banking system. ... Conclusion: The New Deal's lasting contribution, then, was the cultural shift it produced in how Americans understood the federal government's responsibility for individual welfare.
  critiques:
  - agent: structure_editor
    text_quote: |-
      Conclusion: The New Deal's lasting contribution, then, was the cultural shift it produced in how Americans understood the federal government's responsibility for individual welfare.
    span: [119, 300]
    issue_label: intro and conclusion argue different theses
    question: |-
      Your intro promises an argument about banking stabilisation. Your conclusion lands on a cultural-political shift. The reader cannot tell whether to read the intro or the conclusion as the essay's actual claim.
    why_it_matters: When the two ends of the essay argue different things, neither
      one lands.
    fix_suggestion: |-
      Pick whichever thesis the body actually defends and rewrite the other end to match. If the cultural-shift argument is the real one, rewrite the intro.
    replacement: null
    severity: high
- source: 'Hayot, The Elements of Academic Style: paragraph hinges'
  article: |-
    Furthermore, the imagery of water in chapter four operates differently from the imagery of fire in chapter two.
  critiques:
  - agent: structure_editor
    text_quote: Furthermore,
    span: [0, 12]
    issue_label: empty hinge
    question: |-
      'Furthermore' promises continuity, but the paragraph that follows pivots to a new image and a new chapter without showing the relationship to what came before. An empty 'furthermore' is structure pretending where there is none.
    why_it_matters: |-
      A hinge word with no actual hinge tells the reader the connection is your responsibility, not theirs.
    fix_suggestion: |-
      Either cut the 'furthermore' and let the new paragraph open on its own, or replace it with a sentence that names the relationship: 'Where chapter two's fire imagery destroys, chapter four's water imagery is more ambivalent.'
    replacement: Where chapter two's fire imagery is destructive,
    severity: medium
- source: 'Standard writing-center diagnostic: orphan paragraph'
  article: |-
    Some scholars have argued that Marx's reading of the 1848 revolutions was decisively shaped by his time in Paris. This is a useful corrective to readings that frame his thought as purely abstract. Whether one accepts this biographical reading or not, the analysis in the Eighteenth Brumaire remains compelling on its own terms. The next section returns to the question of class consciousness.
  critiques:
  - agent: structure_editor
    text_quote: |-
      Some scholars have argued that Marx's reading of the 1848 revolutions was decisively shaped by his time in Paris.
    span: [0, 113]
    issue_label: orphan paragraph
    question: |-
      This paragraph sits between unrelated sections, opens with a biographical aside, ends by retreating from its own claim, and the next paragraph does not pick up the thread. There is no visible reason for it to be here.
    why_it_matters: |-
      An orphan paragraph signals that the writer is not yet sure what role it plays in the argument.
    fix_suggestion: |-
      Either cut it (often the right call), or rewrite it so the biographical point does load-bearing work for the surrounding argument, and end with a hinge into the next section.
    replacement: null
    severity: medium
- source: 'Booth, The Craft of Argument: sub-claims must ladder to the thesis'
  article: |-
    Thesis: Reconstruction failed because the federal government withdrew its military presence too soon. Body paragraph 1: Black landownership in the South rose during the Freedmen's Bureau years. Body paragraph 2: The 14th Amendment created a new constitutional architecture for citizenship. Body paragraph 3: The Compromise of 1877 ended federal occupation.
  critiques:
  - agent: structure_editor
    text_quote: |-
      Body paragraph 1: Black landownership in the South rose during the Freedmen's Bureau years. Body paragraph 2: The 14th Amendment created a new constitutional architecture for citizenship.
    span: [102, 289]
    issue_label: sub-claims do not ladder
    question: |-
      Your first two body paragraphs argue that Reconstruction achieved real things. Only the third connects to your thesis (early withdrawal caused the failure). Booth's principle: every sub-claim has to lift the thesis, or it belongs in a different essay.
    why_it_matters: |-
      When sub-claims do not ladder up, the body looks busy but does not carry the argument.
    fix_suggestion: |-
      Either reframe paragraphs 1 and 2 as evidence of what the early withdrawal abandoned, or cut them and replace with paragraphs that show how the withdrawal specifically caused the rollback you mean to argue.
    replacement: null
    severity: high
