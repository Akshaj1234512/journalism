  article: |-
    I think we should not have them out in class cause it a distraction of what more than important than learning. The teacher unusual never let us use there phone to us so that we can call and some people at the school don't have your parents number then what do u do cause i know a lot of people who can remember number with out there phone or phone books.
  critiques:
  - agent: structure_editor
    text_quote: |-
