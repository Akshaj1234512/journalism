# Exemplars for structure_editor
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'AES2 (score 2/6): conclusion restates opening, no synthesis'
  article: |-
    Cars are used on a daily basis. But if we ease off the gas and start hitting the breaks on the use of cars in modern day, would it make America a happier place?
  critiques:
  - agent: structure_editor
    text_quote: |-
      Cars are used on a daily basis. But if we ease off the gas and start hitting the breaks on the use of cars in modern day, would it make America a happier place?
    span:
    - 0
    - 160
    issue_label: conclusion restates opening, no synthesis
    question: |-
      Your closing paragraph repeats your opening question almost word-for-word. Where's your final claim? You've given three examples of car-free or car-reduced communities—what do those examples prove? Do you actually think America *should* limit cars, or not?
    why_it_matters: |-
      The essay ends without a landing, leaving the reader uncertain whether you've made an argument or just asked a question twice.
    fix_suggestion: |-
      Replace with a conclusive statement: 'The evidence from Bogota, Vauban, and France shows that car-reduced communities report real benefits in air quality and happiness. America should adopt similar policies, starting with car-free zones in major cities.'
    replacement: null
    severity: high
- source: 'AES2 (score 4/6): weak conclusion, just restates thesis'
  article: |-
    The driverless car is a fantastic idea and invention to have. The world needs more cars like them so that the world could be a better and more safe place to drive. Having a driverless car that can use less gas, have better response and control,and notify the driver in case of an emergency is a great car to have. The world could do a lot by having it.
  critiques:
  - agent: structure_editor
    text_quote: |-
      The driverless car is a fantastic idea and invention to have. The world needs more cars like them so that the world could be a better and more safe place to drive. Having a driverless car that can use less gas, have better response and control,and notify the driver in case of an emergency is a great car to have. The world could do a lot by having it.
    span:
    - 0
    - 352
    issue_label: weak conclusion, just restates thesis
    question: |-
      Your conclusion repeats your opening claim almost word-for-word ('fantastic idea,' 'great car,' 'help the world') but doesn't deepen or synthesize the argument. What's the *consequence* of adopting driverless cars? Why should readers care beyond 'it's a good idea'?
    why_it_matters: |-
      A conclusion that just restates leaves the reader feeling like the essay went nowhere—you're back where you started, not moving forward.
    fix_suggestion: |-
      End with a forward-looking claim: 'As traffic accidents and emissions remain leading causes of death and environmental harm, driverless cars represent a concrete step toward safer, cleaner cities—but only if we design them with human oversight built in.'
    replacement: null
    severity: medium
