- source: 'ASAP-7 (score 18/30): fragment, disconnected transition'
  article: A few weeks later. I got a little better every day. Her name was @PERSON4.
  critiques:
  - agent: structure_editor
    text_quote: A few weeks later. I got a little better every day. Her name was @PERSON4.
    span:
    - 0
    - 74
    issue_label: fragment, disconnected transition
    question: |-
      Why introduce the tutor here, in the middle of the story? 'A few weeks later' as a fragment is abrupt, and you don't explain how the tutor came into the picture. Did you ask for help? Was it assigned? The reader is missing the bridge between failure and improvement.
    why_it_matters: |-
      The turning point in your patience story is unclear, so the narrative feels like it jumps around rather than building toward insight.
    fix_suggestion: |-
      Connect the events: 'The next week, my teacher offered me tutoring. Her name was @PERSON4, and she was patient and kind. She helped me study a little each day, and slowly I improved.'
    replacement: null
    severity: medium
