    Every relationship whether its intimate, family, or just friendship needs laughter; or else the tough things in life will bring you down. Laughing is what keeps you bold, and strong. If something embarrassing happens and you don't laugh about it that embarrassing moment can stick with you forever, and it will effect you in the long run. If you were to never laugh in a relationship, then it wouldn't be a relationship at all. That's why laughing is very important in everybody's lives.
