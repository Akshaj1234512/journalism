    niemanstoryboard.org — when-writing-news-requires-a-distance-from-neutrality-to-tell-it-like-it-is: Non-neutral language deployed responsibly via causation
  article: |-
    The word 'incendiary' is not neutral, but among reasonable people an expression of cause and effect... The word 'riot' is not used here, but its ghost is lurking behind the word 'incited.'
  critiques:
  - agent: partisan
    text_quote: |-
      The word 'incendiary' is not neutral, but among reasonable people an expression of cause and effect... The word 'riot' is not used here, but its ghost is lurking behind the word 'incited.'
    span:
    - 0
    - 188
    issue_label: Non-neutral language deployed responsibly via causation
    question: |-
      Words like 'incendiary' and 'incited' push beyond traditional neutrality, but Clark argues they work because they express demonstrable cause-and-effect relationships rather than mere opinion or loaded adjectives.
    why_it_matters: |-
      Using engaged language to describe causation (rather than inserting opinion) maintains credibility while abandoning the false pretense that the president's words and the mob's violence were unconnected.
    fix_suggestion: |-
      When pushing past neutrality, ground your language in observable causation or fact rather than judgment—'incendiary' works because the president's actual words were documented; a synonym like 'inflammatory' alone would be thinner.
