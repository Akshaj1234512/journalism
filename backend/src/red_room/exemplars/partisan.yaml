    PolitiFact fact-check (ruling: half-true): smear-by-association / loaded causal framing
  article: |-
    when it was revealed that this company had destroyed swabs shortly after Trump's visit, many people laid the blame on the president's refusal to wear a mask during the visit
  critiques:
  - agent: partisan
    text_quote: |-
      when it was revealed that this company had destroyed swabs shortly after Trump's visit, many people laid the blame on the president's refusal to wear a mask during the visit
    span:
    - 0
    - 173
    issue_label: smear-by-association / loaded causal framing
    question: |-
      Framing the destruction as Trump's fault—via mask-refusal—is a smear without evidence. The company pre-planned the demo-batch destruction. Why present a partisan social-media narrative as the news hook instead of Puritan's actual explanation?
    why_it_matters: |-
      Leading with an unsubstantiated blame-frame primes readers to hold Trump responsible for a decision he didn't make, corrupting the factual record.
    fix_suggestion: |-
      Lead with the company's own statement: Puritan planned to limit production during the visit due to crowding. Report the social-media blame as a later, debunked claim, not the primary narrative.
    replacement: null
    severity: high
