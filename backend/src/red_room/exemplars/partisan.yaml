    niemanstoryboard.org — how-narrative-moments-can-elevate-a-non-narrative-story: reader perception of bias despite balanced reporting
  article: |-
    Two parallel stories on renewable energy development—one where a wheat farmer welcomes wind turbines for income, another where a retiring couple rejects solar panels to preserve their view—both using equally compelling narrative ledes, yet readers accused Bernton of bias in favor of the wind farmer.
  critiques:
  - agent: partisan
    text_quote: |-
      Two parallel stories on renewable energy development—one where a wheat farmer welcomes wind turbines for income, another where a retiring couple rejects solar panels to preserve their view—both using equally compelling narrative ledes, yet readers accused Bernton of bias in favor of the wind farmer.
    span:
    - 0
    - 300
    issue_label: reader perception of bias despite balanced reporting
    question: |-
      He said he consciously chose ledes for each that would capture the equally sincere but polar opposite views of this complex debate. 'But,' he told me, 'a lot of readers don't see it see it that way.' Instead, the readers he heard from zeroed in on those ledes—in most cases, according to Bernton, the one about the wheat farmer who welcomes wind turbines—as a sign of the reporter's bias.
    why_it_matters: |-
      Readers interpret framing and narrative emphasis through their own values; balanced reporting and equivalent craft do not guarantee balanced perception, especially on polarized issues.
    fix_suggestion: |-
      Be aware that strong narrative ledes, no matter how fair, may be read as endorsements; consider pre-emptively explaining your editorial choices and the logic behind how you structured opposing perspectives.
