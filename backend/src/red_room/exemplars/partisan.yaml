    slate.com — al-gore-washed-up-politician-finds-a-new-venue-for-his-ideas-press-criticism.htm: undisclosed conflict of interest in criticism
  article: |-
    If you're going to be a press critic and a press mogul simultaneously, you should probably mention this in your press criticism. Gore, chairman of the lefty-liberal news channel Current, doesn't mention this fact in the body of his Rolling Stone piece.
  critiques:
  - agent: partisan
    text_quote: |-
      If you're going to be a press critic and a press mogul simultaneously, you should probably mention this in your press criticism. Gore, chairman of the lefty-liberal news channel Current, doesn't mention this fact in the body of his Rolling Stone piece.
    span:
    - 0
    - 252
    issue_label: undisclosed conflict of interest in criticism
    question: |-
      Gore criticizes Fox News and media ideologues while helming his own ideological news channel with ideological journalists like Keith Olbermann. How can he credibly denounce ideologues for being ideologues when he's simultaneously an ideologue running an ideological news operation?
    why_it_matters: |-
      A press critic who also owns a news outlet has an obvious conflict of interest that shapes their credibility; failing to acknowledge it undermines the entire piece.
    fix_suggestion: |-
      Disclose your own media interests and explain why they don't bias your criticism, or revise your criticism to acknowledge that you're offering an ideological perspective, not a neutral one.
