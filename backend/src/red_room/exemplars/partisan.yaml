    slate.com — al-gore-washed-up-politician-finds-a-new-venue-for-his-ideas-press-criticism.htm: sweeping accusations without specific evidence
  article: |-
    Gore's criticism is hopelessly vague. He blames the press for covering global warming like a professional wrestling referee—working from a script to boost viewership—but then gives no examples. He bitches about 'extremist ideologues' but names none. He denounces 'large carbon polluters' who finance 'pseudoscientists' but doesn't name either.
  critiques:
  - agent: partisan
    text_quote: |-
      Gore's criticism is hopelessly vague. He blames the press for covering global warming like a professional wrestling referee—working from a script to boost viewership—but then gives no examples. He bitches about 'extremist ideologues' but names none. He denounces 'large carbon polluters' who finance 'pseudoscientists' but doesn't name either.
    span:
    - 0
    - 343
    issue_label: sweeping accusations without specific evidence
    question: |-
      If you're going to criticize the press, you need to name names and provide examples. Gore's broadside against media coverage lacks the specificity that makes press criticism credible—he makes grand claims about the press corps' behavior but never shows his work.
    why_it_matters: |-
      Vague accusations undermine credibility and allow readers to dismiss criticism as partisan ranting rather than documented analysis.
    fix_suggestion: |-
      Always anchor media criticism in named outlets, named journalists, and quoted passages from actual coverage. Make the wrongdoing visible, not just asserted.
    replacement: null
    severity: high
