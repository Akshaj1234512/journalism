# Exemplars for partisan
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the partisan lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    niemanstoryboard.org — 14-hours-from-event-to-post-delivering-narrative-with-context-on-deadline: deliberate structural counterweight to rally crowd
  article: |-
    Kruse spent time in Greenville before the rally, and devotes considerable story space the voices of locals, including members of the Latino community, who expressed fears for the future of America... Why did you spend so much time focusing on Latino members of the Greenville community? Contrast. Which is to say tension.
  critiques:
  - agent: partisan
    text_quote: |-
      Kruse spent time in Greenville before the rally, and devotes considerable story space the voices of locals, including members of the Latino community, who expressed fears for the future of America... Why did you spend so much time focusing on Latino members of the Greenville community? Contrast. Which is to say tension.
    span:
    - 0
    - 321
    issue_label: deliberate structural counterweight to rally crowd
    question: |-
      Kruse deliberately built the story around contrast—not just covering Trump supporters in the rally, but also the community members who feared the rhetoric. How does this structural choice prevent the piece from becoming a mere megaphone for the rally's energy?
    why_it_matters: |-
      It establishes competing narratives and emotional stakes, ensuring the story doesn't default to simply amplifying the dominant voice in the room.
    fix_suggestion: |-
      On deadline, identify the absent or silenced voices in your scene, then actively report them out. Build structure around tension between competing realities, not just the loudest event.
    replacement: null
    severity: high
