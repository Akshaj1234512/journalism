    slate.com — les-hinton-and-rebekah-brooks-are-gone-will-rupert-murdoch-now-sacrifice-his-own: loaded adjectives and mind-reading
  article: |-
    Don't feel bad for Rupert Murdoch. He's having a splendid time with the phone-hacking scandal... He was gauging how best to sacrifice Brooks to satisfy the mobs threatening his beloved News Corp.
  critiques:
  - agent: partisan
    text_quote: |-
      Don't feel bad for Rupert Murdoch. He's having a splendid time with the phone-hacking scandal... He was gauging how best to sacrifice Brooks to satisfy the mobs threatening his beloved News Corp.
    span:
    - 0
    - 195
    issue_label: loaded adjectives and mind-reading
    question: |-
      The piece opens by asserting Murdoch's emotional state and motivations with certainty ('having a splendid time,' 'gauging how best to sacrifice') rather than reporting what Murdoch actually said or did. How can we know what Murdoch was thinking when he said Brooks was his 'top priority' five days before firing her?
    why_it_matters: |-
      These attributions of private motive without evidence undermine the credibility of the analysis and cross from commentary into speculation presented as fact.
    fix_suggestion: |-
      Ground claims about motivation in what sources actually said, or explicitly frame them as the writer's interpretation: 'The timing suggests Murdoch may have been...' or 'Critics argue he was...'
