    niemanstoryboard.org — the-crucial-challenge-of-precision-as-descriptors-evolve-the-press-must-too: respecting self-identification over imposed labels
  article: |-
    The language that people use to describe themselves continues to evolve and change, and some fields catch up faster than others... For many people, the labels they use for their gender identity or sexual orientation has no synonym, in part because they want to be in control of how they are described.
  critiques:
  - agent: partisan
    text_quote: |-
      The language that people use to describe themselves continues to evolve and change, and some fields catch up faster than others... For many people, the labels they use for their gender identity or sexual orientation has no synonym, in part because they want to be in control of how they are described.
    span:
    - 0
    - 301
    issue_label: respecting self-identification over imposed labels
    question: |-
      For many people, the labels they use for their gender identity or sexual orientation has no synonym, in part because they want to be in control of how they are described. What people used to describe as 'gay rights' is now described as 'LGBTQ rights' or 'LGBTQ+ rights.'
    why_it_matters: |-
      Using a person's chosen descriptor rather than an outdated or clinical one honors their agency and reflects the actual scope of their identity; choosing the wrong term effectively misrepresents who they are.
    fix_suggestion: |-
      In reporting on or describing LGBTQ+ individuals and movements, ask sources how they describe themselves and their communities, and use that language; treat descriptor choice as a factual accuracy question, not a style preference.
