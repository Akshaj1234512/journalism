    niemanstoryboard.org — who-how-and-why-an-interview-with-the-super-bowl-streaker: legitimate editorial pushback explicitly addressed
  article: |-
    Before I even started trying to get a hold of these guys, I raised that very point: Do we want to give publicity-seekers more publicity? ... So many outlets had recounted the streaking at the stadium, and reported this guy's arrest, but we still had questions.
  critiques:
  - agent: partisan
    text_quote: |-
      Before I even started trying to get a hold of these guys, I raised that very point: Do we want to give publicity-seekers more publicity? ... So many outlets had recounted the streaking at the stadium, and reported this guy's arrest, but we still had questions.
    span:
    - 0
    - 260
    issue_label: legitimate editorial pushback explicitly addressed
    question: |-
      A sportswriter at the Times vehemently disagreed with doing the story at all, thinking that it would encourage this type of behavior. But we had published three stories online in the aftermath and clearly there was an appetite for follow-ups. Also, we considered the severity of his crime: No one got hurt, no one was naked, the game was only delayed for a few minutes.
    why_it_matters: |-
      Naming internal disagreement and then articulating the reasoning for the editorial choice (audience interest, proportional harm assessment) makes the decision-making transparent rather than appearing dismissive of legitimate ethical concerns.
    fix_suggestion: |-
      When you know a story choice will face criticism, document your reasoning upfront—address the strongest version of the objection, not a strawman—and explain what public interest outweighs the concern.
