    issue_label: loaded opening adjectives without immediate source
    question: |-
      The critic is writing opinion-column style, but does he establish 'lie' and 'break promises' with reported evidence right away, or does he assume readers will accept the characterization based on reputation? The opening stacks moral judgments before anchoring them.
    why_it_matters: |-
      Setting up a column with unsourced character judgments can feel like begging the question rather than building the case—readers may not know which claims are documented fact versus author opinion.
