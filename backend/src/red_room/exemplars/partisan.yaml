    PolitiFact fact-check (ruling: false): false claim amplified by conspiracy-theory ecosystem
  article: |-
    Hastings was not arrested by the FBI, and the accusations circulating on social media that the Netflix CEO was involved in child pornography are baseless and largely driven by pedophilia panic that consumed portions of the internet in 2020.
  critiques:
  - agent: partisan
    text_quote: |-
      Hastings was not arrested by the FBI, and the accusations circulating on social media that the Netflix CEO was involved in child pornography are baseless and largely driven by pedophilia panic that consumed portions of the internet in 2020.
    span:
    - 0
    - 240
    issue_label: false claim amplified by conspiracy-theory ecosystem
    question: |-
      How many times was this hoax republished or shared by outlets or social accounts, and did they fact-check it before amplifying it? The fact-checker notes this panic 'consumed portions of the internet' and was 'amplified by the growing QAnon conspiracy movement'—but who in mainstream media gave it oxygen?
    why_it_matters: |-
      Even well-intentioned outlets can amplify fringe conspiracy theories if they report on them without clearly labeling them as debunked or unverified from the start.
    fix_suggestion: |-
      When reporting on a viral claim you believe is false, lead with 'This is unsubstantiated' or 'No evidence supports this,' and explain why it spread, rather than treating it as plausible news.
    replacement: null
    severity: medium
- source: 'PolitiFact fact-check (ruling: half-true): Loaded framing, smear-by-association'
  article: |-
    A Florida mother took her high-risk teenage daughter to a 'COVID party' at their church, tried treating the girl at home with unproven drugs when she got sick — and then hailed her as a patriot after she died.
  critiques:
  - agent: partisan
    text_quote: |-
      A Florida mother took her high-risk teenage daughter to a 'COVID party' at their church, tried treating the girl at home with unproven drugs when she got sick — and then hailed her as a patriot after she died.
    span:
    - 0
    - 209
    issue_label: Loaded framing, smear-by-association
    question: |-
      Raw Story's opening packs 'conspiracy theorist mom,' 'COVID party,' 'unproven drugs,' and 'patriot' into one synoptic condemnation. But the medical examiner confirms the parents were a nurse and a physician's assistant, and the 'unproven' drugs (azithromycin, hydroxychloroquine) were at least medically supervised attempts. Isn't this framing more prosecutorial than factual?
    why_it_matters: |-
      Readers see the parents as reckless ideologues, not frightened medical professionals trying to save their daughter's life during an emergency.
    fix_suggestion: |-
      Separate the facts: parents are a nurse and PA; they tried azithromycin early (potentially prophylactic); they declined intubation (a real clinical decision); they pursued convalescent plasma and ECMO. Save editorial judgment for analysis, not the opening.
    replacement: null
    severity: medium
