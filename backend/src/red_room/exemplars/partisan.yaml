    span:
    - 0
    - 244
    issue_label: asymmetric dismissal of critics as biased competitors
    question: |-
      The Schadenfreude is so thick you can't cut it with a chainsaw. Especially redolent are lectures about journalistic standards from publications that give Julian Assange and WikiLeaks their moral imprimatur. Does attacking the messenger rather than engaging the substance of criticism serve the editorial's argument?
    why_it_matters: |-
      Deflecting criticism by impugning competitors' motives avoids addressing the actual allegations, a rhetorical move that substitutes ad hominem for substantive rebuttal.
    fix_suggestion: |-
      When your publication is under scrutiny, distinguish between legitimate criticism and competitor bias—but only after seriously engaging with the facts critics are raising.
