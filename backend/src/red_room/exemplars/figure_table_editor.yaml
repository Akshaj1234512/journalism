    NeurIPS.cc/2023/Conference OpenReview review (rating 8/10, confidence 4/5): Missing discussion and baseline comparison for multi-transform robustness
  article: |-
    Figure 7 in appendix: robustness under multiple simultaneous transformations appears low (TPR@1%FPR drops below 10% even with two transformations).
  critiques:
  - agent: figure_table_editor
    text_quote: |-
      Figure 7 in appendix: robustness under multiple simultaneous transformations appears low (TPR@1%FPR drops below 10% even with two transformations).
    span:
    - 0
    - 147
    issue_label: Missing discussion and baseline comparison for multi-transform robustness
    question: |-
      Figure 7 shows concerning robustness degradation under multiple simultaneous transformations, but lacks discussion of which transformation combinations are particularly effective or why. Additionally, Figure 7 results are not shown for baseline watermarks in the appendix — this comparison would be instructive.
    why_it_matters: |-
      Without discussion of failure modes and baseline comparisons, it is unclear whether the proposed method's robustness under multi-transform attack is actually stronger than existing approaches.
    fix_suggestion: |-
      Add analysis of which transformation combinations most effectively break the watermark while maintaining image quality, and include analogous Figure 7 variants for baseline methods.
    replacement: null
    severity: medium
