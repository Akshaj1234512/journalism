    ICLR.cc/2024/Conference OpenReview review (rating 8/10, confidence 4/5): inconsistency between Figure 4 and Table 2 results
  article: |-
    Figure 4 shows qualitative rollouts from the proposed method and RT-2-X which seem to indicate that RT-2-X manipulates objects with less precision. However, quantitative results in Table 2 show that RT-2-X outperforms the introduced method in certain tasks.
  critiques:
  - agent: figure_table_editor
    text_quote: |-
      Figure 4 shows qualitative rollouts from the proposed method and RT-2-X which seem to indicate that RT-2-X manipulates objects with less precision. However, quantitative results in Table 2 show that RT-2-X outperforms the introduced method in certain tasks.
    span:
    - 0
    - 257
    issue_label: inconsistency between Figure 4 and Table 2 results
    question: |-
      How are findings from Figure 4 generalizable? It shows qualitative rollouts from the proposed method and RT-2-X which seem to indicate that RT-2-X manipulates objects with less precision. However, quantitative results in Table 2 show that RT-2-X outperforms the introduced method in certain tasks, showing it might be more precise in some cases.
    why_it_matters: |-
      The qualitative narrative in Figure 4 contradicts the quantitative comparison in Table 2, undermining reader confidence in the method's relative performance claims.
    fix_suggestion: |-
      Either provide quantitative metrics for the Figure 4 rollouts to explain the discrepancy, or clarify which tasks and metrics are being compared in Figure 4 vs Table 2.
    replacement: null
    severity: medium
