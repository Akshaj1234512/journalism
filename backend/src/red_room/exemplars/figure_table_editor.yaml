# Exemplars for figure_table_editor
# Pulled from real OpenReview reviews on ICLR 2024 / ICLR 2025 /
# NeurIPS 2023 (filtered to confidence>=4 reviewers, weaknesses
# field 200-2500 words, must reference a specific anchor like
# Table/Fig/Section/Eq number). Classified by lane via Claude Haiku;
# top 15 selected with a diversity constraint (round-robin
# across distinct sub-issue buckets) so the exemplars cover the lane's
# full failure-mode range rather than 15 variants of the
# same critique.
#
- source: |-
    NeurIPS.cc/2023/Conference OpenReview review (rating 6/10, confidence 5/5): cherry-picked qualitative example
  article: Figure 4 shows one sampled trajectory for each approach
  critiques:
  - agent: figure_table_editor
    text_quote: Figure 4 shows one sampled trajectory for each approach
    span:
    - 0
    - 55
    issue_label: cherry-picked qualitative example
    question: |-
      Figure 4: choosing one sampled trajectory for each approach is likely cherry-picking, I would suggest rendering N samples.
    why_it_matters: |-
      A single trajectory example does not demonstrate that good samples are typical rather than outliers.
    fix_suggestion: |-
      Render multiple sampled trajectories from each approach to show the distribution of quality.
    replacement: null
    severity: medium
- source: |-
    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): missing interpretation guidance in uncertainty plots
  article: Figure 3
  critiques:
  - agent: figure_table_editor
    text_quote: Figure 3
    span:
    - 0
    - 8
    issue_label: missing interpretation guidance in uncertainty plots
    question: |-
      In Figure 3, I believe the paper has to say how to interpret these plots, that in the OOD setting ideally aleatoric uncertainty should be low and epistemic uncertainty should be high, while the in-distribution setting it is the opposite (epistemic low and aleatoric variable depending on samples).
    why_it_matters: |-
      Without explicit guidance on the expected uncertainty signature for in-distribution vs. OOD samples, readers cannot evaluate whether the results support the paper's claims.
    fix_suggestion: |-
      Add a caption or text explaining the ideal behavior: in OOD, epistemic high and aleatoric low; in-distribution, epistemic low and aleatoric variable.
    replacement: null
    severity: medium
- source: |-
    NeurIPS.cc/2023/Conference OpenReview review (rating 6/10, confidence 5/5): Inconsistent table formatting and unclear figure labeling
  article: Tables stating certain scores are bold or underlined; Figure 1
  critiques:
  - agent: figure_table_editor
    text_quote: Tables stating certain scores are bold or underlined; Figure 1
    span:
    - 0
    - 62
    issue_label: Inconsistent table formatting and unclear figure labeling
    question: |-
      Many tables promise bold or underlined formatting in captions but the actual tables lack consistent emphasis, and Figure 1 lacks clear labels for gate locations. Are the formatting descriptions accurate, and is Figure 1 sufficiently annotated?
    why_it_matters: |-
      Inconsistent or missing formatting makes it hard for readers to quickly identify key results, and unlabeled figure components reduce clarity of the method presentation.
    fix_suggestion: |-
      Ensure table captions match actual formatting in tables, and add clear labels to Figure 1 indicating which gates are located where.
    replacement: null
    severity: medium
