    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): confusing visualization and analysis of perturbation breakdown
  article: |-
    Figure 1-b and related text in Section 6.1 analyze the effect of perturbation rate on delete/add operations across label/attribute combinations
  critiques:
  - agent: figure_table_editor
    text_quote: |-
      Figure 1-b and related text in Section 6.1 analyze the effect of perturbation rate on delete/add operations across label/attribute combinations
    span:
    - 0
    - 143
    issue_label: confusing visualization and analysis of perturbation breakdown
    question: |-
      Confusing analysis on the effect of the perturbation rate. I understand that the authors attempt to show insights on the adversarial graph. However, it is hard to digest the operation (delete or add) on the same/different label/attribute. The discussion in Figure 1-b is also confusing. I suppose that detailed explanations of what exactly happened on each bar will make a more clear discussion. Authors are suggested to revise the paragraphs related to figures 1 and 2.
    why_it_matters: |-
      Unclear figure captions and analysis undermine reader comprehension of the method's behavior across different perturbation rates.
    fix_suggestion: |-
      Add detailed legends and extended captions to Figures 1 and 2 explaining each bar (e.g., 'delete within same label', 'add across different attributes'); revise the surrounding text with concrete examples.
    replacement: null
    severity: medium
