    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): missing interpretation guidance in uncertainty plots
  article: Figure 3
  critiques:
  - agent: figure_table_editor
    text_quote: Figure 3
    span:
    - 0
    - 8
    issue_label: missing interpretation guidance in uncertainty plots
    question: |-
      In Figure 3, I believe the paper has to say how to interpret these plots, that in the OOD setting ideally aleatoric uncertainty should be low and epistemic uncertainty should be high, while the in-distribution setting it is the opposite (epistemic low and aleatoric variable depending on samples).
    why_it_matters: |-
      Without explicit guidance on the expected uncertainty signature for in-distribution vs. OOD samples, readers cannot evaluate whether the results support the paper's claims.
    fix_suggestion: |-
      Add a caption or text explaining the ideal behavior: in OOD, epistemic high and aleatoric low; in-distribution, epistemic low and aleatoric variable.
    replacement: null
    severity: medium
