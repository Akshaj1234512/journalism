- source: 'GRE_Argument (score 3/6): Assumption spotted, not analyzed'
  article: |-
    Surveys are created to speak for the people; however, surveys do not always speak for the whole community. A survey completed by Mason City residents concluded that the residents enjoy water sports as a form of recreation.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      Surveys are created to speak for the people; however, surveys do not always speak for the whole community. A survey completed by Mason City residents concluded that the residents enjoy water sports as a form of recreation.
    span:
    - 0
    - 222
    issue_label: Assumption spotted, not analyzed
    question: |-
      You identify that the survey might not represent the whole community—good instinct. But then what? How could this flaw actually undermine the city's argument? What would need to be true about the survey's design or sample for it to fail?
    why_it_matters: |-
      Spotting a logical gap only matters if you explain how and why it breaks the argument.
    fix_suggestion: |-
      After naming the assumption, add: 'If the survey only polled residents who already use the river, it would overrepresent people interested in water sports, making the city's proposal rest on skewed data rather than genuine community preference.'
    replacement: null
    severity: high
- source: 'GRE_Argument (score 3/6): Tangent introducing new assumptions'
  article: |-
    If the budget is changed to accomodate the clean up of the Mason River, other problems will arise. The residents will then begin to complain about other issues in their city that will be ignored because of the great emphasis being placed on Mason River.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      If the budget is changed to accomodate the clean up of the Mason River, other problems will arise. The residents will then begin to complain about other issues in their city that will be ignored because of the great emphasis being placed on Mason River.
    span:
    - 0
    - 253
    issue_label: Tangent introducing new assumptions
    question: |-
      Whose argument are you analyzing here—the city's, or are you now making your own prediction about resident complaints? This doesn't examine the original argument's unstated assumptions; it adds new ones that aren't your job to defend.
    why_it_matters: |-
      An analysis of an argument's flaws should stay tethered to what the argument actually claims and assumes, not drift into speculation about side effects.
    fix_suggestion: |-
      Delete or redirect. If you want to use budget trade-offs, connect it to the argument's actual assumption: 'The proposal assumes the city can afford both cleanup and new recreational facilities without naming what gets cut.'
    replacement: null
    severity: high
- source: 'GRE_Argument (score 3/6): Substituting analysis for assertion'
  article: |-
    The real issue is not the residents use of the river, but their desire for a more pleasant smell and a more pleasant sight.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      The real issue is not the residents use of the river, but their desire for a more pleasant smell and a more pleasant sight.
    span:
    - 0
    - 123
    issue_label: Substituting analysis for assertion
    question: |-
      How do you know this is the real issue? You're replacing one reading of the evidence with another without showing why the argument's logic breaks under this reframing. What's your evidence?
    why_it_matters: |-
      Rhetorical analysis shows *how* an argument fails, not just offer a competing claim.
    fix_suggestion: |-
      Reframe as assumption-hunting: 'The argument assumes residents want recreational facilities because of the survey result, but it never addresses whether the river's current state (smell, appearance) would even permit safe recreation—a prior assumption it doesn't justify.'
    replacement: null
    severity: medium
- source: 'GRE_Issue (score 4/6): Device-spotting without effect-analysis'
  article: |-
    When we get up there's instant coffee and the microwave and all these great things that help us get ready for our day. But we aren't allowing our minds to deteriorate by using them, we are only making things easier for ourselves and saving time for other important things in our days.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      When we get up there's instant coffee and the microwave and all these great things that help us get ready for our day. But we aren't allowing our minds to deteriorate by using them, we are only making things easier for ourselves and saving time for other important things in our days.
    span:
    - 0
    - 284
    issue_label: Device-spotting without effect-analysis
    question: |-
      You've listed examples (coffee, microwave, cars), but why do these matter rhetorically? What's the logical connection between 'easier' and 'minds not deteriorating'? You're asserting, not arguing.
    why_it_matters: |-
      Naming technologies doesn't persuade; you need to show *how* they preserve cognitive capacity or *why* that matters to your audience's concerns about human potential.
    fix_suggestion: |-
      Pick one technology and trace its actual cognitive demand: e.g., 'The microwave frees time for learning tasks that require deeper thinking—not mindless convenience, but cognitive redistribution.'
    replacement: null
    severity: high
