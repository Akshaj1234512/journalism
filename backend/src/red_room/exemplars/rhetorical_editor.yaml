# Exemplars for rhetorical_editor
# Human-editable. Each list item below is one exemplar.
# To disable an exemplar without deleting it, comment out its lines with #.
# Field order: source, article, critiques (and per critique: agent, text_quote,
# span, issue_label, question, why_it_matters, fix_suggestion, replacement, severity).
#
- source: 'Aristotle, Rhetoric: device + effect + audience'
  article: |-
    Throughout his speech, Dr. King uses anaphora when he repeats 'I have a dream.' He also uses ethos and pathos. These rhetorical devices help him persuade his audience.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      Throughout his speech, Dr. King uses anaphora when he repeats 'I have a dream.' He also uses ethos and pathos. These rhetorical devices help him persuade his audience.
    span: [0, 167]
    issue_label: device-spotting without effect
    question: |-
      You name three devices and stop. Naming is not analysis. The work is what the anaphora DOES at the March on Washington: each repetition pulls the crowd into the same imagined future, making the dream collective rather than individual. The reader should leave the paragraph understanding the device's specific effect on this audience in this moment.
    why_it_matters: |-
      Device-spotting without effect is the line AP English Language readers mark first; it caps the essay at a low score.
    fix_suggestion: |-
      Cut 'he also uses ethos and pathos' (Greek-term inflation). Stay with anaphora: show what the repetition does to a Black audience in 1963, on the steps of the Lincoln Memorial, after a decade of legislative defeat.
    replacement: null
    severity: high
- source: |-
    Edward P.J. Corbett, Classical Rhetoric for the Modern Student: kairos and the moment
  article: |-
    In his Letter from Birmingham Jail, Martin Luther King uses logical reasoning, emotional appeal, and moral authority to argue that civil disobedience is justified.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      In his Letter from Birmingham Jail, Martin Luther King uses logical reasoning, emotional appeal, and moral authority to argue that civil disobedience is justified.
    span: [0, 163]
    issue_label: kairos missing
    question: |-
      You analyze the letter outside its moment. The letter was written in April 1963, from a jail cell, in direct response to a published letter from eight white Birmingham clergymen asking King to wait and to defer to local process. Without the kairos (the specific occasion, the specific audience of clergy, the demand to defer), the analytical work cannot start. Persuasion happens in time, and rhetorical analysis has to name the time.
    why_it_matters: |-
      Analysis without kairos treats persuasion as if it were static; the letter's force lives in the specific moment it was answering.
    fix_suggestion: |-
      Open the analysis with the occasion: the eight clergymen, the call to wait, King's response to a specific charge of timing. The rhetorical moves you analyze then have a target the reader can see.
    replacement: null
    severity: high
- source: 'Aristotle, Rhetoric: ethos has to be constructed on the page'
  article: |-
    Lincoln effectively establishes his ethos in the Gettysburg Address by being President.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      Lincoln effectively establishes his ethos in the Gettysburg Address by being President.
    span: [0, 87]
    issue_label: ethos misunderstood as office
    question: |-
      Ethos is not the speaker's office; it is the credibility constructed on the page through specific choices. Ethos is artistic, made by the speech, not inartistic, derived from prior reputation. Lincoln's ethos in the Address is constructed by the biblical cadence ('four score and seven'), the refusal of self-reference ('we cannot dedicate, we cannot consecrate'), and the placement of the audience as actors ('it is for us the living'). His office gets him to the podium; the speech earns his standing.
    why_it_matters: |-
      Treating ethos as inherited rather than constructed misses the analytical work the term exists to do.
    fix_suggestion: |-
      Pick one specific Lincoln line and show how the syntax and diction construct ethos. The 'we cannot' repetition is the classic example: refusing the speaker's authority is the move that produces it.
    replacement: null
    severity: medium
- source: 'AP English Language scoring guideline: the architecture of the speech'
  article: |-
    The speech uses repetition, parallelism, allusion, and an emotional conclusion. Each of these techniques makes the speech more persuasive.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      The speech uses repetition, parallelism, allusion, and an emotional conclusion. Each of these techniques makes the speech more persuasive.
    span: [0, 138]
    issue_label: list of devices, no architecture
    question: |-
      Four devices listed in parallel, as if each were a separate move. The strongest rhetorical analyses show how the moves build on each other across the speech. Where does the repetition prepare the reader for the allusion? How does the parallelism set up the emotional conclusion so it lands instead of feeling tacked on? The architecture is what the analysis has to reveal.
    why_it_matters: |-
      A list of devices treats the speech as a bag of techniques; architecture is what makes a speech move a reader from one place to another.
    fix_suggestion: |-
      Rewrite around the sequence: 'The early repetition establishes a rhythm the audience starts predicting; when the speaker breaks the rhythm at the allusion, the break itself is what carries the emotional weight.' Devices in sequence, not in catalog.
    replacement: null
    severity: medium
- source: 'Standard AP English Language diagnostic: author worship'
  article: |-
    In her TED talk, Brene Brown effectively persuades her audience that vulnerability is a strength. She is a very engaging speaker who connects with her audience.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      In her TED talk, Brene Brown effectively persuades her audience that vulnerability is a strength. She is a very engaging speaker who connects with her audience.
    span: [0, 160]
    issue_label: author worship, no how
    question: |-
      The paragraph asserts that Brown persuades but never analyzes how. 'Engaging,' 'connects with the audience' are surface descriptions of the effect, not the analytical work. The work is: what specific moves construct that engagement? The personal anecdote in the first ninety seconds? The deliberate pauses? The shift from data ('I interviewed thousands') to story ('and I had a breakdown')? Rhetorical analysis is about how, never whether.
    why_it_matters: |-
      Author worship is what an essay does when it knows the speaker is good and skips the work of saying why.
    fix_suggestion: |-
      Pick one specific moment in the talk (the breakdown story, the data-then-story shift) and analyze the move. The reader should leave understanding one mechanism the talk uses to produce its effect.
    replacement: null
    severity: high
- source: 'Aristotle, Rhetoric: logos confused with logical-argument critique'
  article: |-
    The speech's logos is weak because the speaker's argument that all immigrants contribute economically is not supported by the data, which shows mixed results.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      The speech's logos is weak because the speaker's argument that all immigrants contribute economically is not supported by the data, which shows mixed results.
    span: [0, 158]
    issue_label: logical critique masquerading as rhetorical analysis
    question: |-
      You are critiquing whether the argument is logically sound (Logan's lane) instead of analyzing how it sounds, how it lands, how it works on the audience (your lane). Is the rhetorical appeal to reason, not the propositional soundness of the argument. The question for you is: how does the speaker construct the appearance of logos, and what does that construction do to the audience?
    why_it_matters: |-
      Rhetorical analysis that becomes argument critique stops doing the work the genre asks for.
    fix_suggestion: |-
      Rewrite to analyze the appearance of logos: 'The speaker uses statistical phrasing ("the data shows," "studies confirm") that signals logos without naming a specific source. That construction creates the felt weight of evidence in a sympathetic audience while inviting skepticism from the prepared one.' How, not whether.
    replacement: null
    severity: high
- source: Edward P.J. Corbett, on quote the text, not the device
  article: |-
    The author uses vivid imagery throughout the piece to create an emotional response in the reader.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      The author uses vivid imagery throughout the piece to create an emotional response in the reader.
    span: [0, 97]
    issue_label: quote the device, not the text
    question: |-
      You name the device (vivid imagery) and describe its general effect (emotional response) without quoting the line that performs the device. Rhetorical analysis lives on the line. Pick the specific image, quote it, show what it does. 'Vivid imagery' in the abstract is not analysis; the one line that is doing the work is.
    why_it_matters: |-
      Without the quoted line, the reader has only the writer's assertion that imagery exists and works.
    fix_suggestion: |-
      Pull the specific line. 'The image of "twenty-seven boys, every one of them dead in the same uniform" pins the cost to the page; the reader cannot move past the number without seeing it.' The line is the analysis.
    replacement: null
    severity: medium
- source: 'AP English Language scoring guideline: conclusion as restatement'
  article: |-
    In conclusion, the speaker effectively uses ethos, pathos, and logos to persuade the audience. These rhetorical techniques work together to make a powerful speech.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      In conclusion, the speaker effectively uses ethos, pathos, and logos to persuade the audience. These rhetorical techniques work together to make a powerful speech.
    span: [0, 163]
    issue_label: conclusion restates, does not land
    question: |-
      The conclusion catalogs the Greek triad and asserts effectiveness. A strong rhetorical-analysis essay lands on a claim about what kind of persuasion the speech is doing, why it works on this specific audience, what cumulative effect the analyzed moves produce. The conclusion has to be the place the analysis arrives, not the place it summarizes.
    why_it_matters: |-
      A restating conclusion fails to convert the analytical observations into a final claim about the speech's persuasive work.
    fix_suggestion: |-
      Land on a specific claim: 'The speech persuades not by argument but by ritual repetition that lets the audience speak with the speaker. By the close, the listener has been moved from observer to participant, and that is the speech's actual persuasive work.'
    replacement: null
    severity: medium
- source: 'Standard rhetorical-analysis diagnostic: audience missing'
  article: |-
    Patrick Henry's 'Give me liberty or give me death' speech uses powerful rhetoric to motivate his listeners to fight for independence.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      Patrick Henry's 'Give me liberty or give me death' speech uses powerful rhetoric to motivate his listeners to fight for independence.
    span: [0, 133]
    issue_label: audience missing
    question: |-
      You name the speech and describe its general purpose without naming the audience. Patrick Henry spoke on 23 March 1775 to the Second Virginia Convention, a divided body of colonial elites, many of whom owed economic and political loyalty to Britain. The rhetorical analysis depends on who he is moving and from where: hesitant elites toward armed resistance. Without that audience, the analytical work cannot specify what the rhetoric is doing.
    why_it_matters: |-
      Rhetorical analysis without an audience analyzes the words in the abstract; persuasion is always to someone specific.
    fix_suggestion: |-
      Open with the audience: the Second Virginia Convention, divided, with property interests on the loyalist side. Henry's moves (the religious cadence, the fatalist ending) are calibrated to move that specific room to a specific decision.
    replacement: null
    severity: high
- source: 'Standard rhetorical-analysis diagnostic: Greek-term inflation'
  article: |-
    The speaker establishes ethos by being credible, uses pathos by appealing to emotion, and employs logos by using logic. All three appeals work together effectively.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      The speaker establishes ethos by being credible, uses pathos by appealing to emotion, and employs logos by using logic. All three appeals work together effectively.
    span: [0, 164]
    issue_label: Greek-term inflation
    question: |-
      You name the three appeals and describe each in a tautology (ethos = credibility, pathos = emotion, logos = logic). This is the move AP English Language readers see most: Greek terms used as if naming them were analysis. The work is to show what the speaker actually does that constructs ethos, what specific emotional move pathos rests on, what particular reasoning logos performs. The vocabulary is not the analysis.
    why_it_matters: |-
      Greek-term inflation looks rigorous to the writer and looks empty to the reader; AP rubrics penalize it specifically.
    fix_suggestion: |-
      Pick ONE of the three appeals and show, with the specific quoted line, how the speech constructs it. Cut the other two from this paragraph; spend their words on the one you analyze well.
    replacement: null
    severity: high
