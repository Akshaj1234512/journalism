# Exemplars for rhetorical_editor
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'GRE_Argument (score 4/6): Device-spotting without effect-analysis'
  article: |-
    The problem with the arguement is the assumption that if the Mason River were cleaned up, that people would use it for water sports and recreation. This is not necessarily true, as people may rank water sports among their favorite recreational activities, but that does not mean that those same people have the financial ability, time or equipment to pursue those interests.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      The problem with the arguement is the assumption that if the Mason River were cleaned up, that people would use it for water sports and recreation. This is not necessarily true, as people may rank water sports among their favorite recreational activities, but that does not mean that those same people have the financial ability, time or equipment to pursue those interests.
    span:
    - 0
    - 374
    issue_label: Device-spotting without effect-analysis
    question: |-
      You've identified the assumption—good—but what *rhetorical move* is the original argument making that makes this assumption persuasive to its audience? Why does the argument *work* even though the assumption is shaky? You're just listing obstacles; you're not showing how the argument's rhetoric persuades despite them.
    why_it_matters: |-
      A rhetorical analysis explains how an argument achieves its persuasive effect, not just what's logically wrong with it.
    fix_suggestion: |-
      Try: 'The argument's persuasive force comes from a visual appeal—the implicit image of cleaned waters drawing crowds—without acknowledging that recreational desire doesn't translate to actual participation. The rhetoric relies on readers accepting a leap from preference to behavior.'
    replacement: null
    severity: high
- source: 'GRE_Argument (score 4/6): Missing kairos / audience awareness'
  article: |-
    However, even if the writer of the arguement is correct in assuming that the Mason River will be used more by the city's residents, the arguement does not say why the recreational facilities need more money. If recreational facilities already exist along the Mason River, why should the city allot more money to fund them? If the recreational facilities already in existence will be used more in the coming years, then they will be making more money for themselves, eliminating the need for the city government to devote more money to them.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      However, even if the writer of the arguement is correct in assuming that the Mason River will be used more by the city's residents, the arguement does not say why the recreational facilities need more money. If recreational facilities already exist along the Mason River, why should the city allot more money to fund them? If the recreational facilities already in existence will be used more in the coming years, then they will be making more money for themselves, eliminating the need for the city government to devote more money to them.
    span:
    - 0
    - 540
    issue_label: Missing kairos / audience awareness
    question: |-
      Who is making the original argument, and to whom? Your response treats this as pure logic, but arguments have *rhetorical contexts*. Are you writing to the city council? A skeptical citizen? That shapes what assumptions are even worth attacking.
    why_it_matters: |-
      Without understanding the rhetorical situation, you're analyzing the argument in a vacuum instead of seeing how it's designed to persuade a specific audience.
    fix_suggestion: null
    replacement: null
    severity: medium
- source: 'GRE_Issue (score 2/6): Conclusion restates instead of lands'
  article: |-
    Therefore, humans can not escape from using their brain. In addition, the technology as it is do not vain automatically, the is created by humans. Thus, the more developed tech and the more you want a convenient life, the more you think and emmit your creativity to breakthrough some banal method sarcastically.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      Therefore, humans can not escape from using their brain. In addition, the technology as it is do not vain automatically, the is created by humans. Thus, the more developed tech and the more you want a convenient life, the more you think and emmit your creativity to breakthrough some banal method sarcastically.
    span:
    - 0
    - 311
    issue_label: Conclusion restates instead of lands
    question: |-
      Your ending loops back to 'humans still have to think'—the same point you made three paragraphs ago. Where's the *consequence* of your argument? What should a reader *do* or *believe differently* now?
    why_it_matters: |-
      A strong conclusion shows readers why your argument matters beyond the essay itself; restating the thesis just confirms you ran out of ideas.
    fix_suggestion: |-
      End with the real stake: 'If we embrace technology as a tool requiring engagement rather than a substitute for thought, we don't lose our minds—we amplify them.' Make it forward-looking.
    replacement: null
    severity: high
- source: 'GRE_Argument (score 2/6): Vague device-spotting without analysis'
  article: |-
    This statement looks like logical, but there are some wrong sentences in it which is not logical.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      This statement looks like logical, but there are some wrong sentences in it which is not logical.
    span:
    - 0
    - 97
    issue_label: Vague device-spotting without analysis
    question: |-
      What does 'wrong sentences' mean here? You've identified something feels off, but you're not naming the actual rhetorical move or logical gap the argument makes. Are you seeing a logical fallacy? An unsupported assumption? Be specific.
    why_it_matters: |-
      Naming the device—and explaining *how* it works on readers—is the difference between noticing a problem and analyzing one.
    fix_suggestion: |-
      Instead: 'This argument commits a causal fallacy by assuming that because residents enjoy water sports, cleaning the river will automatically increase participation—without examining whether water quality is actually the barrier.'
    replacement: null
    severity: high
- source: 'GRE_Argument (score 2/6): Identifying fallacy but not the assumption'
  article: |-
    However, it seems to have a ralation between the first sentence and the setence which mentions that increase the quality of the river's water and the river's smell. This is a wrong cause and result to solve the problem.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      However, it seems to have a ralation between the first sentence and the setence which mentions that increase the quality of the river's water and the river's smell. This is a wrong cause and result to solve the problem.
    span:
    - 0
    - 219
    issue_label: Identifying fallacy but not the assumption
    question: |-
      You've spotted that there's a causal problem here. But what *assumption* is the argument making without stating it? What does the argument take for granted about why people don't do water sports now?
    why_it_matters: |-
      The GRE task asks you to identify unstated assumptions—the hidden premises holding the argument together. Naming the fallacy alone misses that target.
    fix_suggestion: |-
      Dig deeper: 'The argument assumes without evidence that poor water quality is the primary reason residents don't participate in water sports—ignoring other possible barriers like cost, access, or safety concerns.'
    replacement: null
    severity: high
- source: 'GRE_Issue (score 2/6): Unclear claim + weak positioning'
  article: |-
    To be lazy for human in some meaning is one of the fashion issues in thesedays. There are many symptoms and resons of it. However, I can not agree with the statement that the technology make humans to be reluctant to thinkng thoroughly.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      To be lazy for human in some meaning is one of the fashion issues in thesedays. There are many symptoms and resons of it. However, I can not agree with the statement that the technology make humans to be reluctant to thinkng thoroughly.
    span:
    - 0
    - 236
    issue_label: Unclear claim + weak positioning
    question: |-
      What are you actually arguing here? You start with a vague claim about laziness being 'fashionable,' then pivot to disagreeing with the prompt—but we don't see *why* the technology angle matters to your position. What's the rhetorical move?
    why_it_matters: |-
      Without a clear claim tied to your thesis, readers can't follow your argument or understand what you're trying to persuade them of.
    fix_suggestion: |-
      Open with a direct claim: 'Technology doesn't cause shallow thinking; rather, *how people approach* technology determines whether they think critically.' Then show us what you're disagreeing with in the prompt and why.
    replacement: null
    severity: high
- source: 'GRE_Issue (score 4/6): Ethos-as-label instead of ethos-work'
  article: |-
    If it wasn't for the invention of new technological devices, I wouldn't be sitting at this computer trying to philosophize about technology. It would be extremely hard for children in much poorer countries to learn and think for themselves with out the invention of the internet.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      If it wasn't for the invention of new technological devices, I wouldn't be sitting at this computer trying to philosophize about technology. It would be extremely hard for children in much poorer countries to learn and think for themselves with out the invention of the internet.
    span:
    - 0
    - 279
    issue_label: Ethos-as-label instead of ethos-work
    question: |-
      The first sentence centers *you* as proof—why should a GRE grader trust your personal convenience as evidence of humanity's expanded potential? What kairos or audience does this address?
    why_it_matters: |-
      Inserting yourself without rhetorical purpose weakens credibility and distracts from the claim you're making about collective human capacity.
    fix_suggestion: |-
      Replace self-reference with concrete stakeholder perspective: 'For children in poorer countries, internet access means access to knowledge their geography would otherwise deny them—a direct expansion of human potential.'
    replacement: null
    severity: medium
- source: 'GRE_Issue (score 4/6): Historical example without audience analysis'
  article: |-
    Think what an impact the printing press, a technologically superior mackine at the time, had on the ability of the human race to learn and think.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      Think what an impact the printing press, a technologically superior mackine at the time, had on the ability of the human race to learn and think.
    span:
    - 0
    - 145
    issue_label: Historical example without audience analysis
    question: |-
      You invoke the printing press—a strong parallel—but don't explain *why* it proves your point or what it should mean to someone skeptical about technology's effects. What's the rhetorical work here?
    why_it_matters: |-
      An analogy only persuades if you spell out the meaningful connection to your claim and your reader's concerns.
    fix_suggestion: |-
      Add explanation: 'Like the printing press, which democratized knowledge and sparked the Enlightenment, today's internet does the same—but faster. That's not laziness; it's scaled learning.'
    replacement: null
    severity: medium
- source: 'GRE_Issue (score 3/6): Example without rhetorical work'
  article: |-
    For example, the problem of dibilitating illnesses and diseases such as alzheimer's disease is slowing being solved by the technological advancements in stem cell research. The future ability of growing new brain cells and the possibility to reverse the onset of alzheimer's is now becoming a reality.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      For example, the problem of dibilitating illnesses and diseases such as alzheimer's disease is slowing being solved by the technological advancements in stem cell research. The future ability of growing new brain cells and the possibility to reverse the onset of alzheimer's is now becoming a reality.
    span:
    - 0
    - 301
    issue_label: Example without rhetorical work
    question: |-
      You name stem-cell research as proof that tech advances human thinking—but where's the argument? How does curing Alzheimer's prove humans think *better*, not just live longer? What's the actual connection to your claim?
    why_it_matters: |-
      Device-spotting (citing an example) isn't the same as rhetorical analysis—you need to show how the example persuades and why it matters to your audience.
    fix_suggestion: |-
      Explain the causal chain: stem cells require human creativity/judgment to develop → this creative capacity proves tech enhances rather than replaces human cognition. Then show why *your reader* should believe this matters.
    replacement: null
    severity: high
- source: 'GRE_Issue (score 3/6): Vague problem and solution'
  article: |-
    Our reliance on this type of technology can be detrimental if not regulated and regularily substituted for other information sources such as human interactions and hands on learning. I think if humans understand that we should not have such a reliance on computer technology, that we as a species will advance further by utilizing the opportunity of computer technology as well as the other sources of information outside of a computer.
  critiques:
  - agent: rhetorical_editor
    text_quote: |-
      Our reliance on this type of technology can be detrimental if not regulated and regularily substituted for other information sources such as human interactions and hands on learning. I think if humans understand that we should not have such a reliance on computer technology, that we as a species will advance further by utilizing the opportunity of computer technology as well as the other sources of information outside of a computer.
    span:
    - 0
    - 436
    issue_label: Vague problem and solution
    question: |-
      You claim reliance 'can be detrimental'—but detrimental *how*? And 'if humans understand we shouldn't rely on it'—understand based on what evidence? This reads like a wish, not an argument. Who needs to be convinced, and why would this convince them?
    why_it_matters: |-
      Without specifics about consequences or the reasoning that connects the problem to your solution, you're not actually arguing—you're just stating positions.
    fix_suggestion: |-
      Pick one concrete consequence (e.g., 'students who only Google answers score lower on synthesis tasks') and trace it: here's what happens, here's why it happens, here's how regulation prevents it, here's why that matters to you/your reader.
    replacement: null
    severity: high
