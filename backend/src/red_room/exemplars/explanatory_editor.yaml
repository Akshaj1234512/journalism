  article: |-
    'Wasn't well-educated' becomes 'went to vocational school and didn't go to college.' It's truer... It's important, then, to challenge long-held assumptions and recognize when our writing falls short of the precision required by the truth.
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      'Wasn't well-educated' becomes 'went to vocational school and didn't go to college.' It's truer... It's important, then, to challenge long-held assumptions and recognize when our writing falls short of the precision required by the truth.
    span:
