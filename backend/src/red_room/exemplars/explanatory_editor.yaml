    niemanstoryboard.org — grounding-apocalyptic-issues-in-reality-without-losing-hope: grounding abstraction in concrete detail
  article: |-
    Zak's essay zips up and down the 'ladder of abstraction,' a term American linguist and U.S. Sen. S. I. Hayakawa coined in 1939. Concrete, tangible details form the ladder's lower rungs; as you climb, the ideas and language grow more abstract.
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      Zak's essay zips up and down the 'ladder of abstraction,' a term American linguist and U.S. Sen. S. I. Hayakawa coined in 1939. Concrete, tangible details form the ladder's lower rungs; as you climb, the ideas and language grow more abstract.
    span:
    - 0
    - 242
    issue_label: grounding abstraction in concrete detail
    question: |-
      It's a useful way to introduce abstract concepts while grounding them in reality, but Zak uses it to heartbreaking effect: moving from personal, sensory observations (basements that flood yearly, asthma worsening, Halloween costumes) up to the geologic implications.
    why_it_matters: |-
      The ladder of abstraction lets a writer handle an overwhelming existential threat by anchoring fear in observable, lived experience before zooming out to planetary scale.
    fix_suggestion: |-
      When writing about abstract or apocalyptic issues, identify the rungs: start with what readers have felt in their own bodies or homes, then climb toward the larger philosophical or scientific implications.
    replacement: null
    severity: high
