    - 375
    issue_label: translating abstract numbers via familiar analogy
    question: |-
      Guterson uses the NFL closing analogy to make a 14% probability visceral and understandable—it's not dumbing stories down; it's smarting them up. He gives readers something concrete they already understand to anchor an otherwise abstract statistical claim.
    why_it_matters: |-
      This move transforms a number that readers might mentally dismiss as 'not that likely' into a lived comparison—many people have watched field goals missed—making the risk feel immediate and real.
