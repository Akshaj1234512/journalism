# Exemplars for explanatory_editor
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the explanatory_editor lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    niemanstoryboard.org — cutting-through-numbing-numbers-with-electrified-writing: grounding present crisis in historical echo
  article: |-
    Pierce brings in a biting piece of history: a premature celebration by The Boston Globe at the apparent end of the 1918 flu pandemic—which proved not to be the ending at all. Pierce writes, 'The amusement and mirth (referred to in the Globe story) had a short shelf-life. In the fall of 1918, nearly 5,000 Bostonians died from the resurgent flu.' In another portion, he references a similar sequence in Birmingham, Alabama, from 104 years ago.
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      Pierce brings in a biting piece of history: a premature celebration by The Boston Globe at the apparent end of the 1918 flu pandemic—which proved not to be the ending at all. Pierce writes, 'The amusement and mirth (referred to in the Globe story) had a short shelf-life. In the fall of 1918, nearly 5,000 Bostonians died from the resurgent flu.' In another portion, he references a similar sequence in Birmingham, Alabama, from 104 years ago.
    span:
    - 0
    - 443
    issue_label: grounding present crisis in historical echo
    question: |-
      By surfacing what The Boston Globe got wrong in 1918—and finding a matching pattern 104 years later—doesn't Pierce give readers a framework for understanding how we repeat historical mistakes with numbing regularity?
    why_it_matters: |-
      Historical echoes provide context and richness to a present-day story by showing that the crisis isn't novel, which paradoxically makes the current numbness more damning and the repetition more urgent.
    fix_suggestion: |-
      Search archives and historical records for moments when journalists, officials, or institutions faced similar crises and either succeeded or failed; use those echoes to deepen the stakes of your current story.
    replacement: null
    severity: medium
