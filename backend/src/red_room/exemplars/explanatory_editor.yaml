    niemanstoryboard.org — earthquakes-analogies-accessible-writing-numbers: naming the misconception before explaining the truth
  article: |-
    The moment magnitude scale suggests phenomena that get more intense by steady, equal degrees, one-tenth of a whole number at a time. In other words, it suggests that a 9.2 earthquake would be about a third more intense than a 6.2. That isn't how it is, though, because the moment magnitude scale is logarithmic. A 9.2 is in fact many thousands of times more intense than a 6.2.
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      The moment magnitude scale suggests phenomena that get more intense by steady, equal degrees, one-tenth of a whole number at a time. In other words, it suggests that a 9.2 earthquake would be about a third more intense than a 6.2. That isn't how it is, though, because the moment magnitude scale is logarithmic. A 9.2 is in fact many thousands of times more intense than a 6.2.
    span:
    - 0
    - 377
    issue_label: naming the misconception before explaining the truth
    question: |-
      Guterson first names what readers likely believe the Richter scale means—a linear progression—then corrects it by explaining the logarithmic reality. This structure meets the audience where they are, rather than assuming they'll follow a technical explanation from cold.
    why_it_matters: |-
      By surfacing the common misunderstanding first, the writer validates readers' existing intuition before overturning it, making the correction land harder and feel less like a lecture.
    fix_suggestion: |-
      When explaining a frequently misunderstood technical concept, structure the explanation as a contrast: 'You might think X, but actually Y,' rather than jumping straight to the correct version.
    replacement: null
    severity: high
