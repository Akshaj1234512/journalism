    - 238
    issue_label: imprecision masquerading as shorthand
    question: |-
      When the author's grandmother pushed back on 'wasn't well-educated'—noting her daughter made the honor roll—it revealed how casual language can distort the actual truth and offend the people closest to you.
    why_it_matters: |-
      Vague language that relies on reader assumption undermines credibility and can hurt the very people you're writing about, especially when they can fact-check you.
    fix_suggestion: |-
      In memoir revision, hunt for every instance where you've used a summary judgment instead of a concrete fact. Replace 'wasn't well-educated' with the actual educational path. This forces you to think more precisely about what you mean.
