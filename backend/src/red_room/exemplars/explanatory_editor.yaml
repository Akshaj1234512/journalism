    niemanstoryboard.org — grounding-apocalyptic-issues-in-reality-without-losing-hope: conscience over factoids in climate reporting
  article: |-
    I wanted to write something that got beyond the 12-word headlines about how 'we're all going to drown or burn,' and that also stepped around the 1,200-page climate report that's too dense and disorienting for the average person like myself. Science is why we know what we know, but my editors want me to look at conscience, too, and other intangibles—like why we are how we are, and what we hope to be.
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      I wanted to write something that got beyond the 12-word headlines about how 'we're all going to drown or burn,' and that also stepped around the 1,200-page climate report that's too dense and disorienting for the average person like myself. Science is why we know what we know, but my editors want me to look at conscience, too, and other intangibles—like why we are how we are, and what we hope to be.
    span:
    - 0
    - 402
    issue_label: conscience over factoids in climate reporting
    question: |-
      An existential threat deserves to be interrogated by the heart and the spirit, not just the mind. Did your editors want you to add any more science facts or numbers? The piece contains almost none—it's metaphorical and philosophical instead.
    why_it_matters: |-
      Centering emotional and philosophical responses alongside (rather than buried under) scientific facts allows readers already paralyzed by climate news to find agency and meaning.
    fix_suggestion: |-
      When reporting on existential threats, resist the impulse to stuff the piece with data and factoids; instead, use science as the foundation and let philosophy, testimony, and emotional truth carry the reader forward.
