      Banaszynski flags that while Guterson's NFL analogy is brilliant for a Seattle readership, it has geographic and cultural limits. The craft move isn't just finding any familiar anchor—it's finding one that actually fits your specific audience.
    why_it_matters: |-
      An analogy that confuses or alienates readers defeats the purpose of clarity; it becomes a barrier instead of a bridge.
    fix_suggestion: |-
      Before settling on a comparison or analogy, ask: Who am I writing for? What do they actually know? A sports analogy works for sports fans; a cooking analogy for home cooks. Test your anchor against your audience demographics.
