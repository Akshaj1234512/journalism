  article: |-
    I try to lower the threshold of data-heavy, fact-heavy sections. To introduce the brain imaging technology and longitudinal studies, for example, I introduced pediatric neurologist Charles Nelson as 'gregarious and kind' and having a mustache that looks like Captain Kangaroo's. I'm hoping that even the most statistics-averse reader might feel, 'Oh, gregarious and kind? Captain Kangaroo? Okay, I can handle this.'
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      I try to lower the threshold of data-heavy, fact-heavy sections. To introduce the brain imaging technology and longitudinal studies, for example, I introduced pediatric neurologist Charles Nelson as 'gregarious and kind' and having a mustache that looks like Captain Kangaroo's. I'm hoping that even the most statistics-averse reader might feel, 'Oh, gregarious and kind? Captain Kangaroo? Okay, I can handle this.'
    span:
    - 0
    - 415
    issue_label: humanizing scientist before introducing complex data
    question: |-
      Speaking of numbers, were you worried that these dense factoids would take away from the emotional power of the narrative — that the readers' eyes would glaze over? Yes. My own eyes glaze over. I adore strong narrative, with just a sprinkling of vital data points... Can you give an example of how you made numbers more palatable?
    why_it_matters: |-
      Introducing a scientist as a vivid, quirky person before asking readers to absorb their research findings lowers psychological resistance to technical material and creates a human entry point into otherwise opaque data.
    fix_suggestion: |-
      Before presenting complex scientific findings, anchor the scientist as a specific, memorable person with idiosyncratic details—this makes readers more willing to follow them into difficult material.
