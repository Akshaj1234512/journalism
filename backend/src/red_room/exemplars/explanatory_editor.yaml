    niemanstoryboard.org — earthquakes-analogies-accessible-writing-numbers: making historical data emotionally legible
  article: |-
    Quakes of this sort occur in our region on average every 500 years. The last one happened 322 years ago, and the one before that about 1,300 years ago. You might choose to focus on the fact that about 1,000 years passed between the two, but only if you're an insistently cup-half-full person. For everybody else, it might be chastening to hear that the interval between the quake of 1,300 years ago and the one before it was around 320 years.
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      Quakes of this sort occur in our region on average every 500 years. The last one happened 322 years ago, and the one before that about 1,300 years ago. You might choose to focus on the fact that about 1,000 years passed between the two, but only if you're an insistently cup-half-full person. For everybody else, it might be chastening to hear that the interval between the quake of 1,300 years ago and the one before it was around 320 years.
    span:
    - 0
    - 442
    issue_label: making historical data emotionally legible
    question: |-
      Guterson lays out the raw data (500-year average, 322 years since last quake, 1,300 years before that), then walks readers through the interpretive choice: you could be reassured by the 1,000-year gap, or sobered by the 320-year one. He doesn't tell you which to feel; he shows you the math that justifies either reading.
    why_it_matters: |-
      By naming both emotional interpretations upfront, the writer gives readers agency while also nudging them toward the more cautionary one—which supports his larger argument about preparedness.
    fix_suggestion: |-
      When presenting historical patterns or statistical ranges, don't hide behind false objectivity; acknowledge the competing ways people interpret the same data, then guide readers toward the more honest reading.
    replacement: null
    severity: medium
