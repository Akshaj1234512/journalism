    niemanstoryboard.org — writers-memoir-nerve-looks-at-science-and-psychology-of-fear: Hedging claims from single studies
  article: |-
    Holland hired a fact-checker with a PhD in psychology to verify the science portions, and was 'particularly nervous about overstating research results. Often I reference only a single paper, rather than an accumulation of evidence, and I didn't want to overstate what one paper represents.'
  critiques:
  - agent: explanatory_editor
    text_quote: |-
      Holland hired a fact-checker with a PhD in psychology to verify the science portions, and was 'particularly nervous about overstating research results. Often I reference only a single paper, rather than an accumulation of evidence, and I didn't want to overstate what one paper represents.'
    span:
    - 0
    - 290
    issue_label: Hedging claims from single studies
    question: |-
      Holland was acutely aware of the gap between what one research paper shows and what it can responsibly claim to mean. How do you frame tentative research findings in a way that's honest about their limits without making the prose feel hedged to death?
    why_it_matters: |-
      Readers of science writing expect precision about evidence strength; overstating a single study erodes credibility and can mislead readers about what we actually know.
    fix_suggestion: |-
      When citing a single paper, use language like 'one study suggests' or 'researchers found' rather than 'this proves' or 'this shows.' Have your fact-checker specifically flag moments where you might be implying more certainty than the evidence supports.
    replacement: null
    severity: high
