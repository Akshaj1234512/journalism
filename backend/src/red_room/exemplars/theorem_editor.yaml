    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 4/5): missing theoretical analysis of approximation quality
  article: |-
    Equation (1) approximating the true global KNN objective in FL setting without global data view
  critiques:
  - agent: theorem_editor
    text_quote: |-
      Equation (1) approximating the true global KNN objective in FL setting without global data view
    span:
    - 0
    - 95
    issue_label: missing theoretical analysis of approximation quality
    question: |-
      How good is the approximation in Equation (1), and what are the costs by not having a global view? A good clustering for each local agent does not mean they are good from a global point of view—this needs in-depth theoretic studies.
    why_it_matters: |-
      Without theoretical justification, it is unclear whether the NNC approximation scheme is sound, making the core contribution appear empirically motivated rather than principled.
    fix_suggestion: |-
      Provide theoretical analysis of the approximation error incurred by decomposing global operators into local neural approximations, with explicit bounds or convergence guarantees.
    replacement: null
    severity: high
