    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 4/5): ambiguous notation violating FL privacy constraint
  article: 'Equation (1): notation D_{i,j} undefined—does it stand for cdist(X_i, X_j)?'
  critiques:
  - agent: theorem_editor
    text_quote: 'Equation (1): notation D_{i,j} undefined—does it stand for cdist(X_i, X_j)?'
    span:
    - 0
    - 75
    issue_label: ambiguous notation violating FL privacy constraint
    question: |-
      In equation 1, D_{i,j} is ambiguous, does it stand for D_{i,j} = cdist(X_i, X_j)? Which violates the data preservation constraint of FL.
    why_it_matters: |-
      The notation ambiguity raises concerns about whether the formulation inadvertently assumes cross-agent distance computations, which would require sharing local data and break the FL privacy model.
    fix_suggestion: |-
      Clarify the definition of D_{i,j} and explicitly verify that the computation does not require sharing raw data between agents.
    replacement: null
    severity: high
