    NeurIPS.cc/2023/Conference OpenReview review (rating 6/10, confidence 4/5): Theorem without proof or clear purpose
  article: |-
    Theorem 3.1 and Equation (3): the authors present rates expressed in a certain manner but the proof is not presented, even in the appendix, and the theorem is not referred to anywhere. Equation (3) is not used anywhere as well.
  critiques:
  - agent: theorem_editor
    text_quote: |-
      Theorem 3.1 and Equation (3): the authors present rates expressed in a certain manner but the proof is not presented, even in the appendix, and the theorem is not referred to anywhere. Equation (3) is not used anywhere as well.
    span:
    - 0
    - 227
    issue_label: Theorem without proof or clear purpose
    question: |-
      What is the purpose of Theorem 3.1? Its proof is not presented, even in the appendix. Also, it is not referred to anywhere. Why are rates expressed in the manner of Equation (3) if it is not used?
    why_it_matters: |-
      Without a proof or clear purpose, the theorem adds no value to the paper and confuses readers about the theoretical grounding of the approach.
    fix_suggestion: |-
      Either remove Theorem 3.1 and Equation (3) if they are not central to the method, or provide a proof in the appendix and clearly explain how the theorem justifies a key step in the derivation.
    replacement: null
    severity: high
