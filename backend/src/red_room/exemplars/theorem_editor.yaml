    NeurIPS.cc/2023/Conference OpenReview review (rating 6/10, confidence 5/5): simplified form reveals no novelty
  article: Equation (9) NNFL definition and its mathematical simplification.
  critiques:
  - agent: theorem_editor
    text_quote: Equation (9) NNFL definition and its mathematical simplification.
    span:
    - 0
    - 65
    issue_label: simplified form reveals no novelty
    question: |-
      Eq 9 simplifies to NNFL = 1 - A/(KA+1) - log p(y|x)/(1+KA), which is a scaled version of the original function plus a constant. What fundamental change makes this robust to noise beyond linear scaling?
    why_it_matters: |-
      If the proposed method reduces to a linearly scaled and shifted variant of the base loss, the claim of fundamental robustness improvement lacks mathematical grounding.
    fix_suggestion: |-
      Show that the specific scaling and additive constant in the simplified form provably improve noise robustness, or identify a non-linear mechanism responsible for robustness.
    replacement: null
    severity: high
