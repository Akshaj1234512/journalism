    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): inapplicable IID assumption for non-IID graph data
  article: Definition 1 applies an IID assumption to graph data in Section 4
  critiques:
  - agent: theorem_editor
    text_quote: Definition 1 applies an IID assumption to graph data in Section 4
    span:
    - 0
    - 65
    issue_label: inapplicable IID assumption for non-IID graph data
    question: |-
      For definition 1, authors are suggested to explain why the conclusion from IID assumption can be used in the graph data, where nodes are non-IID. Moreover, according to the definition of CDF, the integral starts from -infinity. Authors are suggested to revise related symbols or statements in section 4.
    why_it_matters: |-
      Applying IID assumptions to non-IID graph nodes without justification undermines the theoretical foundation of the fairness definition.
    fix_suggestion: |-
      Either relax Definition 1 to account for graph structure and node dependencies, or justify why the IID result still holds asymptotically for non-IID nodes; fix CDF notation.
    replacement: null
    severity: high
