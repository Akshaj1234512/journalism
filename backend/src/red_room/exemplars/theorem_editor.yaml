# Exemplars for theorem_editor
# Pulled from real OpenReview reviews on ICLR 2024 / ICLR 2025 /
# NeurIPS 2023 (filtered to confidence>=4 reviewers, weaknesses
# field 200-2500 words, must reference a specific anchor like
# Table/Fig/Section/Eq number). Classified by lane via Claude Haiku
# and the top 10 by quality score selected.
#
- source: |-
    ICLR.cc/2025/Conference OpenReview review (rating 10/10, confidence 5/5): rotation matrix notation and parity factor omitted
  article: |-
    The rotation matrix R in Line 879 should be the Wigner-D matrix D^(l)(r). In addition, the inversion factor should be multiplied according to the parity of the vector itself.
  critiques:
  - agent: theorem_editor
    text_quote: |-
      The rotation matrix R in Line 879 should be the Wigner-D matrix D^(l)(r). In addition, the inversion factor should be multiplied according to the parity of the vector itself.
    span:
    - 0
    - 174
    issue_label: rotation matrix notation and parity factor omitted
    question: |-
      Line 879: R should be explicitly the Wigner-D matrix D^(l)(r), and inversion factors must be multiplied according to vector parity (per e3nn documentation). Why are these details missing?
    why_it_matters: |-
      Without correct Wigner-D notation and parity handling, the equivariance properties are not rigorously stated and reproducibility is compromised.
    fix_suggestion: |-
      Replace R with D^(l)(r) and explicitly handle parity-dependent inversion factors. Reference e3nn documentation for the correct formulation.
    replacement: null
    severity: high
