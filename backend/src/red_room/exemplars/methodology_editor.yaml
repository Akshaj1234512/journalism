    ICLR.cc/2025/Conference OpenReview review (rating 6/10, confidence 5/5): Confused use of watermarked text for FPR measurement
  article: |-
    Line 493: 'Utilizing Alg. 1, we generate 8000 watermarked sentences' to empirically measure FPR under hypothesis H_0.
  critiques:
  - agent: methodology_editor
    text_quote: |-
      Line 493: 'Utilizing Alg. 1, we generate 8000 watermarked sentences' to empirically measure FPR under hypothesis H_0.
    span:
    - 0
    - 117
    issue_label: Confused use of watermarked text for FPR measurement
    question: |-
      To measure FPR (false positive rate under H_0), you need non-watermarked sentences from the null distribution, not watermarked ones generated by Alg. 1. Why are you applying Alg. 1 to measure the null hypothesis?
    why_it_matters: |-
      FPR is estimated incorrectly if computed over watermarked sentences, inflating the reported robustness of the detector.
    fix_suggestion: |-
      Use independent samples from the non-watermarked null distribution (human text or other baseline LLM) to measure FPR. Reserve Alg. 1 only for TPR measurement.
    replacement: null
    severity: high
