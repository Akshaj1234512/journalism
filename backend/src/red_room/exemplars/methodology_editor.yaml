    NeurIPS.cc/2023/Conference OpenReview review (rating 7/10, confidence 4/5): missing NL instruction baseline
  article: |-
    Table 6 baseline comparison; X-prompt compared against soft prompt tuning without natural language instruction baseline
  critiques:
  - agent: methodology_editor
    text_quote: |-
      Table 6 baseline comparison; X-prompt compared against soft prompt tuning without natural language instruction baseline
    span:
    - 0
    - 119
    issue_label: missing NL instruction baseline
    question: |-
      For table 6, the baseline of using NL instruction is missing. As X-prompt's core objective is to learn the concept which is hard to describe in NL, it is desirable to compare with baselines which use NL descriptions. For example, a baseline which puts some example tweets of a specific user as in-context prompt, can be compared.
    why_it_matters: |-
      Without a direct NL baseline, the paper cannot demonstrate that learned imaginary tokens outperform explicit natural language descriptions, which is central to the motivation.
    fix_suggestion: |-
      Add a baseline using natural language descriptions (e.g., in-context examples or explicit style prompts) to Table 6 for direct comparison.
    replacement: null
    severity: high
