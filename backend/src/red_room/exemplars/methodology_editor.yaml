    ICLR.cc/2025/Conference OpenReview review (rating 8/10, confidence 4/5): averaging hides per-example sufficiency variation
  article: |-
    Figure 3. Left: the experiment tests whether the reconstructions are sufficient by comparing the ratio of the *average* logit difference with and without the intervention.
  critiques:
  - agent: methodology_editor
    text_quote: |-
      Figure 3. Left: the experiment tests whether the reconstructions are sufficient by comparing the ratio of the *average* logit difference with and without the intervention.
    span:
    - 0
    - 171
    issue_label: averaging hides per-example sufficiency variation
    question: |-
      Why report only the ratio of average logit differences (Figure 3 Left) rather than per-example changes, which would reveal whether averaging masks heterogeneous sufficiency across inputs?
    why_it_matters: |-
      Averaging across examples may hide large logit-difference drops on some inputs, masking cases where the reconstruction is insufficient.
    fix_suggestion: |-
      Show the distribution of absolute changes in logit difference per example (e.g., histogram or summary statistics), and discuss why averaging is appropriate if used.
    replacement: null
    severity: medium
