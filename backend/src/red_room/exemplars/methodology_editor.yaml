# Exemplars for methodology_editor
# Pulled from real OpenReview reviews on ICLR 2024 / ICLR 2025 /
# NeurIPS 2023 (filtered to confidence>=4 reviewers, weaknesses
# field 200-2500 words, must reference a specific anchor like
# Table/Fig/Section/Eq number). Classified by lane via Claude Haiku;
# top 15 selected with a diversity constraint (round-robin
# across distinct sub-issue buckets) so the exemplars cover the lane's
# full failure-mode range rather than 15 variants of the
# same critique.
#
- source: |-
    ICLR.cc/2024/Conference OpenReview review (rating 8/10, confidence 5/5): unbalanced microbatch timing regime not tested
  article: |-
    The authors proposed algorithms to schedule unbalanced TF/TB/TW, but experiments use sentence-size=1024 where TF/TB/TW are nearly equal (24h >> 8s in Table 1) across all model sizes.
  critiques:
  - agent: methodology_editor
    text_quote: |-
      The authors proposed algorithms to schedule unbalanced TF/TB/TW, but experiments use sentence-size=1024 where TF/TB/TW are nearly equal (24h >> 8s in Table 1) across all model sizes.
    span:
    - 0
    - 182
    issue_label: unbalanced microbatch timing regime not tested
    question: |-
      Even though authors proposed two algos to schedule unbalanced TF/TB/TW, the experiments however are not designed to show how their advantages, e.g., with sentence-size = 1024, TF/TB/TW are almost equal (24h >> 8s in table 1) for all model sizes, experiments or roofline analysis with 8s >> 24h (or any models with significantly different T) could be helpful to evaluate the efficacy of these algos.
    why_it_matters: |-
      Without experiments in regimes where TF, TB, and TW are significantly unbalanced, the value of the unbalanced scheduling algorithms cannot be validated.
    fix_suggestion: |-
      Add experiments or roofline analysis with model/sequence configurations where TF, TB, TW are significantly imbalanced (e.g., 8s >> 24h) to demonstrate the efficacy of the unbalanced scheduling algorithms.
    replacement: null
    severity: medium
