    ICLR.cc/2025/Conference OpenReview review (rating 8/10, confidence 4/5): weak empirical support for diversity-performance link
  article: |-
    Figure 3 shows improved problem solving attributed to improved diversity, but improvements are not very evident and the relationship between diversity and performance is unclear across difficulty levels.
  critiques:
  - agent: methodology_editor
    text_quote: |-
      Figure 3 shows improved problem solving attributed to improved diversity, but improvements are not very evident and the relationship between diversity and performance is unclear across difficulty levels.
    span:
    - 0
    - 203
    issue_label: weak empirical support for diversity-performance link
    question: |-
      The authors attribute improved problem solving to improved diversity, but Figure 3 doesn't clearly tell this story. In easy/medium cases, DPO matches or outperforms DPL, and in the hard case the improvement is minimal. If diversity truly leads to better problem solving, why isn't there a clear relationship between temperature and best-of-N accuracy within DPL across Figure 3?
    why_it_matters: |-
      The core motivation for the method—that diversity improves inference-time problem solving—lacks convincing empirical evidence, undermining the paper's central claim.
    fix_suggestion: |-
      Empirically study an inference-time scaling approach (e.g., best-of-N sampling) and demonstrate that diversity actually correlates with better performance. Alternatively, systematically vary temperature and show how best-of-N accuracy responds within DPL.
    replacement: null
    severity: high
