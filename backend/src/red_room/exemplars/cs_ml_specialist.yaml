    NeurIPS.cc/2023/Conference OpenReview review (rating 8/10, confidence 4/5): compression results lack external validity
  article: |-
    Section 5 experiments on compressed Transformers; authors note 'even with a fairly restrictive compression setup, compressed models may not stay faithful to the original RASP program'.
  critiques:
  - agent: cs_ml_specialist
    text_quote: |-
      Section 5 experiments on compressed Transformers; authors note 'even with a fairly restrictive compression setup, compressed models may not stay faithful to the original RASP program'.
    span:
    - 0
    - 184
    issue_label: compression results lack external validity
    question: |-
      Section 5 reads as an entirely different paper with significant limitations. Given that compressed Transformers neither follow the original RASP program, nor is it clear this behavior holds for non-Tracr Transformers, what can be taken away from these results?
    why_it_matters: |-
      Without evidence that findings generalize beyond Tracr-compiled Transformers, the compression experiments contribute ambiguous insights that may not inform broader compression technique evaluation.
    fix_suggestion: |-
      Either (1) validate compression findings on non-Tracr Transformers to establish generality, or (2) reframe Section 5 as a Tracr-specific case study with limited scope.
    replacement: null
    severity: medium
