    NeurIPS.cc/2023/Conference OpenReview review (rating 7/10, confidence 4/5): non-linear scaling reduces interpretability
  article: |-
    In Fig. 5, FLS is less linear than FID w.r.t. the % of perturbed data, possibly due to adaptive variance leading to complex interactions between samples.
  critiques:
  - agent: cs_ml_specialist
    text_quote: |-
      In Fig. 5, FLS is less linear than FID w.r.t. the % of perturbed data, possibly due to adaptive variance leading to complex interactions between samples.
    span:
    - 0
    - 153
    issue_label: non-linear scaling reduces interpretability
    question: |-
      FLS shows non-linear scaling with perturbation level in Fig. 5, whereas FID is linear. Does this non-linearity stem from the adaptive variance computation, and how does this complexity affect intuitive interpretation of FLS scores in practice?
    why_it_matters: |-
      A metric that deviates from expected linear degradation under controlled perturbation is harder to interpret and may lead to misuse if practitioners expect FID-like behavior.
    fix_suggestion: |-
      Analyze and explain the source of non-linearity in Fig. 5; consider whether the adaptive variance design is necessary, or provide guidance on when FLS scores should be interpreted non-linearly.
    replacement: null
    severity: medium
