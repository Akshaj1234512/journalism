# Exemplars for cs_ml_specialist
# Pulled from real OpenReview reviews on ICLR 2024 / ICLR 2025 /
# NeurIPS 2023 (filtered to confidence>=4 reviewers, weaknesses
# field 200-2500 words, must reference a specific anchor like
# Table/Fig/Section/Eq number). Classified by lane via Claude Haiku;
# top 15 selected with a diversity constraint (round-robin
# across distinct sub-issue buckets) so the exemplars cover the lane's
# full failure-mode range rather than 15 variants of the
# same critique.
#
