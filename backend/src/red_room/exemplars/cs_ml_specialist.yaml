    ICLR.cc/2025/Conference OpenReview review (rating 8/10, confidence 4/5): Inference efficiency gap vs. autoregressive baseline
  article: |-
    Table 7: SAD3-LM requires 10K diffusion steps vs. 1024 steps for autoregressive decoding; inference speed gains are modest compared to SSD-LM
  critiques:
  - agent: cs_ml_specialist
    text_quote: |-
      Table 7: SAD3-LM requires 10K diffusion steps vs. 1024 steps for autoregressive decoding; inference speed gains are modest compared to SSD-LM
    span:
    - 0
    - 141
    issue_label: Inference efficiency gap vs. autoregressive baseline
    question: |-
      One advantage of combining sequential autoregression with parallel decoding [1, 5] is improved inference speed. Here, one does 10K steps instead of 1024 steps (Table 7). What is the point of doing discrete diffusion if there is no gain over standard autoregression? While alternative modalities to autoregression are valuable, improved efficiency over standard autoregressive decoding should be the main goal. Even if direct comparison with [1, 5] is not needed, the authors should at least discuss as future work how to target these efficiency goals, possibly via diffusion distillation methods like consistency models [6].
    why_it_matters: |-
      Without demonstrating or credibly planning a path to inference speedup over autoregressive baselines, the practical motivation for the discrete diffusion approach weakens, especially given its added complexity.
    fix_suggestion: |-
      Add a discussion section on efficiency as future work and how consistency model distillation or other acceleration techniques could reduce the 10K step requirement to competitive regimes, bridging the gap to [1, 5].
    replacement: null
    severity: medium
