    - 206
    issue_label: misleading terminology and visualization
    question: |-
      The term 'prompt-based GNNs' can be misleading, as the underlying model is actually an LLM, not a GNN. Figure 2 compounds this confusion by portraying the work as a GNN-LLM combination despite the absence of a GNN module. Should the method be renamed (e.g., 'prompt-based information propagation') and Figure 2 revised to reflect the model's true nature?
    why_it_matters: |-
      Misleading terminology and visualization obscure what the method actually is, hindering accurate understanding and comparison with related work.
    fix_suggestion: |-
      Rename the method to 'prompt-based information propagation' or similar, and revise Figure 2 to show only the LLM component, removing the misleading GNN block.
