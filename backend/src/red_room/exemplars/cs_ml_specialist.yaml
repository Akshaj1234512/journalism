    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): missing HSI-specific baseline comparison (MST/MST++)
  article: Figure 5 and backbone choice of ViT variants for comparison
  critiques:
  - agent: cs_ml_specialist
    text_quote: Figure 5 and backbone choice of ViT variants for comparison
    span:
    - 0
    - 59
    issue_label: missing HSI-specific baseline comparison (MST/MST++)
    question: |-
      The backbone is ViT variants. However, the ViT is very computationally expensive because its computational complexity is quadratic to the input spatial size. MST [1] or MST++ [2] are specially designed for HSI processing with linear computational complexity. Thus, it is better to add a comparison with the spectral Transformer in Figure 5.
    why_it_matters: |-
      Failure to compare against domain-specific, efficient baselines (MST/MST++) tailored to HSI processing undermines the credibility of design choices and performance claims.
    fix_suggestion: |-
      Add comparison with MST and MST++ methods in Figure 5 to demonstrate computational efficiency and task-specific performance.
    replacement: null
    severity: high
