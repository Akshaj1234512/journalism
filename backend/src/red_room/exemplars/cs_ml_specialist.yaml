    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): limited architecture evaluation diversity
  article: |-
    Section 3.1 threat model states attackers have only access to graph data; experiments use SGC as surrogate and GCN as target
  critiques:
  - agent: cs_ml_specialist
    text_quote: |-
      Section 3.1 threat model states attackers have only access to graph data; experiments use SGC as surrogate and GCN as target
    span:
    - 0
    - 124
    issue_label: limited architecture evaluation diversity
    question: |-
      It is worth noting that the surrogate model is SGC while the target model is GCN, and they almost have extremely similar architecture. Authors are suggested to evaluate the effectiveness of the proposed method on other target GNN architectures (e.g., GAT, GraphSAGE) to follow the attack setting of this paper (section 3.1, attackers have only access to the graph data).
    why_it_matters: |-
      Evaluating only on architecturally similar models (SGC→GCN) does not demonstrate transferability; stronger claims about generality require evaluation on diverse architectures.
    fix_suggestion: |-
      Add experiments with target models GAT and GraphSAGE while keeping the surrogate as SGC, reporting attack success rates for each.
    replacement: null
    severity: high
