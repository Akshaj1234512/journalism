    ICLR.cc/2025/Conference OpenReview review (rating 10/10, confidence 4/5): ambiguous scope—tasks vs inputs vs representations
  article: |-
    The work uses 'compositional tasks', 'compositional inputs/datasets', and 'compositional representations of inputs' at various times before Section 3.1, and at times 'input' and 'representation' are used interchangeably.
  critiques:
  - agent: cs_ml_specialist
    text_quote: |-
      The work uses 'compositional tasks', 'compositional inputs/datasets', and 'compositional representations of inputs' at various times before Section 3.1, and at times 'input' and 'representation' are used interchangeably.
    span:
    - 0
    - 220
    issue_label: ambiguous scope—tasks vs inputs vs representations
    question: |-
      It is unclear whether this work is about compositional tasks, compositional inputs/datasets, or compositional representations of inputs. All three are used at various times, causing confusion about the scope being studied, especially before Section 3.1 clarifies that $z$ is the disentangled representation.
    why_it_matters: |-
      Readers cannot clearly determine what aspects of compositionality the theory applies to, undermining the clarity and generality claims of the work.
    fix_suggestion: |-
      Clarify early and consistently which of compositional tasks, inputs, or representations is the focus. Use 'input' and 'representation' distinctly and avoid using them interchangeably, especially in the discussion section.
    replacement: null
    severity: medium
