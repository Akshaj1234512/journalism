    ASAP-8 (score 35/60): emotional whiplash, sudden shift to laughter without transition
  article: |-
    The crowd started to laugh at us and our faces got beat red. Baileys mom came over to us to make sure we were all okay. She handed the baby's off to the @ORGANIZATION1 @ORGANIZATION1 manager who was there. Then @PERSON2's mom helped us up. Then we all burst into laughter.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      The crowd started to laugh at us and our faces got beat red. Baileys mom came over to us to make sure we were all okay. She handed the baby's off to the @ORGANIZATION1 @ORGANIZATION1 manager who was there. Then @PERSON2's mom helped us up. Then we all burst into laughter.
    span:
    - 0
    - 272
    issue_label: emotional whiplash, sudden shift to laughter without transition
    question: |-
      One sentence you're humiliated and embarrassed; the next you 'all burst into laughter.' What changed? Did someone say something funny? Did you realize the babies were safe? There's a gap in logic here that makes the shift feel abrupt rather than earned.
    why_it_matters: |-
      The moment when laughter saves you from embarrassment—the whole point of your essay—happens off-page, so its power is lost.
    fix_suggestion: |-
      Show the pivot: 'Baileys mom checked the babies, and when she looked up and smiled at us instead of panicking, something shifted. @PERSON2 caught my eye and started laughing—not from panic, but relief—and then I couldn't stop either.'
    replacement: null
    severity: high
- source: |-
    Feedback_Prize_ELL (score 3.3246998805754875/5): telling without scene detail, telling-not-showing
  article: |-
    Generic_Name got mad and ran away and started crying he did not like what had happen Generic_Name did not want to tell the teacher because he though it was going to get wars so he just stayed quite.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      Generic_Name got mad and ran away and started crying he did not like what had happen Generic_Name did not want to tell the teacher because he though it was going to get wars so he just stayed quite.
    span:
    - 0
    - 198
    issue_label: telling without scene detail, telling-not-showing
    question: |-
      You're listing emotions and actions—'got mad,' 'ran away,' 'crying'—but we're not *seeing* any of it. What did his face look like? Where did he run to? What was he saying to himself? Right now it reads like a summary of events, not a lived moment.
    why_it_matters: |-
      Narrative loses its power when you only report feelings instead of showing them through concrete detail and dialogue; the reader stays distant from the character's experience.
    fix_suggestion: |-
      Show the moment: 'Generic_Name's face went hot. He turned and walked out of the cafeteria, his eyes burning. In the bathroom, he locked a stall door and sat on the toilet, chest heaving, thinking: if he tells the teacher, it'll only get worse.'
    replacement: null
    severity: high
- source: 'ASAP-7 (score 18/30): incoherent syntax, unclear scene'
  article: |-
    When is someone going pinch me go I wake up... I think you should pet on. In my mind I was praying for her not to say the word, she responded, "@CAPS3."
  critiques:
  - agent: narrative_editor
    text_quote: |-
      When is someone going pinch me go I wake up... I think you should pet on. In my mind I was praying for her not to say the word, she responded, "@CAPS3."
    span:
    - 0
    - 152
    issue_label: incoherent syntax, unclear scene
    question: |-
      I'm lost here—what's actually happening? 'When is someone going pinch me go I wake up' doesn't parse, and 'I think you should pet on' seems unrelated to the moment before it. Are you describing a test being handed back? A conversation? The reader needs to see the scene, not fragments of it.
    why_it_matters: |-
      Without a clear, legible narrative sequence, the reader can't access your experience or understand why patience mattered in that moment.
    fix_suggestion: |-
      Slow down and reconstruct the scene sentence by sentence. What literally happened? Did the teacher hand back a graded paper? Did she say something critical? Write it as it unfolded: 'My teacher handed back the test with a disappointed look. She said I needed to improve my preparation.' Then show your internal reaction.
