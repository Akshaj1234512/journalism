    severity: high
- source: 'ASAP-8 (score 30/60): telling instead of showing'
  article: |-
    This first story I'm going to tell you is about @CAPS1 and @LOCATION1. I have been dating @PERSON2 for about a month now and laughter is a big part in our relationship. @PERSON2 and i like to tell jokes to each other and make each other laugh and smile.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      This first story I'm going to tell you is about @CAPS1 and @LOCATION1. I have been dating @PERSON2 for about a month now and laughter is a big part in our relationship. @PERSON2 and i like to tell jokes to each other and make each other laugh and smile.
