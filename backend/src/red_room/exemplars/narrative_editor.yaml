# Exemplars for narrative_editor
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'ASAP-8 (score 35/60): generic scene-setting, no specificity'
  article: |-
    It was @CAPS1 @ORGANIZATION1 of @DATE1, the sun was shining and the birds were chirping. It was a great @ORGANIZATION1 to be outside doing something unique to enjoy the nice weather.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      It was @CAPS1 @ORGANIZATION1 of @DATE1, the sun was shining and the birds were chirping. It was a great @ORGANIZATION1 to be outside doing something unique to enjoy the nice weather.
    span:
    - 0
    - 182
    issue_label: generic scene-setting, no specificity
    question: |-
      You're opening with weather-report details that could describe any summer day. What made *this* parade different? What do you actually remember seeing or feeling in that moment that puts us there instead of reading a postcard?
    why_it_matters: |-
      The reader has no sensory foothold or emotional entry point; we're still waiting for the story to start.
    fix_suggestion: |-
      Cut the generic setup. Start with a specific, concrete detail from the parade itself—the float moving, the costume your friend wore, the weight of the babies in your arms. Let the setting emerge through action, not description.
    replacement: null
    severity: medium
