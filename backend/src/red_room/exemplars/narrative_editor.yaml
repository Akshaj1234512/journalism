- source: 'ASAP-7 (score 18/30): telling not showing, incoherent'
  article: |-
    When I got home my mom mad the letter and agreed with it. Why did I have to fall history. Next week the out or came.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      When I got home my mom mad the letter and agreed with it. Why did I have to fall history. Next week the out or came.
    span:
    - 0
    - 116
    issue_label: telling not showing, incoherent
    question: |-
      What actually happened here? Did your mom scold you about the grade? Did you feel ashamed? And 'Why did I have to fall history' and 'Next week the out or came' don't make sense—there's a grammatical issue, but more importantly, you're skipping the emotional moment. Show us the conversation or your reaction.
    why_it_matters: |-
      You're summarizing events instead of letting the reader experience them, which drains the scene of feeling and makes it hard to follow your growth.
    fix_suggestion: |-
      Reconstruct with concrete detail: 'When I got home, my mom read the letter silently. Her face was serious. She set it down and said, "You need to study harder." I felt ashamed, but I didn't argue. I nodded and went to my room.'
