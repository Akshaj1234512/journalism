    severity: high
- source: |-
    Feedback_Prize_ELL (score 3.3878587775517346/5): vague claim, no concrete example
  article: |-
    When teacher are mad they make the student do more classwork and homework. Some time teacher will said stuff behind you. This is why student and teacher fight because the teacher make s up lie that the student did this but they did not do it so now the student get very mad at the teacher.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      When teacher are mad they make the student do more classwork and homework. Some time teacher will said stuff behind you. This is why student and teacher fight because the teacher make s up lie that the student did this but they did not do it so now the student get very mad at the teacher.
    span:
    - 0
    - 289
    issue_label: vague claim, no concrete example
    question: |-
      You're making a serious claim — that teachers make up lies and create conflict — but you give no specific example. What did a teacher say? When? To whom? Without a scene, this reads as hearsay, not evidence.
    why_it_matters: |-
      Without concrete detail, the claim feels unsupported and potentially unfair to teachers. Readers won't believe it.
    fix_suggestion: |-
      Either drop the accusation or anchor it: 'I've seen teachers blame students for behavior they didn't do, which damages trust and makes students resentful.' Or give a specific moment you witnessed or experienced.
