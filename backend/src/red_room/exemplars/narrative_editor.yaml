- source: 'ASAP-7 (score 16/30): weak sensory detail, vague action'
  article: |-
    She searched the whole house and then found them in the corner. So we were about to walk out and I said girl whats wrong with your har suprised. She felt her head and said o I forgot. So we went back in the house and I tried to put her hair in a ponytail and it wouldnt fit. So I let her do something and she couldnt. So I parted her hair and put it in two ponytails.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      She searched the whole house and then found them in the corner. So we were about to walk out and I said girl whats wrong with your har suprised. She felt her head and said o I forgot. So we went back in the house and I tried to put her hair in a ponytail and it wouldnt fit. So I let her do something and she couldnt. So I parted her hair and put it in two ponytails.
    span:
    - 0
    - 367
    issue_label: weak sensory detail, vague action
    question: |-
      This sequence moves fast but has almost no texture — 'I tried to put her hair in a ponytail and it wouldn't fit' is vague. Was it tangled? Too thick? Too short? And 'So I let her do something and she couldnt' — what *something*? The reader is lost. Slow down on the hair-braiding moment and *show* the work of helping your sister.
    why_it_matters: |-
      Without concrete detail, the scene feels rushed and generic; we don't understand what actually happened or why it mattered that you helped.
    fix_suggestion: |-
      Try: 'I pulled the comb through her thick, tangled hair. It wouldn't gather at the back of her head. Her hair kept slipping out of my fingers.' Give us the resistance — make the work visible.
