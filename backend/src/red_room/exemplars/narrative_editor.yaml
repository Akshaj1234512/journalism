- source: 'ASAP-8 (score 40/60): weak transition and narrative clarity'
  article: |-
    @PERSON3 has always been an early bird. I felt this sharp pain in my back and I shot straight up. Only to quickly realize that it was only her fist.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      @PERSON3 has always been an early bird. I felt this sharp pain in my back and I shot straight up. Only to quickly realize that it was only her fist.
    span:
    - 0
    - 148
    issue_label: weak transition and narrative clarity
    question: |-
      The jump from 'early bird' to 'I felt a sharp pain' is confusing. Are you saying @PERSON3 hit you because she wakes up early? And 'Only to quickly realize' — that's weak; you shot up *and* realized at the same time. Clarify what's happening and tighten the syntax.
    why_it_matters: |-
      The reader has to pause and re-read to understand the sequence of events, breaking the narrative momentum.
    fix_suggestion: |-
      Something like: '@PERSON3, always an early riser, woke me with a sharp jab to my back. I shot upright—only to see her grinning at me.' This clarifies cause, tightens the sentence, and keeps the action moving.
    replacement: null
    severity: medium
- source: 'AES2 (score 2/6): summary narration, no scene'
  article: |-
    I got of the boat and smelled the fresh air of New York. I had rented a home their to live in while I got some men to participate in the program. I put my stuff in the house, took my keys, got in the car, and rode of into the city.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      I got of the boat and smelled the fresh air of New York. I had rented a home their to live in while I got some men to participate in the program. I put my stuff in the house, took my keys, got in the car, and rode of into the city.
    span:
    - 0
    - 231
    issue_label: summary narration, no scene
    question: |-
      You're listing actions—rented a home, put stuff in house, got in car—like a checklist. Where's the scene? What did the city smell like? What was your emotional state walking into the house? Did anything go wrong? Right now you're *telling* me you arrived; you're not *showing* me the arrival.
    why_it_matters: |-
      Flat summary narration feels hollow and keeps readers at a distance; specific sensory detail and moment-by-moment action make narrative come alive.
    fix_suggestion: |-
      Pick one moment—walking into the rented house, or stepping out of the car in the city—and write it in real time with sensory detail and internal thought. 'I stepped out of the car and the salt air hit my face. The brownstones loomed above me, and for a moment I forgot why I was here.'
