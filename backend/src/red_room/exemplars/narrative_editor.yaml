- source: 'ASAP-7 (score 15/30): telling not showing, no sensory detail'
  article: |-
    When my @CAPS1 broke his ear-drum I was about five years old. I had to wait with my brother in the waiting room. It felt like forever. It was winter, I was in my pjs, and so bored but worried about my @CAPS1.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      When my @CAPS1 broke his ear-drum I was about five years old. I had to wait with my brother in the waiting room. It felt like forever. It was winter, I was in my pjs, and so bored but worried about my @CAPS1.
