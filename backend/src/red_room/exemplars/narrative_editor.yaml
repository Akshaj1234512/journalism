    ASAP-8 (score 35/60): telling without showing, vague claim about laughter and babies' behavior
  article: |-
    We were carrying the two twin baby's. I cant remember their names. We switched off a few times but for the most part I was holding the boy while she was holding the girl. They were well behaved baby's, they didn't cry often unless we had laughed to hard. Or yelled at the crowd too loudly.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      We were carrying the two twin baby's. I cant remember their names. We switched off a few times but for the most part I was holding the boy while she was holding the girl. They were well behaved baby's, they didn't cry often unless we had laughed to hard. Or yelled at the crowd too loudly.
    span:
    - 0
    - 289
    issue_label: telling without showing, vague claim about laughter and babies' behavior
    question: |-
      You tell us the babies didn't cry unless you laughed too hard, but you don't show us a single moment where that happened. What does a baby do when you're laughing and it startles them? Give us one small scene instead of a summary.
    why_it_matters: |-
      This is supposedly the setup for the eventual fall and the laughter that follows—but we never see the babies react to laughter, so we have no real sense of the dynamic you're describing.
    fix_suggestion: |-
      Pick one moment: 'When I laughed at something @PERSON2 said, the boy's eyes went wide and his lip quivered like he might cry, but then he smiled instead.' Show, don't summarize.
    replacement: null
    severity: medium
- source: 'ASAP-8 (score 35/60): no scene detail, rushed climax'
  article: |-
    We leaned more and more against the rail from exhaustion. We were still laughing and having a good time, but we became more and more relaxed and ended up with all of our weight pushing against the rail. Next thing we knew the rail had broken and we fell.
  critiques:
  - agent: narrative_editor
    text_quote: |-
      We leaned more and more against the rail from exhaustion. We were still laughing and having a good time, but we became more and more relaxed and ended up with all of our weight pushing against the rail. Next thing we knew the rail had broken and we fell.
    span:
    - 0
    - 254
    issue_label: no scene detail, rushed climax
    question: |-
      This is the moment the whole story builds to—the fall—but you skip right past it. What did it *feel* like? Did you hear the wood crack? Did the rail move in slow motion or snap instantly? Did you see @PERSON2's face before you hit the ground?
    why_it_matters: |-
      The climactic moment has no texture or immediacy; we're told about the fall rather than experiencing it with you.
    fix_suggestion: |-
      Slow down and show the breaking: 'I felt the wood give way under my back—not a sudden snap, but a sickening creak. The rail tilted and I was falling, still holding the girl, the float platform rushing up at us.' Give us one physical sensation.
    replacement: null
    severity: high
