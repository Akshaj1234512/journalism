    I think we should be able to use are phone at lunch periods and in the morning in case of a emergency or in case if you left something at school and we should be able to have phone or ipod in the class to listen if it is like a Friday or free time we already use them for book on ipod so why cant we are and the phone thing is bad all 14 year old student should have phone cause what if the school started on fire or you got in trouble and the office doesn't know your parent number...
  critiques:
  - agent: thesis_editor
    text_quote: |-
      I think we should be able to use are phone at lunch periods and in the morning in case of a emergency or in case if you left something at school and we should be able to have phone or ipod in the class to listen if it is like a Friday or free time we already use them for book on ipod so why cant we are and the phone thing is bad all 14 year old student should have phone cause what if the school started on fire or you got in trouble and the office doesn't know your parent number...
