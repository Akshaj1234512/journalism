- source: 'AES2 (score 2/6): thesis as question, no position'
  article: |-
    But although we use these 4-wheeled machines on a regular basis, would limiting the usage of cars be benefitial?
  critiques:
  - agent: thesis_editor
    text_quote: |-
      But although we use these 4-wheeled machines on a regular basis, would limiting the usage of cars be benefitial?
    span:
    - 0
    - 112
    issue_label: thesis as question, no position
    question: |-
      You're asking a question here, not making a claim. What's your actual argument—that we *should* limit car usage, or that we *shouldn't*? A thesis needs to tell the reader what you believe, not just pose a puzzle.
    why_it_matters: |-
      Without a clear position, the reader doesn't know what you're arguing for, so the evidence that follows feels scattered rather than purposeful.
    fix_suggestion: |-
      Replace the question with a declarative statement: 'Limiting car usage in American communities would reduce air pollution, improve public health, and increase social connection—benefits that outweigh the convenience we sacrifice.'
    replacement: null
    severity: high
- source: 'AES2 (score 2/6): vague thesis, no preview of structure'
  article: |-
    I would argue in favor of changing to election by popular vote for the president of the united states and not keeping the ellectoral college. there are many reasons why i say that and will do that.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      I would argue in favor of changing to election by popular vote for the president of the united states and not keeping the ellectoral college. there are many reasons why i say that and will do that.
    span:
    - 0
    - 197
    issue_label: vague thesis, no preview of structure
    question: |-
      Your opening tells us what you want but not why it matters or what reasoning you'll actually develop. 'Many reasons' is a placeholder—which reasons? And 'will do that' is filler. What's the stakes of this argument?
    why_it_matters: |-
      A reader has no map of where you're going, so each paragraph reads as disconnected assertion rather than unfolding logic.
    fix_suggestion: |-
      Rewrite: 'The U.S. should replace the Electoral College with a popular-vote system because it better reflects democratic principles and prevents candidates from winning despite fewer total votes.' This tells us your two main grounds upfront.
    replacement: null
    severity: high
- source: |-
    Feedback_Prize_ELL (score 3.143386438739405/5): vague thesis, no position clarity
  article: Well do you agree with me because I do think you should be honest.
  critiques:
  - agent: thesis_editor
    text_quote: Well do you agree with me because I do think you should be honest.
    span:
    - 0
    - 66
    issue_label: vague thesis, no position clarity
    question: |-
      This is your thesis? It's a question to the reader, not a claim. What exactly are you arguing — that people should *always* be honest, or that honesty is *sometimes* valuable? The essay hints at both, but this sentence doesn't commit to either.
    why_it_matters: |-
      Without a clear thesis, readers don't know what you're proving, so the reasons that follow feel scattered rather than building a case.
    fix_suggestion: |-
      Try: 'People should be honest with family and close friends, even when the truth is painful, because honesty builds real trust.' That tells us your position and hints at the nuance your essay actually explores.
    replacement: null
    severity: high
- source: 'AES2 (score 4/6): vague thesis, no clear position'
  article: |-
    Driverless cars seem like they would take over the future in about the next twenty years. When in reality technology is not pregressing as quickly as you think.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      Driverless cars seem like they would take over the future in about the next twenty years. When in reality technology is not pregressing as quickly as you think.
    span:
    - 0
    - 160
    issue_label: vague thesis, no clear position
    question: |-
      What's your actual argument here? That driverless cars won't arrive soon? That they're dangerous? That they're overhyped? Right now you're saying tech is slower than people think—but then your essay argues they're bad for society. These aren't the same claim.
    why_it_matters: |-
      Readers don't know what you're defending, so they can't follow whether your evidence supports you.
    fix_suggestion: |-
      Pick one claim and lead with it: 'Driverless cars pose serious safety and practical risks that current technology cannot yet solve' or 'Despite the hype, widespread adoption of driverless cars is at least a decade away because of unresolved liability and design issues.' Then build the essay around that.
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 3/6): thesis buried in subordination, unclear predicate'
  article: |-
    Senator i believe the electoral college should be consider changed by congress because of the many people in this great country wouldnt trust electors for voting.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      Senator i believe the electoral college should be consider changed by congress because of the many people in this great country wouldnt trust electors for voting.
    span:
    - 0
    - 162
    issue_label: thesis buried in subordination, unclear predicate
    question: |-
      What are you actually arguing for here? The main claim gets lost in the 'because' clause—is your argument about *distrust of electors*, or about whether the Electoral College should be changed? And 'should be consider changed' isn't a complete thought. Start fresh with a single, declarative sentence that tells me your position and why it matters.
    why_it_matters: |-
      A reader can't tell what you're defending, so nothing that follows feels like it's building toward a coherent point.
    fix_suggestion: |-
      Try: 'Congress should abolish the Electoral College and adopt a national popular vote because the current system disenfranchises ordinary voters and relies on electors whose loyalties and qualifications we cannot verify.' Now your claim is clear, and everything after should support one of those two reasons.
    replacement: null
    severity: high
- source: 'AES2 (score 2/6): thesis is buried and muddled'
  article: |-
    Most people might suggest to keep the electoral college work. Yet some other people don't. The method "Winner-Takes-All" is only fair enough, because why should the person who lost earn a reward , the people made their desicions, and whoever lost, goes back home.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      Most people might suggest to keep the electoral college work. Yet some other people don't. The method "Winner-Takes-All" is only fair enough, because why should the person who lost earn a reward , the people made their desicions, and whoever lost, goes back home.
    span:
    - 0
    - 263
    issue_label: thesis is buried and muddled
    question: |-
      What are you actually arguing here? Your opening says some people want to keep the Electoral College and others don't, but that's just describing disagreement, not staking a position. Then you jump to "Winner-Takes-All" and a question about fairness, but you never explain what your argument is or why the reader should care. What claim are you defending?
    why_it_matters: |-
      Without a clear thesis, your reader doesn't know what you're defending, so the evidence you pile in later doesn't land—it just looks scattered.
    fix_suggestion: |-
      Open with a direct claim: "The Electoral College should be kept because it ensures that electors—the most informed voters—make the final decision" or whatever your actual position is. Then organize your evidence around that claim.
