- source: 'AES2 (score 4/6): thesis too simple, doesn''t guide argument'
  article: |-
    Some may think that the Face was created by aliens, but the true answer is that the Face is just a natural landform.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      Some may think that the Face was created by aliens, but the true answer is that the Face is just a natural landform.
    span:
    - 0
    - 116
    issue_label: thesis too simple, doesn't guide argument
    question: |-
      Your thesis announces the conclusion, but it doesn't tell us what work the essay will do to get there. Are you refuting the alien theory, explaining why people believe it, or showing how we know it's natural? Right now it's just a flat assertion.
    why_it_matters: |-
      Readers don't know what claim you're actually defending or what the essay's structure will be, so they can't follow your reasoning.
    fix_suggestion: |-
      Revise to something like: 'While popular culture has convinced many that the Face on Mars was built by aliens, high-resolution imaging proves it is simply a natural mesa—a conclusion that also reveals how conspiracy theories thrive in the absence of clear evidence.' This signals both your conclusion and your method.
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 4/6): thesis buried in runoff; lacks clarity and structure'
  article: |-
    The author would be correct in this statement as we humans know very little about the planet because of numerous factors making it a difficult planet to study, but solving those problems would lead into advancement. Including that becuase the planet is closely related to earth, that could mean it supported life long ago. Lastly that striving to meet the challenge presented, despite the roadblocks, would lead us into many equally intimidating endeavors.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      The author would be correct in this statement as we humans know very little about the planet because of numerous factors making it a difficult planet to study, but solving those problems would lead into advancement. Including that becuase the planet is closely related to earth, that could mean it supported life long ago. Lastly that striving to meet the challenge presented, despite the roadblocks, would lead us into many equally intimidating endeavors.
    span:
    - 0
    - 456
    issue_label: thesis buried in runoff; lacks clarity and structure
    question: |-
      This reads more like three half-formed ideas tacked together than a single evaluative claim. What's your actual position on how well the author supports the idea? Does the author succeed, partially succeed, fail? And what's the order of your evidence—why these three points and not others?
    why_it_matters: |-
      A reader can't tell what you're arguing, so the essay has no spine; paragraphs that follow feel reactive rather than purposeful.
    fix_suggestion: |-
      Separate your three points into a clean thesis: 'The author effectively supports the idea that studying Venus is worthwhile by demonstrating the scientific value of overcoming its dangers, showing Venus's Earth-like past, and arguing that such challenges prepare us for future exploration.' Then deliver evidence in that order.
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 4/6): thesis frames negatives as cause, not argument'
  article: |-
    Smog, backed up traffic ways, and stress seem to be the main factor contributing to the decrease in car usage. Although these seem to be very negative factors, there are many advantages to limiting car use including helping our Planet Earth and less costly factors.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      Smog, backed up traffic ways, and stress seem to be the main factor contributing to the decrease in car usage. Although these seem to be very negative factors, there are many advantages to limiting car use including helping our Planet Earth and less costly factors.
    span:
    - 0
    - 265
    issue_label: thesis frames negatives as cause, not argument
    question: |-
      Your opening sentence treats smog and traffic as *causes* of decreased car usage, but then your thesis pivots to arguing that we *should* limit cars for advantages. Are you explaining what's already happening, or persuading readers that limiting cars is a good idea? Right now these two moves work against each other.
    why_it_matters: |-
      The reader can't tell whether you're making an argument or reporting a trend, which weakens the persuasive force of everything that follows.
    fix_suggestion: |-
      Rewrite the thesis to make a clear claim: "Limiting car usage offers significant advantages: it reduces air pollution, decreases personal and public spending, and improves public health." Drop the opening framing about what "seems" to be causing decreased usage.
    replacement: null
    severity: high
