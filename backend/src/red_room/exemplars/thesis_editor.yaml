# Exemplars for thesis_editor
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'PERSUADE_2.0 (score 3/6): thesis buried in rhetorical questions'
  article: |-
    On May 24, 2001, NASA discovered a large, shadowy figure that resembled the shape of a human face on the surface of Mars. Some are to believe this figure was created by "aliens". Was it? Or is this mysterious likeness just something as normal as a natural landform?
  critiques:
  - agent: thesis_editor
    text_quote: |-
      On May 24, 2001, NASA discovered a large, shadowy figure that resembled the shape of a human face on the surface of Mars. Some are to believe this figure was created by "aliens". Was it? Or is this mysterious likeness just something as normal as a natural landform?
    span:
    - 0
    - 265
    issue_label: thesis buried in rhetorical questions
    question: |-
      You're asking two questions here instead of stating your actual position. Why not tell your reader directly: 'The Face on Mars is a natural landform, not an alien construction'? Right now I have to infer your stance from the phrasing.
    why_it_matters: |-
      Without a clear thesis statement, your reader doesn't know what you're actually arguing for until the very last paragraph, which weakens your persuasive force.
    fix_suggestion: |-
      Replace the rhetorical questions with a direct claim: 'The Face on Mars is simply a natural landform, not evidence of alien construction.'
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 3/6): thesis states position but not argument'
  article: |-
    I agree with your newest policy because of how low our student grades have become.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      I agree with your newest policy because of how low our student grades have become.
    span:
    - 0
    - 82
    issue_label: thesis states position but not argument
    question: |-
      You tell us you agree, but why? 'Low grades' is a condition, not a reason for the B-average rule. What's the actual claim you're defending—that grades matter more than sports? That this policy will fix the problem? Right now the thesis just announces your side without previewing what you'll actually argue.
    why_it_matters: |-
      A reader doesn't know what logic you're building toward, so the evidence that follows feels scattered rather than purposeful.
    fix_suggestion: |-
      Try: 'I support requiring a B average for sports because it will force students to prioritize homework and studying over practice time, directly addressing the root of low grades at our school.' This shows the causal claim you're actually making.
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 3/6): thesis buried, unclear claim'
  article: |-
    i think is good idea because some people not have go to school for different reason .Sometimes people not have car ,by live length of school the is diffucult other because is work for your necessity personal .But is good idea for people learned and have get your diplom of high schools.
  critiques:
  - agent: thesis_editor
    text_quote: |-
      i think is good idea because some people not have go to school for different reason .Sometimes people not have car ,by live length of school the is diffucult other because is work for your necessity personal .But is good idea for people learned and have get your diplom of high schools.
    span:
    - 0
    - 286
    issue_label: thesis buried, unclear claim
    question: |-
      What's your actual argument here? You've got several reasons jammed together—transportation, work, and the diploma goal—but I don't see a clear statement of what you believe distance learning should do. Are you arguing schools *should offer* it? That students *would benefit*? Start over with one sentence that answers the prompt directly.
    why_it_matters: |-
      Readers can't follow your argument if they don't know what you're arguing for, so everything that comes after feels unfocused.
