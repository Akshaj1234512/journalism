      Beason wrestled with the power dynamics of presenting Eddie McFerrin—an older Black shoe shiner—in a sympathetic story, and ultimately chose to let McFerrin's own voice and image dominate the footage rather than photograph him from above while being served. How did that ethical deliberation reshape the storytelling?
