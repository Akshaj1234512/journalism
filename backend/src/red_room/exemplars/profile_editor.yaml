    text_quote: |-
      One of the challenges of this kind of quick piece is that I'm not there to do what the people who are there to cover it for The New York Times or The Washington Post or CNN are there to do. I'm not filing practically instantaneously. But I am doing it fast. And I have to deliver something else. What is that? One of those things is … me. Where have I put myself to report? What am I seeing and hearing? What am I feeling?
    span:
    - 0
    - 422
    issue_label: first-person authority as competitive advantage
    question: |-
      Kruse argues that on deadline, his presence—his sensibility, his observed reactions—becomes a differentiator from straight wire reporting. How does inserting the reporter's witness and judgment actually strengthen deadline narrative rather than undermine it?
    why_it_matters: |-
      It reframes the deadline constraint as an opportunity: speed forces reliance on voice and judgment, which are harder to replicate than mere factual coverage.
    fix_suggestion: |-
      On deadline, lean into what only you can offer: your reporting position, what you saw and heard directly, your informed perspective. Don't apologize for your presence; use it as the story's engine.
