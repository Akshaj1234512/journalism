    issue_label: character as emotional bridge to overwhelming topic
    question: |-
      Katie Worth identifies a core problem in climate-change journalism: the topic itself overwhelms readers into disengagement. By centering children's voices and perspectives rather than the abstract science, how does the choice of character point-of-view function as a solution to that psychological barrier?
    why_it_matters: |-
      Grounding an overwhelming systemic story in the specific, immediate experience of individual human voices makes the abstract concrete enough for audiences to remain engaged rather than turning away.
    fix_suggestion: |-
      When tackling stories that risk reader overwhelm due to scale or complexity, ask whether centering a specific human perspective—particularly one with emotional resonance—might be the formal solution, not just the narrative garnish.
