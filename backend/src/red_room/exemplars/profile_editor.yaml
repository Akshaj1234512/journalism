    - 265
    issue_label: flattening of personality in service of trauma narrative
    question: |-
      How do you honor a subject's full dimensionality—humor, mischief, sociability—while still centering their profound grief? Huber acknowledges that her published piece couldn't fully capture Delia's warmth and personality, only her pain.
    why_it_matters: |-
      Readers can feel when a profile reduces someone to their trauma; capturing humor and lightness alongside sorrow makes a person feel alive and whole rather than defined by suffering alone.
    fix_suggestion: |-
      Look for scenes that show joy, mischief, or levity in proximity to grief—not as relief from it, but as proof the subject is still present and complex. Specific examples of what made her funny work better than telling readers she was funny.
