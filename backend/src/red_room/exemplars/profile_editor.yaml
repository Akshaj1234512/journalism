# Exemplars for profile_editor
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the profile_editor lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    niemanstoryboard.org — a-final-phone-call-from-the-wildfires-inspires-an-unusual-intimate-story-written: character-revealing details embedded without official biography
  article: |-
    With a just three lightning-strike sentences high in the story, Knoll illuminates Ferguson's character: She graduated high school with a 4-month old and a 4.0 grade point average. She put herself through nursing school while pregnant and with four children. She coaches panicked women through difficult labors.
  critiques:
  - agent: profile_editor
    text_quote: |-
      With a just three lightning-strike sentences high in the story, Knoll illuminates Ferguson's character: She graduated high school with a 4-month old and a 4.0 grade point average. She put herself through nursing school while pregnant and with four children. She coaches panicked women through difficult labors.
    span:
    - 0
    - 310
    issue_label: character-revealing details embedded without official biography
    question: |-
      Rather than a traditional context paragraph or character introduction, Knoll deploys three specific biographical details that reveal Ferguson's resilience and vocation. Do these details function as sufficient character establishment in an unconventional narrative structure?
    why_it_matters: |-
      Specific, earned details about a subject can do the work of traditional character introduction—they show rather than tell, and they're memorable because they're concrete.
    fix_suggestion: |-
      When you can't rely on traditional biographical scaffolding, gather the most revealing specific details about your subject (achievements, choices, patterns of behavior) and deploy them early to establish who they are before readers need to understand their interior life.
    replacement: null
    severity: medium
