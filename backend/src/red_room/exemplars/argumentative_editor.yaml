- source: 'AES2 (score 3/6): unsupported leap; claim without evidence'
  article: |-
    Finding another place to substain human life is a nessisary thing because of the growing population on Earth ,and the ever present threat of gobal warming.
  critiques:
  - agent: argumentative_editor
    text_quote: |-
      Finding another place to substain human life is a nessisary thing because of the growing population on Earth ,and the ever present threat of gobal warming.
    span:
    - 0
    - 155
    issue_label: unsupported leap; claim without evidence
    question: |-
      You're claiming we need a backup planet because of population growth and climate change, but you don't show us why Venus study leads to that outcome. How does studying Venus's atmosphere help us find or sustain life elsewhere? That gap needs bridging.
    why_it_matters: |-
      Your argument fragments into separate claims—studying Venus and the need for colonization—without showing how one supports the other, weakening the whole piece.
    fix_suggestion: |-
      Explain the causal chain: 'Studying Venus requires us to develop technologies and understand planetary habitability in ways that would directly advance our ability to engineer livable conditions elsewhere. That knowledge pipeline makes Venus research essential, not tangential, to long-term human survival.'
