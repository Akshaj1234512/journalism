- source: 'AES2 (score 2/6): vague, unsupported final claim'
  article: |-
    Striving to meet the challenge presented by Venus has value, not only because of the insight to be gained on the planet itself, but also because human curiousity will likely lead us into many equally imtimidating endeavors.
  critiques:
  - agent: argumentative_editor
    text_quote: |-
      Striving to meet the challenge presented by Venus has value, not only because of the insight to be gained on the planet itself, but also because human curiousity will likely lead us into many equally imtimidating endeavors.
    span:
    - 0
    - 223
    issue_label: vague, unsupported final claim
    question: |-
      What does this actually mean? You're saying studying Venus is valuable because it will lead us into other hard things — but that's circular. Why is *that* valuable? And how does it support your original argument about why we should study Venus specifically? This feels like a conclusion that doesn't land.
    why_it_matters: |-
      Your essay ends without a clear payoff or final insight; the reader is left wondering what you proved.
    fix_suggestion: |-
      End with a concrete stakes claim tied to your opening: 'Understanding Venus's atmospheric collapse offers crucial lessons for protecting Earth's climate and justifies the investment in robotic innovation.'
    replacement: null
    severity: high
- source: 'AES2 (score 2/6): rhetorical question replaces evidence, vague benefit'
  article: |-
    Another thing is that you can help people and make someone happy. Don't you just love the joy you get when you help someone in need? Well you can have that feeling all the time if you volunteer because you are always helping people in need by giving them animals to eat.
  critiques:
  - agent: argumentative_editor
    text_quote: |-
      Another thing is that you can help people and make someone happy. Don't you just love the joy you get when you help someone in need? Well you can have that feeling all the time if you volunteer because you are always helping people in need by giving them animals to eat.
    span:
    - 0
    - 270
    issue_label: rhetorical question replaces evidence, vague benefit
    question: |-
      The rhetorical question ('Don't you love...?') assumes I care about *feeling good*—but so what? And 'giving animals to eat' is vague. Which people? What animals? Why is this better than other ways to help?
