    text_quote: |-
      If you join Seagoing Cow boys you will need to treat the workers and the animals with good respect and care for them. When being a Seagoing Cowboy you will need to check on the animals every hour... You can be 17 and older to join Seagoing Cowboys. So join the Seagoing Cowboys.
    span:
    - 0
    - 278
    issue_label: list of facts instead of argument
    question: |-
      You're telling me what the job *is*, but never making the case for *why* someone should do it. The essay reads like a job description, not a persuasive argument. What's the payoff?
    why_it_matters: |-
      An argumentative essay needs to move the reader toward a position; listing duties and requirements just informs them, which is a different task entirely.
    fix_suggestion: |-
      Reshape around a real claim: perhaps that the hardship teaches responsibility, or that the adventure builds courage. Then use details like 'checking animals every hour' and 'dangerous ladder work' as *evidence* that it's difficult and character-building, not just facts about the job.
