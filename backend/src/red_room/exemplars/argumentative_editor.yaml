# Exemplars for argumentative_editor
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'PERSUADE_2.0 (score 3/6): vague benefit, no specific argument'
  article: |-
    You are going to learn so much. You could rome around excavated castles like Luke in passage five. You would learn about other countries. Their goverment, economy, and lifestyle. Their past,present, and future. Could you imagine how fun that would be? Can you imagine all the good you would be for your country?
  critiques:
  - agent: argumentative_editor
    text_quote: |-
      You are going to learn so much. You could rome around excavated castles like Luke in passage five. You would learn about other countries. Their goverment, economy, and lifestyle. Their past,present, and future. Could you imagine how fun that would be? Can you imagine all the good you would be for your country?
    span:
    - 0
    - 311
    issue_label: vague benefit, no specific argument
    question: |-
      You list things Luke saw—castles, countries—but why does *learning about government, economy, and lifestyle* persuade someone to join? What's the actual argument—that travel makes you smarter? A better citizen? That's never clarified.
    why_it_matters: |-
      Without a clear link between the details and the benefit, the paragraph reads as decoration, not persuasion.
    fix_suggestion: |-
      Pick one concrete benefit and argue it: 'Learning about other economies and governments prepares you to be a more informed American voter and leader.' Then anchor Luke's castle-visit to that claim.
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 3/6): unaddressed counter-argument'
  article: |-
    All the students an our school could have good grades and participate in sports and yet most don't. Your new policy will get them in line and doing extra credit, studying, and doing all of their homework to stay on the team.
  critiques:
  - agent: argumentative_editor
    text_quote: |-
      All the students an our school could have good grades and participate in sports and yet most don't. Your new policy will get them in line and doing extra credit, studying, and doing all of their homework to stay on the team.
    span:
    - 0
    - 224
    issue_label: unaddressed counter-argument
    question: |-
      You're assuming the B-average policy will motivate students to study harder. But what if it just kicks struggling students off teams entirely? You haven't considered whether the policy actually *helps* low-performing students improve or just removes them from an activity that might keep them engaged in school. That's a big counterargument you're ignoring.
    why_it_matters: |-
      Your argument only works if you believe students will respond to the consequence by studying more—but you don't defend that assumption against the obvious objection that they might just give up.
    fix_suggestion: |-
      Address it directly: 'Some might worry the policy is too harsh, but if paired with mandatory tutoring and study periods, it sends a clear message that grades come first—which struggling students need to hear.'
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 3/6): emotional claim without logic'
  article: |-
    By changing the voting system to popular vote i think makes people feel more involved in whats actually happening instead of just one measly vote.
  critiques:
  - agent: argumentative_editor
    text_quote: |-
      By changing the voting system to popular vote i think makes people feel more involved in whats actually happening instead of just one measly vote.
    span:
    - 0
    - 146
    issue_label: emotional claim without logic
    question: |-
      You're saying people will *feel* more involved—but is that actually true, and does it matter? Feeling involved isn't the same as the system being more democratic. And why is a popular vote less 'measly' than an Electoral vote? You need a logical reason, not a feeling.
    why_it_matters: |-
      Your argument relies on sentiment instead of substance, which won't persuade a skeptical reader or someone who might argue that individual votes are equally 'measly' in a 130-million-person election.
    fix_suggestion: |-
      Reframe: 'A popular vote system would ensure that every vote counts equally toward the outcome, regardless of state. Under the Electoral College, a vote in a non-competitive state effectively doesn't matter.' This is logic, not psychology.
    replacement: null
    severity: medium
- source: 'AES2 (score 2/6): garbled evidence, missing counter-argument'
  article: |-
    secondly, in the last passage ms. rosenthal says "obamas gaol about the green house gas will be asisted so thats meaning the people will need to limit their car usage or he will.
  critiques:
  - agent: argumentative_editor
    text_quote: |-
      secondly, in the last passage ms. rosenthal says "obamas gaol about the green house gas will be asisted so thats meaning the people will need to limit their car usage or he will.
    span:
    - 0
    - 178
    issue_label: garbled evidence, missing counter-argument
    question: |-
      What is Obama's goal, and how does it support your argument? This sentence is hard to parse, but more importantly: you cite authority (Obama's goal) without explaining how it proves that limiting car usage is the *right* policy. What if someone argues that people shouldn't be forced to limit car usage? You never address that.
    why_it_matters: |-
      Without a counter-argument, your essay reads as one-sided assertion rather than reasoned argument.
    fix_suggestion: |-
      Acknowledge the counter: 'Some argue cars provide freedom and convenience. But climate data shows that voluntary limits fail; enforced restrictions, as in Vauban, succeed.' Then explain why success matters more than individual choice.
