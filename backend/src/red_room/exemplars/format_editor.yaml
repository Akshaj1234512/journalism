# Exemplars for format_editor
# Pulled from real OpenReview reviews on ICLR 2024 / ICLR 2025 /
# NeurIPS 2023 (filtered to confidence>=4 reviewers, weaknesses
# field 200-2500 words, must reference a specific anchor like
# Table/Fig/Section/Eq number). Classified by lane via Claude Haiku
# and the top 10 by quality score selected.
#
- source: |-
    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): undefined term, no citation
  article: Section 3 mentions negative data augmentation
  critiques:
  - agent: format_editor
    text_quote: Section 3 mentions negative data augmentation
    span:
    - 0
    - 45
    issue_label: undefined term, no citation
    question: |-
      In Section 3, please explain what is negative data augmentation, this term is not clear from the context of the paper and no citation for further information is provided.
    why_it_matters: |-
      Readers cannot understand or reproduce a core component of the method if the terminology is undefined and unexplained.
    fix_suggestion: |-
      Define negative data augmentation in text or add a citation explaining the concept.
    replacement: null
    severity: medium
- source: |-
    NeurIPS.cc/2023/Conference OpenReview review (rating 6/10, confidence 5/5): Missing promised appendix content
  article: |-
    Section 4.1 and Appendix; paper states 'detailed hyperparams are listed in the appendix' and promises content 'in the appendix'
  critiques:
  - agent: format_editor
    text_quote: |-
      Section 4.1 and Appendix; paper states 'detailed hyperparams are listed in the appendix' and promises content 'in the appendix'
    span:
    - 0
    - 127
    issue_label: Missing promised appendix content
    question: |-
      Section 4.1 promises detailed hyperparameters in the appendix, but none are actually there. What other promised content is missing from the appendix?
    why_it_matters: |-
      Missing appendix sections break reproducibility and undermine the authors' checklist claims of including training details.
    fix_suggestion: Add all promised hyperparameter and methodological details to the appendix.
    replacement: null
    severity: high
- source: |-
    NeurIPS.cc/2023/Conference OpenReview review (rating 8/10, confidence 4/5): missing RASP syntax figure, incomplete appendix
  article: |-
    Section 3 describes RASP operations (`select`, `selector_width`, `aggregate`, element-wise operations) but lacks a syntax figure; Appendix B.3 is incomplete and does not define `selector_width`.
  critiques:
  - agent: format_editor
    text_quote: |-
      Section 3 describes RASP operations (`select`, `selector_width`, `aggregate`, element-wise operations) but lacks a syntax figure; Appendix B.3 is incomplete and does not define `selector_width`.
    span:
    - 0
    - 194
    issue_label: missing RASP syntax figure, incomplete appendix
    question: |-
      In Section 3, it could help to include a figure with RASP's syntax to understand the specific functions that must be compiled. `selector_width` isn't mentioned until Section 4.2, and Appendix B.3, while helpful, still does not define it.
    why_it_matters: |-
      Readers unfamiliar with RASP struggle to parse which operations are supported and which are not, disrupting comprehension of the compiler's scope.
    fix_suggestion: |-
      Add a figure in Section 3 with RASP syntax, including formal definitions of all core operations (`select`, `selector_width`, `aggregate`), and list unsupported operations.
    replacement: null
    severity: medium
- source: |-
    ICLR.cc/2025/Conference OpenReview review (rating 8/10, confidence 4/5): crucial methods relegated to appendix
  article: |-
    Section 3 includes a lot in section 4 such as description of FullDistribution SAE, Task SAE, TopK, Gated SAE etc. There are crucial formulae and methods that should be in the main text, but instead they are in the Appendix. For instance, the necessity formula in Section 7.4 ~line 878 in the appendix.
  critiques:
  - agent: format_editor
    text_quote: |-
      Section 3 includes a lot in section 4 such as description of FullDistribution SAE, Task SAE, TopK, Gated SAE etc. There are crucial formulae and methods that should be in the main text, but instead they are in the Appendix. For instance, the necessity formula in Section 7.4 ~line 878 in the appendix.
    span:
    - 0
    - 301
    issue_label: crucial methods relegated to appendix
    question: |-
      Why are essential method descriptions (FullDistribution SAE, Task SAE, TopK, Gated SAE) and the necessity formula scattered across Section 4 and Appendix 7.4 instead of consolidated in the main text where they support results?
    why_it_matters: |-
      Readers cannot understand or reproduce key experimental setup without jumping between sections, and the critical necessity evaluation formula is buried where it cannot properly motivate the results.
    fix_suggestion: |-
      Move crucial formulae like the necessity score (Section 7.4, line ~878) and SAE variant descriptions into the main text before their first use in results. Reorganize Sections 3–4 to present methods before results.
    replacement: null
    severity: high
- source: |-
    ICLR.cc/2025/Conference OpenReview review (rating 8/10, confidence 4/5): exploratory content misplaced in main text
  article: |-
    The section on "Interpretability" such as in Section 3.2, Figure 5 and Section 4.4 are out of place. The author even mentioned that "we stress that this experiment is of a rather exploratory and qualitative nature".
  critiques:
  - agent: format_editor
    text_quote: |-
      The section on "Interpretability" such as in Section 3.2, Figure 5 and Section 4.4 are out of place. The author even mentioned that "we stress that this experiment is of a rather exploratory and qualitative nature".
    span:
    - 0
    - 215
    issue_label: exploratory content misplaced in main text
    question: |-
      Why does the paper include exploratory, qualitative interpretability experiments (Section 3.2, Figure 5, Section 4.4) in the main narrative when the authors themselves acknowledge their speculative nature?
    why_it_matters: |-
      Mixing exploratory findings with rigorous quantitative results blurs the paper's narrative focus and suggests the authors are unsure of their core contributions.
    fix_suggestion: |-
      Move Sections 3.2, Figure 5, and Section 4.4 to the appendix to keep the main text focused on the core necessity/sufficiency/control evaluations.
    replacement: null
    severity: medium
