      Section 2.2 defines the problem setting but does not clearly state whether prediction Ŷ and observed outcome Y are nodes in the causal graph.
    span:
    - 0
    - 141
    issue_label: Causal graph node definitions missing
    question: |-
      Please clearly state that prediction Ŷ is regarded as a node (an endogenous variable) in the causal graph in Section 2.2. Otherwise, it is difficult to understand the problem setting. Is observed outcome Y also a node in the causal graph?
    why_it_matters: |-
      Ambiguity about whether Ŷ and Y are causal graph nodes makes it difficult to understand how the counterfactual fairness constraints formally apply.
    fix_suggestion: |-
      Explicitly define whether Ŷ, Y, or both appear as nodes in the causal graph, and clarify the distinction between observed and predicted outcomes in the graphical model.
    replacement: null
    severity: medium
