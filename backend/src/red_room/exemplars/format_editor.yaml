    span:
    - 0
    - 178
    issue_label: main results relegated to appendix
    question: |-
      Section 4 contains essentially no technical content but reads technically; it's more of an advertisement for the appendix. Why not include at least one actual technical result (e.g., Theorem 2 from the appendix) in the main body to make clear what has been proven?
    why_it_matters: |-
      Readers cannot understand what was proven or what technical tools were used without reading the appendix, which 99% of readers will not do, leaving the paper's main contributions unclear.
    fix_suggestion: |-
      Add at least one actual technical result to the main body (e.g., Theorem 2 from the appendix). Move Proposition 1 (which is obvious and doesn't require proof) to the appendix. Make clear what technical statement backs each claim in Section 4.
    replacement: null
    severity: high
- source: |-
    NeurIPS.cc/2023/Conference OpenReview review (rating 6/10, confidence 4/5): balance between main text and appendix broken
  article: |-
    Section 4: paper is needlessly complex while presenting almost no theoretical detail in the main manuscript. The hybrid of deferring detail to appendix while writing technically is not effective.
  critiques:
  - agent: format_editor
    text_quote: |-
      Section 4: paper is needlessly complex while presenting almost no theoretical detail in the main manuscript. The hybrid of deferring detail to appendix while writing technically is not effective.
    span:
    - 0
    - 195
    issue_label: balance between main text and appendix broken
    question: |-
      The paper strikes a strange balance of being needlessly complex while presenting almost no theoretical detail in the main manuscript. It's fine to defer the most general form to the appendix, but the current hybrid is not effective. Why not rewrite Section 4 to be either more applied (explaining what you do) or more theoretical (including main results)?
    why_it_matters: |-
      The paper is unclear about its contributions and technical approach, reducing its impact and accessibility.
    fix_suggestion: |-
      Restructure Section 4 by: (1) including at least one complete technical result (e.g., Theorem 2) with proof sketch, (2) removing obvious propositions, and (3) adopting a consistent tone aimed at a single audience (theorist or applied statistician).
    replacement: null
    severity: high
