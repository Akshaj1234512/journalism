    - 215
    issue_label: exploratory content misplaced in main text
    question: |-
      Why does the paper include exploratory, qualitative interpretability experiments (Section 3.2, Figure 5, Section 4.4) in the main narrative when the authors themselves acknowledge their speculative nature?
