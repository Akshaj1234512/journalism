# Exemplars for reviews_editor
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the reviews_editor lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    www.theguardian.com — tuner-review-leo-woodall-dustin-hoffman: sharp performance contrast with canon context
  article: |-
    Leo Woodall's breakout TV roles in The White Lotus and One Day offered a megawatt charisma, but for his biggest film role to date he dims it to a soft glow with gentle performance opposite Dustin Hoffman
  critiques:
  - agent: reviews_editor
    text_quote: |-
      Leo Woodall's breakout TV roles in The White Lotus and One Day offered a megawatt charisma, but for his biggest film role to date he dims it to a soft glow with gentle performance opposite Dustin Hoffman
    span:
    - 0
    - 203
    issue_label: sharp performance contrast with canon context
    question: |-
      This grounds the performance claim in Woodall's prior work and uses a specific image ('dims it to a soft glow') to show what the performance does differently. Does the review sustain this kind of specificity, or revert to generality later?
    why_it_matters: |-
      Anchoring a performance judgment in prior work + concrete visual language makes the claim credible and lets readers calibrate what they're about to see.
    fix_suggestion: |-
      When describing acting, return to this move: name prior work, then specify what changes (tone, energy, restraint) with a concrete image.
    replacement: null
    severity: medium
- source: |-
    www.theguardian.com — tuner-review-leo-woodall-dustin-hoffman: unsupported thematic claim + authorial-intent pivot
  article: |-
    The scene taps into an undercurrent of class consciousness; the script is co-written by director Daniel Roher, a documentary maker who won an Oscar for his 2022 documentary Navalny, and Tuner is his feature-film debut.
  critiques:
  - agent: reviews_editor
    text_quote: |-
      The scene taps into an undercurrent of class consciousness; the script is co-written by director Daniel Roher, a documentary maker who won an Oscar for his 2022 documentary Navalny, and Tuner is his feature-film debut.
    span:
    - 0
    - 218
    issue_label: unsupported thematic claim + authorial-intent pivot
    question: |-
      The review asserts a class-consciousness undercurrent exists in the scene, then immediately shifts to director biography as if that explains or proves it. What exactly in the scene shows class consciousness? How does knowing Roher's doc background support the reading?
    why_it_matters: |-
      Missing the textual evidence for the thematic claim weakens it; pivoting to biography can feel like you're explaining away the work rather than analyzing it.
    fix_suggestion: |-
      If you spot a theme, quote or describe the specific moment that carries it—what does Ruthie say or do that reveals class dynamics? Only invoke biography if it directly illuminates a choice the film makes.
    replacement: null
    severity: high
- source: |-
    www.theguardian.com — criminal-review-homelessness-show-delivers-a-rage-making-punch-in-the-gut: specificity-through-sensory-detail-then-inversion
  article: |-
    A trim caravan sits in an idyllic garden in the grounds of a former gatehouse. Its cosy interior is decked with a cornucopia of crafts: pastel-coloured bunting, felt embroidery, a bright rag rug, plumply immaculate cushions. On the sideboard is a small display of pristine china. It feels like a glamping retreat or a chi-chi refuge from the Chelsea flower show. But look more closely at the china, and you'll see that it's decorated with Sun newspaper headlines venomously fulminating against Gypsy and Traveller encampments.
  critiques:
  - agent: reviews_editor
    text_quote: |-
      A trim caravan sits in an idyllic garden in the grounds of a former gatehouse. Its cosy interior is decked with a cornucopia of crafts: pastel-coloured bunting, felt embroidery, a bright rag rug, plumply immaculate cushions. On the sideboard is a small display of pristine china. It feels like a glamping retreat or a chi-chi refuge from the Chelsea flower show. But look more closely at the china, and you'll see that it's decorated with Sun newspaper headlines venomously fulminating against Gypsy and Traveller encampments.
    span:
    - 0
    - 526
    issue_label: specificity-through-sensory-detail-then-inversion
    question: |-
      This passage uses close visual description and a sensory walk-through to set up the show's central strategy—juxtaposing beauty with violence. The 'But look more closely' signals the turn where the installation's critique lives. How does anchoring the abstraction (criminalisation) in material detail make the argument land harder than a statement could?
    why_it_matters: |-
      Concrete description of what visitors actually see and touch makes the show's conceptual argument visceral; it's the difference between 'the installation critiques media bias' and watching the bias bloom from a china teacup.
    fix_suggestion: |-
      When reviewing exhibitions or design, lead with what the visitor encounters before naming the idea. Let the sensory path guide the argument.
    replacement: null
    severity: medium
- source: |-
    www.theguardian.com — criminal-review-homelessness-show-delivers-a-rage-making-punch-in-the-gut: position-stated-early-with-metaphor
  article: |-
    Criminal: An Untold Story of Homelessness, Resistance and Survival, a compact yet punchy assemblage of installations, collaborations and infographics that hits you in the gut like a nimble flyweight boxer.
  critiques:
  - agent: reviews_editor
    text_quote: |-
      Criminal: An Untold Story of Homelessness, Resistance and Survival, a compact yet punchy assemblage of installations, collaborations and infographics that hits you in the gut like a nimble flyweight boxer.
    span:
    - 0
    - 205
    issue_label: position-stated-early-with-metaphor
    question: |-
      The review delivers a clear valuation by line 3—'hits you in the gut'—and uses a specific metaphor (nimble flyweight, not heavyweight brutality) that captures both the show's scale and its agility. Does the metaphor do work beyond 'this is powerful'? What does 'flyweight' tell us about the show's approach?
    why_it_matters: |-
      A precise metaphor (not just 'packs a punch') signals the critic has thought about *how* the show works, not just *whether* it's good.
    fix_suggestion: |-
      When using metaphors to describe impact, choose one that illuminates the show's actual strategy or form, not just its intensity.
    replacement: null
    severity: medium
