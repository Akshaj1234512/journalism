- source: 'www.avclub.com — deep-water-review: sharp position with vivid evidence'
  article: |-
    Harlin's at his ghoulish best when he's toying with viewers' emotions during the shark-centric scenes of Deep Water, the best of which will make you holler with glee given their crowd-pleasing, over-the-top violence.
  critiques:
  - agent: reviews_editor
    text_quote: |-
      Harlin's at his ghoulish best when he's toying with viewers' emotions during the shark-centric scenes of Deep Water, the best of which will make you holler with glee given their crowd-pleasing, over-the-top violence.
    span:
    - 0
    - 216
    issue_label: sharp position with vivid evidence
    question: |-
      This is strong craft. You've named Harlin's authorial signature ('ghoulish,' 'toying'), identified the genre function ('crowd-pleasing'), and predicted the effect ('holler with glee'). The accumulation of claims is proportional to the evidence.
    why_it_matters: |-
      This sentence tells readers *and* other critics what Harlin is actually doing in the film, with enough specificity that they can test the claim.
    fix_suggestion: |-
      This is a model. When you have this kind of clarity, you can trust it to carry weight without additional hedging or scene recaps.
    replacement: null
    severity: medium
- source: |-
    www.avclub.com — bridgerton-season-4-volume-1-review-netflix: Plot summary as substitute for analysis
  article: |-
    The two escape his family's party to waltz in the garden and share personal thoughts, forging a strong connection and a kiss that neither wants to forget. The catch? Benedict is a member of the upper echelons of London society, while Sophie works as a maid under the strict rule of her overbearing stepmother (played by Harry Potter's Katie Leung).
  critiques:
  - agent: reviews_editor
    text_quote: |-
      The two escape his family's party to waltz in the garden and share personal thoughts, forging a strong connection and a kiss that neither wants to forget. The catch? Benedict is a member of the upper echelons of London society, while Sophie works as a maid under the strict rule of her overbearing stepmother (played by Harry Potter's Katie Leung).
    span:
    - 0
    - 348
    issue_label: Plot summary as substitute for analysis
    question: |-
      Two paragraphs recap the Cinderella setup and the class-divide obstacle without examining *how* the show dramatizes this tension or what the writers do with it thematically. Does the obstacle feel inevitable or contrived? How does the script handle the power imbalance? The reader learns the story but not the show's craft choices.
    why_it_matters: |-
      Summarizing plot points is not reviewing. It tells readers what happens, not whether or how well it's executed.
    fix_suggestion: |-
      After the plot setup, dig into one scene that shows how the class divide creates actual friction—a line of dialogue, a moment of shame or fear in Ha's or Thompson's face. That scene becomes evidence of the show's thematic ambition.
    replacement: null
    severity: high
