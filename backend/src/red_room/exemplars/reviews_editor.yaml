    pitchfork.com — angine-de-poitrine-vol-ii: specific craft analysis with quoted evidence
  article: |-
    What makes Angine de Poitrine special is how they wiggle and writhe within that structure, filling the grid with weird rhythmic curlicues, ill-timed accents, and unlikely hooklets. Khn's riffs span large gulfs of time so they lose their familiar shape, punctuating the air in strange polygons.
  critiques:
  - agent: reviews_editor
    text_quote: |-
      What makes Angine de Poitrine special is how they wiggle and writhe within that structure, filling the grid with weird rhythmic curlicues, ill-timed accents, and unlikely hooklets. Khn's riffs span large gulfs of time so they lose their familiar shape, punctuating the air in strange polygons.
    span:
    - 0
    - 293
    issue_label: specific craft analysis with quoted evidence
    question: |-
      The reviewer moves past genre-name-dropping to show *how* the band creates rhythmic illusion. 'Filling the grid with weird rhythmic curlicues' and 'polygons' are sensory descriptions tied to the actual compositional move (creating illusions within a locked meter). This is the bar for musical analysis.
    why_it_matters: |-
      Readers understand not just that the band is complex, but *why* it works—the mechanism underneath the strangeness.
    fix_suggestion: |-
      When analyzing instrumental music, ground abstract praise ('special,' 'thrilling') in specific moments and sensory language. This reviewer does it well here.
    replacement: null
    severity: medium
