    pitchfork.com — angel-dust-cold-2-the-touch: subculture context as interpretive frame
  article: |-
    What makes Angel Du$t's evolution fulfilling is that it's never been an attempt to grow out of hardcore. They load their songs with acoustic twiddles and picnicky melodies while regularly playing hardcore festivals, touring with much heavier bands, and encouraging stage-dive mayhem at their shows, maintaining a firm foothold in a subculture that has little tolerance for "too cool" maturations.
  critiques:
  - agent: reviews_editor
    text_quote: |-
      What makes Angel Du$t's evolution fulfilling is that it's never been an attempt to grow out of hardcore. They load their songs with acoustic twiddles and picnicky melodies while regularly playing hardcore festivals, touring with much heavier bands, and encouraging stage-dive mayhem at their shows, maintaining a firm foothold in a subculture that has little tolerance for "too cool" maturations.
    span:
    - 0
    - 396
    issue_label: subculture context as interpretive frame
    question: |-
      The reviewer uses hardcore's actual values (anti-pretense, DIY loyalty) to explain why the band's genre-blending works where it might fail for others. Does this contextualize the musical choices in a way that pure sonic analysis wouldn't?
    why_it_matters: |-
      It prevents the review from treating the album in a vacuum. The music only makes sense—and the 'balance' claim only holds—if you understand the subcultural constraints the band is working within.
    fix_suggestion: |-
      When a band operates within a specific scene or tradition, name that tradition and show how the album negotiates it. This elevates the review beyond taste.
    replacement: null
    severity: medium
