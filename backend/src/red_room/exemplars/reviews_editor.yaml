    text_quote: |-
      It's still refreshing to see both men take their obligations seriously, not just out of professional responsibility, but because they want to set a good example, like when Ben tries to reassure the snarky but worried gradeschooler Cora (Molly Wright), who's traveling with her father (Ryan Brown), stepmother (Kelly Gale), and stepbrother Finn (Elijah Tamati).
