    issue_label: plot summary replacing analysis
    question: |-
      You're describing what happens in the scene, not examining how the filmmaking or performance creates the effect you're claiming. What visual, tonal, or performative choice makes us *feel* that Eckhart's taking his obligation seriously?
    why_it_matters: |-
      Plot recaps are reading notes, not criticism. Readers need analysis of craft to understand why this moment works.
