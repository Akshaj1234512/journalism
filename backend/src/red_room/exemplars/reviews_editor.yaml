    - 0
    - 200
    issue_label: unsupported claim about actor range
    question: |-
      What evidence from *Deep Water* shows Eckhart being 'unabashedly corny' here? The comparison to *I, Frankenstein* is external; you need a scene or a line from this film that demonstrates the specific quality you're praising.
