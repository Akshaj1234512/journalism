# Exemplars for prose_style
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'PERSUADE_2.0 (score 3/6): false dichotomy + comma splice'
  article: |-
    Unlike those people who sit at home doing nothing you could help out your country.
  critiques:
  - agent: prose_style
    text_quote: |-
      Unlike those people who sit at home doing nothing you could help out your country.
    span:
    - 0
    - 82
    issue_label: false dichotomy + comma splice
    question: |-
      This sentence sets up a false choice—either you join the Seagoing Cowboys or you're doing nothing—and it runs two independent clauses together without a conjunction or period. Split it, and soften the either/or.
    why_it_matters: |-
      The harsh, unsupported claim undermines your credibility, and the comma splice is a sentence-level error that distracts readers.
    fix_suggestion: |-
      Try: 'By joining the Seagoing Cowboys, you contribute meaningfully to your country. Others who stay home miss this chance to serve.' This avoids the strawman and fixes the splice.
    replacement: null
    severity: medium
- source: 'PERSUADE_2.0 (score 3/6): wordiness, repetition, weak construction'
  article: |-
    This simple way is a easy grade raiser. These low grades could easily be raised by studying. All we have to do is do thirty minutes of studying and we could raise our grades and test scores instead of practicing for that game.
  critiques:
  - agent: prose_style
    text_quote: |-
      This simple way is a easy grade raiser. These low grades could easily be raised by studying. All we have to do is do thirty minutes of studying and we could raise our grades and test scores instead of practicing for that game.
    span:
    - 0
    - 226
    issue_label: wordiness, repetition, weak construction
    question: |-
      You're saying the same thing three times in a row—'easy grade raiser,' 'easily be raised,' 'All we have to do is do'—and the sentence structure is clunky ('do is do'). Where's the punch? Cut the repetition and tighten the claim.
    why_it_matters: |-
      The reader stops trusting your voice; it sounds like you're padding to hit a word count rather than thinking clearly.
    fix_suggestion: |-
      Combine into one strong sentence: 'Thirty minutes of daily studying would raise test scores more effectively than an extra practice session.' Then move on to your next piece of evidence.
    replacement: null
    severity: medium
