- source: 'AES2 (score 2/6): vague, colloquial phrasing'
  article: |-
    Yes, that may be true, but again, when the people vote, they only want what they want, no jokes.
  critiques:
  - agent: prose_style
    text_quote: |-
      Yes, that may be true, but again, when the people vote, they only want what they want, no jokes.
    span:
    - 0
    - 96
    issue_label: vague, colloquial phrasing
    question: |-
      What does 'they only want what they want, no jokes' mean? This sounds like something you'd say in conversation, but in an essay arguing for the Electoral College, you need to say what you actually mean. Do you mean voters are acting in self-interest? That they're decisive? You can't ask the reader to guess.
    why_it_matters: |-
      Vague language makes your argument sound unserious and gives readers no clear claim to evaluate or push back on.
    fix_suggestion: |-
      Try: 'When citizens vote, they are expressing a clear preference, and that preference should be honored by their state's electors' or whatever your real point is.
    replacement: null
    severity: medium
