- source: 'AES2 (score 4/6): fragment, passive voice, vague verb'
  article: |-
    Even though a few scientest believe the Face was an alien artifact, photos show otherwise. On April 5, 1998 they snapped a picture and discovered it was simply a natural landform, not an alien monument. At first the photos weren't very convincing to either side, but once they were able to enhance technology the photo came out clearer. Which allowed scientests at NASA to examine it further and finally classify it.
  critiques:
  - agent: prose_style
    text_quote: |-
      Even though a few scientest believe the Face was an alien artifact, photos show otherwise. On April 5, 1998 they snapped a picture and discovered it was simply a natural landform, not an alien monument. At first the photos weren't very convincing to either side, but once they were able to enhance technology the photo came out clearer. Which allowed scientests at NASA to examine it further and finally classify it.
    span:
    - 0
    - 416
    issue_label: fragment, passive voice, vague verb
    question: |-
      You have a sentence fragment starting with 'Which'—that's a comma splice waiting to happen. Also, 'they were able to enhance technology' is passive and vague. Who enhanced it? What specifically did they do?
    why_it_matters: |-
      Fragments and vague phrasing make you sound less authoritative on a technical topic where precision matters.
    fix_suggestion: |-
      Revise: 'On April 5, 1998, NASA captured a high-resolution image that revealed the Face as a natural landform. Early photos had been unconvincing to both skeptics and believers, but as NASA enhanced imaging technology, the details became clear enough for scientists to classify it definitively.'
    replacement: null
    severity: medium
