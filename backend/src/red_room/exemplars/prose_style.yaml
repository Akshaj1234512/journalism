- source: 'PERSUADE_2.0 (score 3/6): mangled syntax, missing verb'
  article: |-
    Even as the text says Who are the electors, they can someone not holding a public State office, who picks them , and we cant even vote on who the electors should be.
  critiques:
  - agent: prose_style
    text_quote: |-
      Even as the text says Who are the electors, they can someone not holding a public State office, who picks them , and we cant even vote on who the electors should be.
    span:
    - 0
    - 165
    issue_label: mangled syntax, missing verb
    question: |-
      This sentence has no main verb. 'They can someone not holding a public State office'—what's the verb? And you've got three questions crammed into one thought with no punctuation separating them. Break this into two or three sentences, each with a subject and a clear predicate.
    why_it_matters: |-
      The reader has to work to decode what you mean, and it signals carelessness, which makes them less likely to trust your argument.
    fix_suggestion: |-
      'The texts ask: Who are the electors? They can be private citizens who don't hold public office. And voters have no say in choosing them.' Now each idea stands on its own.
