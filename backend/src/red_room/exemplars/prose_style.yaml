- source: 'AES2 (score 2/6): wordiness, comma splice'
  article: |-
    Despite the fact that we use vehicles as our primary source of transportation, cars are actually polluting the air, and causing danger in our lives.
  critiques:
  - agent: prose_style
    text_quote: |-
      Despite the fact that we use vehicles as our primary source of transportation, cars are actually polluting the air, and causing danger in our lives.
    span:
    - 0
    - 148
    issue_label: wordiness, comma splice
    question: |-
      This sentence buries the main idea under 'Despite the fact that'—that's five words doing the work of one ('Although'). Also, you've got a comma splice: 'polluting the air, and causing danger' needs a coordinating conjunction between those two ideas, or split it into two sentences.
    why_it_matters: |-
      The sentence sounds bloated and reads awkwardly, weakening the force of your opening claim.
    fix_suggestion: |-
      'Although we rely on cars for transportation, they pollute the air and endanger our safety.' (Or: split into two sentences.)
    replacement: null
    severity: medium
- source: 'AES2 (score 2/6): run-on sentence, unclear pronoun reference'
  article: |-
    We dont vote for electors ... so many people can vote on one paticular person to be head of our state and president and the other person can only get 3 votes but in ellectoral collage he/she can have more electoral votes and they win the election .. even tho the other canidate has more popular votes.
  critiques:
  - agent: prose_style
    text_quote: |-
      We dont vote for electors ... so many people can vote on one paticular person to be head of our state and president and the other person can only get 3 votes but in ellectoral collage he/she can have more electoral votes and they win the election .. even tho the other canidate has more popular votes.
    span:
    - 0
    - 301
    issue_label: run-on sentence, unclear pronoun reference
    question: |-
      This sentence does about five jobs at once. 'So many people can vote on one particular person'—what does that mean? And who is 'they'? Split this into 2–3 sentences so each claim gets air.
    why_it_matters: |-
      The logic gets lost in the tangle; your best concrete example (candidate A wins popular vote but loses Electoral vote) doesn't land because readers are parsing grammar instead of following the argument.
    fix_suggestion: |-
      Try: 'We don't vote for electors directly. In a state, millions may vote for Candidate A, but a few electors can still cast their votes for Candidate B. This means Candidate B can win the presidency despite losing the popular vote.'
