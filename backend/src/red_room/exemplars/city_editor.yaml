    span:
    - 0
    - 223
    issue_label: Peg as gatekeeping question for news-driven sections
    question: |-
      Why ask 'What's the peg for this?' on nearly every pitch? Because the editor needs to know *when* the story can run and what news trigger justifies its timing—essential for a section with a four-month lead time.
    why_it_matters: |-
      The peg question ensures stories aren't pitched as evergreen when they need a hook; it also manages expectations about deadlines and publication windows.
    fix_suggestion: |-
      For News Feed pitches especially, answer 'What's the peg?' before being asked. Give the news hook, the timing, why now. For features, a peg is nice but less critical.
