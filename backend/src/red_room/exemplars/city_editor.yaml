# Exemplars for city_editor
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the city_editor lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
