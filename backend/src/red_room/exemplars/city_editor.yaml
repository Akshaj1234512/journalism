  article: |-
    The tips came pouring in — writer friends, journalist friends, friend friends. Everyone wanted to be helpful. Everyone wanted to provide the perfect tip that would shake me out of my paralysis. They were all great tips. I used none of them.
  critiques:
  - agent: city_editor
    text_quote: |-
      The tips came pouring in — writer friends, journalist friends, friend friends. Everyone wanted to be helpful. Everyone wanted to provide the perfect tip that would shake me out of my paralysis. They were all great tips. I used none of them.
    span:
    - 0
    - 240
    issue_label: universal writing advice rarely transfers
    question: |-
      Hertzel notes that while her Facebook friends offered well-intentioned, specific tactics (eat a cookie, go for a walk, write 'Dear Mom'), none of them worked for her. She observes: 'I think we each must find our own way, and none of these suggestions — helpful as they are — was what I needed.'
    why_it_matters: |-
      Writing rituals and unblocking tactics are deeply personal; what works for one writer may actively harm another's process.
    fix_suggestion: |-
      When seeking writing advice from peers, listen generously but don't expect to adopt their solutions wholesale. Use their examples as inspiration for discovering your own process.
