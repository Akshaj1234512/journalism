      This initial query is just one paragraph long, and she hasn't secured access. Why does that work? It's short, but it covers a lot of ground, which is pretty ideal. This meaty paragraph covers what the thing is, what types of people we might be able to feature, what else has been written about it, and how the story will build on what else is out there.
    span:
    - 0
    - 353
    issue_label: Pitch density and economy of language
    question: |-
      Why does a short, one-paragraph pitch with no secured sources work better than a longer, over-reported initial query? Because it covers essential ground—the what, the who, the precedent, and the fresh angle—without wasting anyone's time.
    why_it_matters: |-
      A tight pitch gives an editor enough to assess interest and ask smart follow-up questions, rather than forcing writers to build out premature reporting that may get redirected.
    fix_suggestion: |-
      When pitching, include: the core concept, representative characters or access strategy, prior coverage, and what's new since that coverage. One substantive paragraph beats five pages of half-formed reporting.
