  article: |-
    I think it's a good idea to include a plan... Do you always speak to the visuals and editorial calendar? I think it helps to give a news peg, for them and for you. I've had a story sit around for six months, since a story without a peg becomes easy to push from the schedule. It shows that you're thinking like an editor.
  critiques:
  - agent: city_editor
    text_quote: |-
      I think it's a good idea to include a plan... Do you always speak to the visuals and editorial calendar? I think it helps to give a news peg, for them and for you. I've had a story sit around for six months, since a story without a peg becomes easy to push from the schedule. It shows that you're thinking like an editor.
    span:
    - 0
    - 321
    issue_label: news peg and editorial calendar awareness
    question: |-
      Tullis includes a reporting plan and explicitly ties his story to an anticipated news event—summer wildfires—so editors understand both what he'll deliver and when. He notes that stories without pegs languish on assignment schedules.
    why_it_matters: |-
      Editors need permission to commit resources and schedule space; a story without a news hook or time pressure is easy to defer indefinitely.
    fix_suggestion: |-
      Always anchor your pitch to a news cycle or reporting window. Tell the editor when you'll report, what newsy moment makes this timely, and why waiting reduces the story's value.
