    niemanstoryboard.org — the-pitch-a-veteran-freelancer-on-pitching-the-new-york-times-magazine-and-more: opening choice for audience comprehension
  article: |-
    Why did you decide to open with numbers rather than a character or the news hook? Generally, it's sound to start with anecdotal opening, but it depends on the magazine and the story. I've found that editors on the East Coast don't have as complete an understanding of environmental issues in the West. I thought it was a good idea in this case to start with what's at stake: This wildfire thing is a big fucking deal even though it never touches you.
  critiques:
  - agent: city_editor
    text_quote: |-
      Why did you decide to open with numbers rather than a character or the news hook? Generally, it's sound to start with anecdotal opening, but it depends on the magazine and the story. I've found that editors on the East Coast don't have as complete an understanding of environmental issues in the West. I thought it was a good idea in this case to start with what's at stake: This wildfire thing is a big fucking deal even though it never touches you.
    span:
    - 0
    - 447
    issue_label: opening choice for audience comprehension
    question: |-
      Tullis chose to open with data rather than anecdote, reasoning that East Coast editors needed to understand scale and stakes before being drawn into character. He says: 'I thought it was a good idea in this case to start with what's at stake: This wildfire thing is a big fucking deal even though it never touches you.'
    why_it_matters: |-
      A strong opening balances reader engagement with reader education; when your editor may not fully grasp the topic's importance, establishing stakes upfront can anchor an abstract policy story in urgency.
    fix_suggestion: |-
      Know your editor's baseline knowledge of your topic. If they need convincing the subject matters before they'll care about the people in it, lead with scope and significance, not sentiment.
    replacement: null
    severity: medium
