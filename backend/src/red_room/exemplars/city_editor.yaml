      I start every story with this gigantic text file of facts pasted from aggregation or raw notes from my phone interviews. It's thousands of words long. Then I start winnowing that down into a story with my own prose... I write really simply for the first pass. Subject-verb-object. I don't worry about making it fancy.
    span:
    - 0
    - 317
    issue_label: pile-to-prose reduction with tonal passes
    question: |-
      Selk's process moves from a massive raw-material dump (aggregated facts and interview notes) through progressive reduction and then into fresh prose, starting deliberately plain. Only on subsequent passes does he layer tone or style: 'If that's all I have time to do, sometimes that's the way it publishes.'
    why_it_matters: |-
      This staged approach (dump → distill → draft simply → refine tone) allows fast writers to separate information architecture from voice work, preventing either from derailing the other under deadline.
    fix_suggestion: |-
      Build your first draft in plain, functional prose. Accept that your opening pass may publish as-is if time runs out. Save stylistic choices for revision passes when the structure is stable.
    replacement: null
    severity: medium
