    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 4/5): missing recent related work comparison
  article: |-
    The paper does not discuss or compare against the O(1/k) tangent residual rate achievable by explicit primal-dual extragradient schemes (e.g., Algorithm 3 in Pethick et al. 2023), which do not require inexact max-oracles.
  critiques:
  - agent: related_work_editor
    text_quote: |-
      The paper does not discuss or compare against the O(1/k) tangent residual rate achievable by explicit primal-dual extragradient schemes (e.g., Algorithm 3 in Pethick et al. 2023), which do not require inexact max-oracles.
    span:
    - 0
    - 221
    issue_label: missing recent related work comparison
    question: |-
      Pethick et al. 2023 (Algorithm 3) achieves O(1/k) rate for tangent residual using an explicit primal-dual extragradient scheme without inexact max-oracles. How do your results compare, and why is the implicit Bregman approach preferable if simpler explicit schemes exist?
    why_it_matters: |-
      Without acknowledging or contrasting against this competing approach, the motivation for the implicit Bregman framework and hyperplane projection variants is unclear and potentially overstated.
    fix_suggestion: |-
      Add a detailed comparison to Pethick et al. 2023 Algorithm 3 and discuss computational or convergence advantages of your Bregman approach relative to explicit alternatives.
    replacement: null
    severity: high
