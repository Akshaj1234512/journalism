  article: |-
    Table 1 claims to show 'the landscape of existing tabular machine learning benchmarks compared to TabReD', but only covers deep learning vs. classical ML benchmarks.
  critiques:
  - agent: related_work_editor
    text_quote: |-
      Table 1 claims to show 'the landscape of existing tabular machine learning benchmarks compared to TabReD', but only covers deep learning vs. classical ML benchmarks.
    span:
    - 0
    - 165
    issue_label: Missing classical ML benchmarks (AutoML Benchmark Suite, TabRepo)
    question: |-
      Table 1 is categorically wrong in claiming to represent 'tabular machine learning benchmarks'—it only covers deep learning vs. classical ML benchmarks. You omit major classical ML benchmarking efforts like the AutoML Benchmark Suite and TabRepo, which are better curated and more relevant to your claims.
    why_it_matters: |-
      Omitting key benchmarks undermines the paper's framing as an analysis of the existing landscape and makes it unclear how TabReD relates to or advances beyond prior curation efforts in tabular benchmarking.
    fix_suggestion: |-
      Either incorporate AutoML Benchmark Suite and TabRepo into Table 1 and your analysis, or relabel Table 1 as 'deep learning vs. classical ML benchmarks' and clarify how your work differs from classical ML-focused benchmarking efforts.
