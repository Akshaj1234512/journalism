    issue_label: unclear definition of FM fields
    question: |-
      What are concrete examples of the fields used in your factorization machine framework? The language on page 1 suggests 'past interactions between users and items,' but elsewhere it sounds like the fields are item/user descriptors rather than interaction data. This ambiguity makes it hard to understand the actual input representation.
    why_it_matters: |-
      Readers cannot fully evaluate whether FM is the right choice without understanding what input fields the method actually processes.
