    span:
    - 0
    - 177
    issue_label: stated motivation not pursued
    question: |-
      The abstract and page 4 suggest motivation from a nonlinear PDHG variant, which could be an optimistic variant of the PDEG scheme. Why not directly study this setting instead of Bregman divergence and weak Minty VIs, which seem tangential to the original motivation?
    why_it_matters: |-
      Misalignment between stated motivation (nonlinear PDHG) and executed work (Bregman weak Minty VIs) suggests the paper lost focus or overconstrained the problem in a way that limits applicability.
    fix_suggestion: |-
      Refocus the paper on the nonlinear PDHG variant mentioned as original motivation, or clarify and justify why the Bregman weak Minty formulation is the right generalization.
