- source: |-
    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 5/5): weak limitation of prior work justification
  article: |-
    Section 2-c discusses limitations of existing works; the paper claims to address limitations 1-3 of prior fairness attacks on graphs
  critiques:
  - agent: related_work_editor
    text_quote: |-
      Section 2-c discusses limitations of existing works; the paper claims to address limitations 1-3 of prior fairness attacks on graphs
    span:
    - 0
    - 132
    issue_label: weak limitation of prior work justification
    question: |-
      The limitation of existing works is weak (section 2-c). For limitation 1, this paper still only attacks one fairness concept when generating the adversarial graph. For limitation 2, the operation space depends on the practicality of the attack. For limitation 3, the specially designed module for maintaining performance is not presented in this paper. Authors are suggested to revise this part to highlight the contribution of this paper.
    why_it_matters: |-
      Without clearly articulating why existing work is insufficient and how FATE advances beyond it, the novelty claim remains unconvincing.
    fix_suggestion: |-
      Revise Section 2-c to more sharply delineate what FATE uniquely accomplishes relative to prior work, and clarify which limitations are actually addressed by the present paper.
    replacement: null
    severity: high
