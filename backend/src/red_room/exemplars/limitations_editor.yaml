    ICLR.cc/2024/Conference OpenReview review (rating 6/10, confidence 4/5): label noise effects unexamined
  article: |-
    Figure 2 shows increase in diversity beyond conformity threshold; unclear whether this is due to label noise in generated datasets.
  critiques:
  - agent: limitations_editor
    text_quote: |-
      Figure 2 shows increase in diversity beyond conformity threshold; unclear whether this is due to label noise in generated datasets.
    span:
    - 0
    - 131
    issue_label: label noise effects unexamined
    question: |-
      It is unclear how noise in the datasets (due to inaccurate labels) affects the trends seen in tradeoffs. For example, is the increase in diversity beyond the conformity threshold in Fig 2 simply due to noise? Having humans classify (subsets of) the generated datasets, and introducing the accuracy of the synthetic datasets as an additional metric could make this clearer.
    why_it_matters: |-
      Reported tradeoffs may be artifacts of mislabeled synthetic data rather than genuine diversity-quality relationships, undermining core claims.
    fix_suggestion: |-
      Conduct human evaluation on a subset of generated datasets to quantify label accuracy, and include this as a metric in tradeoff analysis.
    replacement: null
    severity: medium
