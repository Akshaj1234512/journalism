    ICLR.cc/2024/Conference OpenReview review (rating 8/10, confidence 4/5): Hyperparameter selection not grounded in graph properties
  article: 'Section 3 (assumed): parameters $T_s$ and $T_f$ in the defense mechanism'
  critiques:
  - agent: limitations_editor
    text_quote: 'Section 3 (assumed): parameters $T_s$ and $T_f$ in the defense mechanism'
    span:
    - 0
    - 72
    issue_label: Hyperparameter selection not grounded in graph properties
    question: |-
      How do the authors determine the values for $T_s$ and $T_f$? It would be beneficial if this determination were associated with specific graph properties (e.g., the number of edges, nodes, diameter, path length, clustering coefficient, etc.), as this would guide potential users of this defense strategy in tailoring it to their datasets.
    why_it_matters: |-
      Without principled guidance on setting hyperparameters, practitioners cannot effectively tune the defense to their specific graphs, limiting practical applicability.
    fix_suggestion: |-
      Provide a sensitivity analysis or principled rule linking $T_s$ and $T_f$ to measurable graph properties, or empirical guidance for selecting these values.
    replacement: null
    severity: medium
