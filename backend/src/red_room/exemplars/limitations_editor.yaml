    question: |-
      On 'the model can learn a comprehensive representation of temporal dynamic' in line 252, it is either overstated or missing some context. It is quite impossible to learn a comprehensive temporal dynamic representation based on the shadow-boxing dataset alone, given there exist so many types of temporal dynamics, e.g., daily life actions, professional sport actions, etc.
