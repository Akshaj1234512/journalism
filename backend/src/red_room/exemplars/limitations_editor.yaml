    ICLR.cc/2025/Conference OpenReview review (rating 6/10, confidence 4/5): missing discussion of interpretability constraints
  article: |-
    Section 3.1: the paper does not discuss whether the framework can bake in known elements of stimulation (e.g., which neurons are targeted based on response selectivity), or whether it can make claims about circuit mechanisms or local neuron-level effects of stimulation.
  critiques:
  - agent: limitations_editor
    text_quote: |-
      Section 3.1: the paper does not discuss whether the framework can bake in known elements of stimulation (e.g., which neurons are targeted based on response selectivity), or whether it can make claims about circuit mechanisms or local neuron-level effects of stimulation.
    span:
    - 0
    - 270
    issue_label: missing discussion of interpretability constraints
    question: |-
      There is no way to incorporate known elements of stimulation (e.g., stimulus selectivity) into the model. Can this framework be used to analyze or make claims about how individual neurons affect others in a circuit, or to reproduce local neuron-level effects of stimulation?
    why_it_matters: |-
      Without such capabilities, the model's utility for mechanistic understanding of neural circuits and intervention effects is severely limited, despite addressing an important problem.
    fix_suggestion: |-
      Explicitly discuss whether and how the framework could be extended to incorporate prior knowledge about stimulation targets, and clarify what types of circuit-level inference questions the model can and cannot address.
    replacement: null
    severity: high
