    ICLR.cc/2025/Conference OpenReview review (rating 8/10, confidence 4/5): Gap between theory and practice: global optimization assumption
  article: |-
    The paper defines the utility function u_α assuming finding a *global optimizer* of the loss w.r.t. the network weights (p. 3), which is non-convex and NP-hard for deep learning.
  critiques:
  - agent: limitations_editor
    text_quote: |-
      The paper defines the utility function u_α assuming finding a *global optimizer* of the loss w.r.t. the network weights (p. 3), which is non-convex and NP-hard for deep learning.
    span:
    - 0
    - 178
    issue_label: 'Gap between theory and practice: global optimization assumption'
    question: |-
      Your utility function u_α implicitly assumes finding a global optimizer of the loss, but in practice gradient descent finds local minima. How does this affect your claim that u_α1 > u_α2 implies α1 is a better architectural choice? Without acknowledgment of this subtlety, can you really claim the architecture optimization problem is 'learnable' for deep neural networks?
    why_it_matters: |-
      The theoretical setting ignores the core challenge in neural architecture optimization (making improvements that gradient descent can actually find), risking overstating the practical applicability of the bounds.
    fix_suggestion: |-
      Either reconsider the phrase 'for deep neural networks' in the title and make clear the setting is farther from practice, or add explicit discussion of how the global optimization assumption relates to the realistic (non-convex) optimization landscape.
    replacement: null
    severity: high
