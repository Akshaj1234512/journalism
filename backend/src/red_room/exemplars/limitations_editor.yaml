    ICLR.cc/2025/Conference OpenReview review (rating 3/10, confidence 4/5): missing dataset statistics and demographics
  article: |-
    Line 57 introduces 'comprehensive boxing dataset' but omits key statistics: gender ratio, number of performers, indoor/outdoor background variation, average frame-span per 'fast' action (line 208 states only 'more than one event per second').
  critiques:
  - agent: limitations_editor
    text_quote: |-
      Line 57 introduces 'comprehensive boxing dataset' but omits key statistics: gender ratio, number of performers, indoor/outdoor background variation, average frame-span per 'fast' action (line 208 states only 'more than one event per second').
    span:
    - 0
    - 242
    issue_label: missing dataset statistics and demographics
    question: |-
      On comprehensive boxing dataset in line 57, the following critical stats of the dataset is missing: The ratio of gender. The number of different performer. The number of different indoor background and outdoor background. The average frame-span per fast boxing actions. Line 208 vaguely states 'more than one event per second'. Yet, the fps of this dataset is 60, so the number of frames per action can still be quite a lot. It is worth clarifying.
    why_it_matters: |-
      Dataset bias, generalization, and action-duration analysis remain opaque, hindering reproducibility and fairness assessment.
    fix_suggestion: |-
      Report gender/demographic breakdown, unique performer count, background diversity, and histogram of action frame-span (e.g., median/std duration in frames); clarify the frame-count range corresponding to '>1 event/sec' at 60 fps.
