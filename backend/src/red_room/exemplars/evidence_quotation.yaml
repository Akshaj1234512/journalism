  article: |-
    It says in "The End of Car Culture", "...transportation is the second largest source of America's emissions, just behind power plants. Therfore if the use of cars decre4ases as it has then carbon emmisions will also decrease along with it and will in turn cause the greenhouse effect to ripidly slow."
