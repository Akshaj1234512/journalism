- source: 'AES2 (score 4/6): vague examples, no specifics'
  article: |-
    Finally, although driverless cars are considered "smart cars", they may not be as smart as the manufacturers claim they are. Driverless cars aren't perfect and there could be accidents in which a "smart car" goes into a one-way street or drives off a bridge.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      Finally, although driverless cars are considered "smart cars", they may not be as smart as the manufacturers claim they are. Driverless cars aren't perfect and there could be accidents in which a "smart car" goes into a one-way street or drives off a bridge.
    span:
    - 0
    - 258
    issue_label: vague examples, no specifics
    question: |-
      Going into a one-way street or off a bridge — are these real incidents you've read about, or hypotheticals? If they're real, name them. If they're hypothetical, say so and ask: what's the actual evidence that driverless cars fail in these ways?
    why_it_matters: |-
      Generic, worst-case scenarios don't persuade; readers wonder if you've actually researched the technology or if you're just imagining dangers.
    fix_suggestion: |-
      Reference a specific incident (Tesla Autopilot failure, Uber autonomous vehicle crash in Phoenix, etc.) or cite a study showing failure rates in particular conditions. One concrete example beats three vague ones.
    replacement: null
    severity: high
- source: 'GRE_Argument (score 2/6): conclusion restates without synthesis'
  article: |-
    In summary, the statement is not logical because there are some errors in it. The supporting setences are not strong enough to support this issue.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      In summary, the statement is not logical because there are some errors in it. The supporting setences are not strong enough to support this issue.
    span:
    - 0
    - 146
    issue_label: conclusion restates without synthesis
    question: |-
      Your conclusion just repeats 'the argument has errors' — but you never synthesize *which assumptions* those errors depend on, or why those assumptions are unjustified. You've identified the problem but not analyzed it.
    why_it_matters: |-
      A GRE argument analysis must go beyond listing flaws; you need to show how the argument's unstated assumptions are the root of the logical problem.
    fix_suggestion: |-
      End with: 'Ultimately, the argument fails because it rests on the unsupported assumption that improving river conditions is sufficient to restore water sports participation—ignoring other factors that may be keeping residents away.'
    replacement: null
    severity: high
