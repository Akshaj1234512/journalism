# Exemplars for evidence_quotation
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'AES2 (score 2/6): dropped quote, no warrant'
  article: |-
    To begin with, in the passage "in german suburb, llife goes on without cars" ms. rosenthal clearly states that 70% of Vauban`s families dont have cars. They think that this is less tense without one. But not only that. 5,500 residents within a rectanglar square mile may be the most advanced expirement iun low-car surburban life.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      To begin with, in the passage "in german suburb, llife goes on without cars" ms. rosenthal clearly states that 70% of Vauban`s families dont have cars. They think that this is less tense without one. But not only that. 5,500 residents within a rectanglar square mile may be the most advanced expirement iun low-car surburban life.
    span:
    - 0
    - 330
    issue_label: dropped quote, no warrant
    question: |-
      You cite the statistic that 70% of families don't have cars and then say they 'think this is less tense'—but where's the evidence of that claim? And more importantly, *why* does this support your argument that car usage *should* be limited? The statistic and your conclusion aren't connected.
    why_it_matters: |-
      The reader sees data but doesn't understand how it proves your point, so the evidence feels like decoration rather than proof.
    fix_suggestion: |-
      Explain the warrant: 'Because 70% of families chose not to own cars and reported lower stress, this shows that people actively benefit from car-free living—suggesting that policy-driven limits could yield the same benefit.'
    replacement: null
    severity: high
