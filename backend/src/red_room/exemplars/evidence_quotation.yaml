# Exemplars for evidence_quotation
# Human-editable. Each list item below is one exemplar.
# To disable an exemplar without deleting it, comment out its lines with #.
# Field order: source, article, critiques (and per critique: agent, text_quote,
# span, issue_label, question, why_it_matters, fix_suggestion, replacement, severity).
#
- source: |-
    They Say / I Say, Chapter 3: introducing quotations with signal phrases (the 'hit and run' quotation pattern)
  article: |-
    Hamlet is paralyzed by his own thought. 'To be, or not to be, that is the question.' He cannot act because he keeps reasoning about action.
  critiques:
  - agent: evidence_quotation
    text_quote: '''To be, or not to be, that is the question.'''
    span: [40, 84]
    issue_label: dropped quotation
    question: |-
      The Hamlet line lands cold between two of your sentences with no signal phrase, no act and scene, no speaker. The writer drops the words and runs. Who is speaking, where, and why is it in your paragraph?
    why_it_matters: |-
      A reader who does not already know the soliloquy has no idea whose voice this is or what work it is doing in your argument, and the claim about paralysis floats free of the text.
    fix_suggestion: |-
      Introduce the quotation with a signal phrase that names the speaker and locates the moment, then explain in your own words why this particular line shows the paralysis you are describing.
    replacement: |-
      Alone on stage in Act 3, Scene 1, Hamlet opens his most famous soliloquy with the question 'To be, or not to be, that is the question.'
    severity: medium
- source: |-
    MLA Handbook 9th ed., section 1.3 on integrating sources; the quote-sandwich teaching pattern (Graff/Birkenstein)
  article: |-
    The framers feared concentrated power above all else. 'Ambition must be made to counteract ambition.' This is why the Constitution divides authority among three branches.
  critiques:
  - agent: evidence_quotation
    text_quote: '''Ambition must be made to counteract ambition.'''
    span: [55, 102]
    issue_label: dropped quotation
    question: |-
      The line from Federalist No. 51 appears with no attribution, no Madison, no number, no context. Introduce, quote, unpack. Right now you have only the middle slice.
    why_it_matters: |-
      Without the signal phrase the reader cannot tell whether this is your formulation, a framer's, or a modern commentator's, and the authority your argument is borrowing disappears.
    fix_suggestion: |-
      Name Madison and the paper, then quote, then explain how 'ambition counteracting ambition' becomes the structural argument for separation of powers.
    replacement: |-
      Madison made the logic explicit in Federalist No. 51: 'Ambition must be made to counteract ambition.'
    severity: medium
- source: |-
    Documented misuse pattern: claim asserts X, quote supports Y (writing-center handout on quotation-claim mismatch)
  article: |-
    Toni Morrison presents Sethe's killing of her daughter as an unambiguous act of maternal love. As Morrison writes, 'The best thing she was, was her children.' Sethe acts purely out of love, and the novel endorses that love.
  critiques:
  - agent: evidence_quotation
    text_quote: '''The best thing she was, was her children.'''
    span: [108, 151]
    issue_label: quote mismatched to claim
    question: |-
      Your paragraph claims Beloved presents Sethe's killing as unambiguous maternal love. The line you quote is about how Sethe defined her own worth through her children. It is a claim about identity, not a defense of the killing, and the novel itself is far from unambiguous on the act.
    why_it_matters: |-
      When the evidence supports an adjacent claim, identity, and not the stated claim, endorsement of the killing, the paragraph reads as if you reached for the first Sethe quote that fit thematically and trusted the reader not to notice.
    fix_suggestion: |-
      Either change the claim to match what the quote actually says (Sethe defines herself through motherhood) or find a passage that addresses the killing itself, such as Paul D's reaction or Sethe's own retelling in the second half.
    replacement: null
    severity: high
- source: |-
    Documented misuse pattern: evidence supports an adjacent claim, not the stated one
  article: |-
    Reconstruction failed primarily because of Northern apathy: the white North simply lost interest in protecting freedmen. Frederick Douglass himself put it plainly in his 1879 speech, 'The hour is one of deep solicitude to the whole country. The future of the freedmen is full of peril.' Douglass saw exactly what we now see in hindsight.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      'The hour is one of deep solicitude to the whole country. The future of the freedmen is full of peril.'
    span: [127, 230]
    issue_label: quote mismatched to claim
    question: |-
      Your thesis is that Reconstruction failed because of Northern apathy. The Douglass lines you quote name the peril facing freedmen but say nothing about Northern attitudes. He is describing the threat, not diagnosing its cause, and elsewhere in that same address he points at Southern violence and federal retreat, not Northern indifference.
    why_it_matters: |-
      Pinning a causal claim about Northern apathy on a quote that only names danger lets a careful reader pull the entire paragraph apart, because the citation does not support the verb the thesis depends on.
    fix_suggestion: |-
      Find a Douglass passage that names the Northern cause directly, his 1888 'Lessons of the Hour' has stronger language on white Northern fatigue, or weaken the thesis to what this quote can carry.
    replacement: null
    severity: high
- source: |-
    Quote-mining (phrase extracted from context that reverses its meaning); writing-center pattern on irony missed in primary sources
  article: |-
    Even Mr. Collins, no friend of independent women, recognizes Elizabeth's intelligence. He calls her 'one of the most accomplished young women in the neighbourhood,' a striking admission from a man so devoted to convention.
  critiques:
  - agent: evidence_quotation
    text_quote: '''one of the most accomplished young women in the neighbourhood,'''
    span: [82, 145]
    issue_label: quote mined from ironic context
    question: |-
      Mr. Collins says this kind of thing about every Bennet sister and about Lady Catherine's pug. Austen frames his compliments as the marker of his sycophancy, not as honest praise; the surrounding narration is openly mocking him. Lifted clean, the line sounds like a real assessment. In the novel it is the opposite.
    why_it_matters: |-
      Treating an Austen character's empty flattery as sincere evidence of Elizabeth's mind misreads the irony that organizes the entire scene, and a reader who knows the book will see the misuse immediately.
    fix_suggestion: |-
      Use a line from a character Austen credits, Darcy's eventual concession or the narrator's free indirect commentary, or keep Collins but read his praise as the satire it is.
    replacement: null
    severity: high
- source: |-
    The quote-sandwich teaching pattern (Graff/Birkenstein): introduce, quote, unpack. Step three is missing.
  article: |-
    Nick Carraway insists he is reliable, but the novel undermines him from the first page. As Nick says, 'I am one of the few honest people that I have ever known.' Fitzgerald uses the green light to symbolize Gatsby's unreachable dream of Daisy, which connects to the broader theme of the American Dream.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      'I am one of the few honest people that I have ever known.' Fitzgerald uses the green light
    span: [80, 173]
    issue_label: quotation without analysis
    question: |-
      You drop one of the most analyzed lines in American fiction and then pivot to the green light in the next sentence. Asks for the third slice: how does Nick's self-declaration of honesty undercut him? Without that unpacking, the quote is decorative.
    why_it_matters: |-
      A quotation that is not analyzed cannot do argumentative work, and your reader is left to perform the interpretation you promised to perform.
    fix_suggestion: |-
      Before you move on, spend two or three sentences on why a narrator who has to insist on his own honesty is already suspect, and tie that to a second moment in the novel where Nick's account contradicts itself.
    replacement: null
    severity: medium
- source: |-
    Cherry-picked evidence (the obvious counter-passage in the same text ignored); standard literary-essay critique
  article: |-
    Zora Neale Hurston shows Janie finally finding her voice through Tea Cake, who treats her as an equal. 'He done taught me de maiden language all over,' Janie tells Pheoby, evidence that this third marriage is the one that lets her speak freely.
  critiques:
  - agent: evidence_quotation
    text_quote: '''He done taught me de maiden language all over,'''
    span: [99, 147]
    issue_label: cherry-picked evidence
    question: |-
      You quote the romantic line and stop. The same novel has Tea Cake taking Janie's money in Jacksonville and beating her in Chapter 17 to show Mrs. Turner's brother 'who is boss.' If Tea Cake is the marriage that lets Janie speak freely, the beating scene has to be in the paragraph, not avoided.
    why_it_matters: |-
      Ignoring the obvious counter-passage in the same text is the move that lets a reader dismiss the entire reading, because the strongest counter-evidence sits a few chapters away.
    fix_suggestion: |-
      Bring the beating scene into the paragraph and argue with it, either by complicating the 'equal partner' reading or by showing how Janie's voice survives despite it. The argument gets stronger when it acknowledges what it has to overcome.
    replacement: null
    severity: high
- source: |-
    Paraphrase that distorts the source (the silent twin of misquotation); writing-center handout on faithful paraphrase
  article: |-
    In his House Divided speech, Lincoln predicted that the country would soon become entirely slave or entirely free, and that civil war was inevitable to settle the question.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      predicted that the country would soon become entirely slave or entirely free, and that civil war was inevitable to settle the question
    span: [31, 165]
    issue_label: paraphrase distorts the source
    question: |-
      Lincoln's actual line is 'I do not expect the Union to be dissolved, I do not expect the house to fall, but I do expect it will cease to be divided.' He explicitly did not predict dissolution, and he never said civil war was inevitable in that speech. Your paraphrase adds two claims he was at pains not to make.
    why_it_matters: |-
      A paraphrase that makes a source say more than it said is the silent twin of misquotation, and on a document this scrutinized any historian reader will catch the addition immediately.
    fix_suggestion: |-
      Quote the actual sentence and paraphrase only what is in it: Lincoln expected the division to end, one way or the other, but he did not predict war in the speech itself. If you want the war prediction, find it in a later document and cite that one.
    replacement: |-
      predicted that the house divided against itself could not stand, and that the country would become 'all one thing, or all the other'
    severity: high
- source: |-
    Overquotation; the textbook 'stitched anthology' pattern (Graff/Birkenstein on the writer's voice disappearing between quotes)
  article: |-
    Madison argues that factions are inevitable. 'The latent causes of faction are thus sown in the nature of man.' He also notes that a republic can manage them. 'A republic, by which I mean a government in which the scheme of representation takes place, opens a different prospect, and promises the cure for which we are seeking.' And further: 'Extend the sphere, and you take in a greater variety of parties and interests.' The size of the republic is therefore the key.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      'A republic, by which I mean a government in which the scheme of representation takes place, opens a different prospect, and promises the cure for which we are seeking.' And further: 'Extend the sphere, and you take in a greater variety of parties and interests.'
    span: [144, 411]
    issue_label: overquotation
    question: |-
      Three Madison quotes in four sentences, stitched together with one-line bridges. The paragraph stitched together into an anthology: the source's voice has crowded out yours. Whose argument is this paragraph making, Madison's or yours?
    why_it_matters: |-
      When the writer's voice disappears between block quotes the essay stops being analysis and becomes curation, and the reader cannot tell what you think Madison's argument adds up to.
    fix_suggestion: |-
      Keep the strongest quote, paraphrase the other two in your own words, and use the space you save to explain how Madison's three moves connect: faction is inherent, representation filters it, scale dilutes it. The argument is the connection, not the quotes.
    replacement: null
    severity: medium
- source: |-
    Underquotation on a load-bearing claim (writing-center handout: strong assertion with no textual support)
  article: |-
    Hamlet's madness is entirely performed. From his first encounter with the ghost to the final duel, every appearance of derangement is calculated, and Shakespeare makes this calculation visible to the audience throughout the play.
  critiques:
  - agent: evidence_quotation
    text_quote: |-
      every appearance of derangement is calculated, and Shakespeare makes this calculation visible to the audience throughout the play
    span: [105, 233]
    issue_label: load-bearing claim with no evidence
    question: |-
      This is the thesis of the paragraph and there is no quotation under it. Hamlet's 'antic disposition' line in Act 1, Scene 5 is the one piece of text that directly supports the 'performed madness' reading, and it is the standard citation for it. Without that line, or any line, the claim is an assertion.
    why_it_matters: |-
      A load-bearing interpretive claim with zero textual support is exactly the paragraph a reader marks for 'where is the evidence,' and the essay loses its grip on the play.
    fix_suggestion: |-
      Quote Hamlet telling Horatio he will 'put an antic disposition on,' then point to a second moment where the mask slips in private (the soliloquies) versus holds in public (with Polonius). Two cited moments will carry the claim the assertion cannot.
    replacement: null
    severity: high
