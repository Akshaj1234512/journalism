    issue_label: Family consent and narrative authority in memoir
    question: |-
      When you're writing about shared traumatic experiences—like a parent's death—who has the right to decide how that story gets told, and what's your obligation to people who were there but didn't agree to be in a published book?
    why_it_matters: |-
      Publishing intimate family moments can wound people who didn't consent to their story being told, even if the author's motives are sound.
    fix_suggestion: |-
      Before publishing memoir that involves family, consider giving them advance notice and opportunity to object to specific details, even if you ultimately decide to publish. Distinguish between what you remember and what you're confident actually happened (Holland fact-checked her mother's hospitalization details rather than relying on grief-hazed memory).
