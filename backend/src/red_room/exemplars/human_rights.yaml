    - 343
    issue_label: duty of care to sources and vulnerable populations
    question: |-
      Rezaian emphasizes that journalists covering foreign countries often prioritize the 'most graphic or thrilling' telling of a story without considering the downstream consequences for the people and places they're writing about. He worried explicitly whether publishing his book might harm ordinary Iranians.
    why_it_matters: |-
      This articulates a crucial ethical boundary: the pursuit of a compelling narrative cannot override the safety and dignity of vulnerable populations; journalists must weigh their storytelling ambitions against real-world harm.
    fix_suggestion: |-
      Before publishing a story about foreign countries or vulnerable populations, conduct a harm assessment: what could happen to the sources, their families, or their communities after publication? Build that analysis into your editorial decisions.
