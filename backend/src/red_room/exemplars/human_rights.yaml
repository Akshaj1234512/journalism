- source: |-
    niemanstoryboard.org — thomas-curwen-and-surgeon-races-to-save-a-life-during-l-a-s-shooting-season: deferred consent in vulnerable reporting
  article: |-
    In the past, I've secured permission from patients before I began reporting. They would sign a waiver allowing me access to their records and histories. In this case, however, any individual coming into a hospital with a gunshot wound would not be in any position – physically or mentally – to sign any waiver, let alone understand who I was and what I was attempting to do. As a result, the photographer on the story – Barbara Davidson – and I were able to work out an arrangement with the hospital and their attorneys to report the story under the condition that once the patient was in recovery, we would explain our intentions. If the patient agreed – and then signed the waiver – we could proceed. If the patient did not agree, we would destroy my notes and images.
  critiques:
  - agent: human_rights
    text_quote: |-
      In the past, I've secured permission from patients before I began reporting. They would sign a waiver allowing me access to their records and histories. In this case, however, any individual coming into a hospital with a gunshot wound would not be in any position – physically or mentally – to sign any waiver, let alone understand who I was and what I was attempting to do. As a result, the photographer on the story – Barbara Davidson – and I were able to work out an arrangement with the hospital and their attorneys to report the story under the condition that once the patient was in recovery, we would explain our intentions. If the patient agreed – and then signed the waiver – we could proceed. If the patient did not agree, we would destroy my notes and images.
    span:
    - 0
    - 770
    issue_label: deferred consent in vulnerable reporting
    question: |-
      Curwen describes a reporting protocol where he and the photographer obtained retroactive consent from a gunshot victim only after he recovered enough to understand what had happened and provide informed agreement, with a clear fallback: 'If the patient did not agree, we would destroy my notes and images.'
    why_it_matters: |-
      This approach respects subject dignity and agency in a moment when the subject cannot give informed consent, while still allowing the journalist to be present for the crucial moment—avoiding both coercive pre-crisis agreements and ethically compromised secret observation.
    fix_suggestion: |-
      When reporting on people in acute medical or crisis situations, build in a consent-checkpoint after the crisis has passed, with a clear destruction protocol if the subject refuses, so you're never profiting from observation without the subject's knowledge.
    replacement: null
    severity: high
