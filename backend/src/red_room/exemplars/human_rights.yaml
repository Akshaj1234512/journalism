    niemanstoryboard.org — an-award-winning-food-writer-explores-the-legacy-of-sexual-identity-in-the-food-: source protection and proportional treatment of difficult material
  article: |-
    Reports from 2000 suggest she was named as a suspect in a burglary... But at one point in this section, the tone shifts as Sen delves into a darker period of Gilmore's life... 'My sources had empathy for her struggles, not judgment,' he says. Furthermore, very few sources wanted to speak on the record about that period in her life, and he feels it important to keep trust with sources, especially those from marginalized communities.
  critiques:
  - agent: human_rights
    text_quote: |-
      Reports from 2000 suggest she was named as a suspect in a burglary... But at one point in this section, the tone shifts as Sen delves into a darker period of Gilmore's life... 'My sources had empathy for her struggles, not judgment,' he says. Furthermore, very few sources wanted to speak on the record about that period in her life, and he feels it important to keep trust with sources, especially those from marginalized communities.
    span:
    - 0
    - 435
    issue_label: source protection and proportional treatment of difficult material
    question: |-
      Sen faced the challenge of including difficult historical facts (burglary, fraud, identity theft charges) while respecting his sources' unwillingness to speak on record about that period and honoring the trust of a marginalized community. He chose to state the public record matter-of-factly but without giving these incidents disproportionate space.
    why_it_matters: |-
      Keeping trust with marginalized sources sometimes means restraint—choosing not to dwell on salacious details even when they're public record, in order to preserve the relationship and center the subject's larger legacy.
    fix_suggestion: |-
      When reporting on difficult periods in a subject's life, check whether your sources from marginalized communities are willing to speak on record. If not, honor that boundary by stating public facts plainly but briefly, and consider whether dwelling on those details serves your central story or exploits the subject.
