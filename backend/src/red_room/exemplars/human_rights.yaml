    niemanstoryboard.org — challenges-of-sourcing-safety-and-reporting-for-narrative-in-china: consent clarity when sources lack media literacy
  article: |-
    Wee said she wasn't sure if Liu, the domestic violence victim, knew anything about the New York Times. 'But she knew I was a reporter who could get this story out. And she had a point of view. She wanted to say something.' That said, most Chinese people aren't familiar with narrative journalism, which adds to the challenge of navigating ethical source relationships and gaining needed information to build a storyline.
  critiques:
  - agent: human_rights
    text_quote: |-
      Wee said she wasn't sure if Liu, the domestic violence victim, knew anything about the New York Times. 'But she knew I was a reporter who could get this story out. And she had a point of view. She wanted to say something.' That said, most Chinese people aren't familiar with narrative journalism, which adds to the challenge of navigating ethical source relationships and gaining needed information to build a storyline.
    span:
    - 0
    - 420
    issue_label: consent clarity when sources lack media literacy
    question: |-
      Wee admits uncertainty about whether Liu fully understood the New York Times platform or what 'narrative journalism' meant, yet proceeded with the story because Liu 'wanted to say something.' Does a source's desire to speak substitute for informed consent about the reach, permanence, and potential consequences of publication in a major international outlet?
    why_it_matters: |-
      When sources lack familiarity with international media platforms, they may not grasp the full scope of exposure or the long-term visibility their stories will have, especially in a country with government surveillance, creating an ethical gap between what the journalist thinks is consent and what the source actually understands.
    fix_suggestion: |-
      Explicitly discuss with vulnerable sources what the New York Times platform means, where the story will be read, how long it will persist online, and what protections you can and cannot offer—not just assume their enthusiasm means they understand the stakes.
    replacement: null
    severity: high
