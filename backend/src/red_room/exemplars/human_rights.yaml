    issue_label: ending interview with dignity, not retraumatization
    question: |-
      The most indelible advice my class heard about interviewing survivors also spoke to purpose. The advice was this: Don't leave the person in a dark place. Ask questions that gently move them away from discussion of the trauma.
    why_it_matters: |-
      Structuring an interview to end on a note of agency and reflection rather than raw pain respects the survivor's emotional wellbeing and recognizes that the reporter's presence creates a moral obligation beyond information-gathering.
    fix_suggestion: |-
      When planning a trauma interview, explicitly design the final third of questions to move from the trauma itself toward what the survivor values, preserves, or wants remembered—a deliberate shift in emotional terrain.
