    niemanstoryboard.org — rejecting-the-simplified-news-narrative: reconstructing voice from digital evidence without consent
  article: |-
    Michelle Carter declined to participate in 'I Love You, Now Die.' How did you recreate her voice and inner thoughts without being able to interview her? ... The texts really were interviews. They were saying at the time what she was thinking.
  critiques:
  - agent: human_rights
    text_quote: |-
      Michelle Carter declined to participate in 'I Love You, Now Die.' How did you recreate her voice and inner thoughts without being able to interview her? ... The texts really were interviews. They were saying at the time what she was thinking.
    span:
    - 0
    - 242
    issue_label: reconstructing voice from digital evidence without consent
    question: |-
      Carr asked Michelle Carter to participate 17 times but she declined. Instead, Carr used text messages as a stand-in for direct interview. The question becomes: can digital communications—even thousands of them—ethically substitute for a subject's own voice, especially in a case where the subject explicitly refused to participate?
    why_it_matters: |-
      Using texts as a proxy for interview access raises consent and representation questions; it allows a filmmaker to construct a narrative about a non-participating subject without her ability to object or clarify.
    fix_suggestion: |-
      Journalists reconstructing a declined subject's perspective through documents should explicitly acknowledge the limitation and consider what editorial safeguards (additional context, opposing views, expert analysis) are needed to avoid misrepresenting the person's actual views or state of mind.
    replacement: null
    severity: high
