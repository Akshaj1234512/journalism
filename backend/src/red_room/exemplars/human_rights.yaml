      Haynes explicitly names the structural inequalities between himself and his subjects—economic, cultural, linguistic, gender—and chose transparency in an author's note as his ethical tool rather than pretending the distances didn't exist.
    why_it_matters: |-
      Naming positionality upfront signals to readers that the author is aware of the power dynamics embedded in the work and invites critical reading rather than inviting readers to assume objectivity.
