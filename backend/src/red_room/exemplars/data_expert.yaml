# Exemplars for data_expert
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the data_expert lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    niemanstoryboard.org — how-a-reporter-tracked-good-intentions-to-problematic-consequences-in-family-cou: data-driven investigation balanced with narrative
  article: |-
    With the help of the data team at The Marshall Project, Clifford delved into a sea of data: hospital contracts, federal court cases, civil cases and demographic data; Weihua Li played an especially important role in finding crucial data, Clifford said. While data anchors key points, the story isn't dry.
  critiques:
  - agent: data_expert
    text_quote: |-
      With the help of the data team at The Marshall Project, Clifford delved into a sea of data: hospital contracts, federal court cases, civil cases and demographic data; Weihua Li played an especially important role in finding crucial data, Clifford said. While data anchors key points, the story isn't dry.
    span:
    - 0
    - 304
    issue_label: data-driven investigation balanced with narrative
    question: |-
      How did Clifford and her team keep a data-heavy investigation from becoming merely a spreadsheet of findings? By pairing the data analysis with intimate profiles of two families, the story used numbers to establish the scope and pattern while human stories provided the emotional weight.
    why_it_matters: |-
      It shows how to structure an investigation so that data proves the systemic problem exists while narrative examples show what that problem actually costs real people.
    fix_suggestion: |-
      In data-driven investigations, use quantitative findings to establish that a problem is widespread, then use your best narrative reporting to show what that problem feels like from the inside.
    replacement: null
    severity: medium
