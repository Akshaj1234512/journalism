    slate.com — al-gore-washed-up-politician-finds-a-new-venue-for-his-ideas-press-criticism.htm: misleading statistic without methodological context
  article: |-
    Gore writes, 'The average American, meanwhile, is watching television an astonishing five hours a day. In the average household, at least one television set is turned on more than eight hours a day.' Those numbers sound horrific... But how many times have you walked into a room in which a television was playing to no audience at all? How often have you walked into a TV room and found the one person sitting paying no attention to the set? Nielsen tabulates those televisions as 'watched.'
  critiques:
  - agent: data_expert
    text_quote: |-
      Gore writes, 'The average American, meanwhile, is watching television an astonishing five hours a day. In the average household, at least one television set is turned on more than eight hours a day.' Those numbers sound horrific... But how many times have you walked into a room in which a television was playing to no audience at all? How often have you walked into a TV room and found the one person sitting paying no attention to the set? Nielsen tabulates those televisions as 'watched.'
    span:
    - 0
    - 491
    issue_label: misleading statistic without methodological context
    question: |-
      When you cite Nielsen ratings without explaining how Nielsen counts 'watched' television—including sets running unwatched in the background—you're presenting a number that inflates reality and serves your thesis. Gore knew better or should have.
    why_it_matters: |-
      Citing statistics without context about how they're measured lets you create false impressions that support your argument without lying outright.
    fix_suggestion: |-
      Always explain what a statistic actually measures and acknowledge alternative interpretations. In this case, the real individual primetime viewership was 1 hour 12 minutes, not five hours—a fundamental difference.
    replacement: null
    severity: high
