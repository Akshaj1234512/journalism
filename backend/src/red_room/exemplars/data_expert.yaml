    - 0
    - 253
    issue_label: Conflating different people via shared alias
    question: |-
      Reporting cited a Pentagon document about 'Abu Duaa' as evidence for al-Baghdadi's 2009 release, but a British special forces commander says the name was used by multiple different people and they arrested or killed 'a man of that name about half a dozen times.' How confident can we be the 2009 'Abu Duaa' release was actually al-Baghdadi?
