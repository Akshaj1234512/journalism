    PolitiFact fact-check (ruling: false): cherry-picked asteroid data / missing safe-distance context
  article: |-
    In early March 2020, tabloids published articles claiming that NASA had issued a warning about a large asteroid approaching Earth... failed to mention in headlines how the space agency's data showed the asteroid passing Earth at a safe distance of a nearly 4 million miles (16 times farther than the moon).
  critiques:
  - agent: data_expert
    text_quote: |-
      In early March 2020, tabloids published articles claiming that NASA had issued a warning about a large asteroid approaching Earth... failed to mention in headlines how the space agency's data showed the asteroid passing Earth at a safe distance of a nearly 4 million miles (16 times farther than the moon).
    span:
    - 0
    - 306
    issue_label: cherry-picked asteroid data / missing safe-distance context
    question: |-
      Headlines screamed 'doomsday asteroid' without mentioning NASA's own data: 4 million miles away (16× the Earth-Moon distance). Isn't burying the safe-distance denominator a misleading way to sensationalize the story?
    why_it_matters: |-
      Readers see 'asteroid warning' and assume imminent danger, not 'routine NASA tracking at safe distance'—a classic data-framing failure that fuels doomsday rumors.
    fix_suggestion: |-
      Lead with NASA's distance and safety assessment in the headline or opening. Reserve 'warning' for actual threats; use 'observation' or 'tracking' for routine monitoring.
    replacement: null
    severity: medium
- source: 'PolitiFact fact-check (ruling: half-true): scope inflation / wrong denominator'
  article: |-
    Some social media users also appeared to be under the impression that an 'entire day's worth' of swabs had to be destroyed after Trump's visit. But that wasn't the case. During the visit, the company gave a 15-minute demonstration of the manufacturing process, after which the swabs involved in the demonstration were destroyed.
  critiques:
  - agent: data_expert
    text_quote: |-
      Some social media users also appeared to be under the impression that an 'entire day's worth' of swabs had to be destroyed after Trump's visit. But that wasn't the case. During the visit, the company gave a 15-minute demonstration of the manufacturing process, after which the swabs involved in the demonstration were destroyed.
    span:
    - 0
    - 328
    issue_label: scope inflation / wrong denominator
    question: |-
      The claim says 'medical supplies' had to be destroyed, implying a meaningful quantity. But the company destroyed only swabs from a 15-minute demo—not a day's production or a batch. Did reporting distinguish between demo-batch destruction and actual production loss?
    why_it_matters: |-
      Conflating a small demonstration run with real production loss overstates the claim's material impact and misleads readers about scale.
    fix_suggestion: |-
      Lead with the actual scope: 'swabs from a 15-minute demonstration' rather than 'medical supplies,' and note upfront that production was rescheduled, not lost.
    replacement: null
    severity: medium
- source: 'PolitiFact fact-check (ruling: half-true): anecdotal evidence as pattern'
  article: |-
    The shelter's founder, Alfred Restivo, told magazine that the incidents described in their post date to February 2018, when Sydney, a 6-year-old border collie, developed a heavily-swollen tongue. Three more dogs, Restivo said, were later found with similar issues.
  critiques:
  - agent: data_expert
    text_quote: |-
      The shelter's founder, Alfred Restivo, told magazine that the incidents described in their post date to February 2018, when Sydney, a 6-year-old border collie, developed a heavily-swollen tongue. Three more dogs, Restivo said, were later found with similar issues.
    span:
    - 0
    - 264
    issue_label: anecdotal evidence as pattern
    question: |-
      Four dogs with swelling over several months constitutes a pattern of 'chemical burns' from tennis balls—but how many dogs chew tennis balls annually? Without a denominator or baseline of typical adverse events, can we assess whether these four cases represent a real hazard or statistical noise?
    why_it_matters: |-
      A claim of injury causation demands context: is this a rare fluke or a documented risk? Without incidence rates or comparison to normal injury prevalence, readers can't judge whether to change behavior.
    fix_suggestion: |-
      Report how many dogs are treated annually for tennis-ball-related injuries, or note that no veterinary literature documents chemical-burn clusters from tennis balls—then explain why these four cases may or may not be typical.
