    PolitiFact fact-check (ruling: half-true): cherry-picked metric; wrong denominator
  article: |-
    Walking in the door (Sonia Sotomayor) would bring more experience on the bench, and more varied experience on the bench, than anyone currently serving on the United States Supreme Court had when they were appointed.
  critiques:
  - agent: data_expert
    text_quote: |-
      Walking in the door (Sonia Sotomayor) would bring more experience on the bench, and more varied experience on the bench, than anyone currently serving on the United States Supreme Court had when they were appointed.
    span:
    - 0
    - 215
    issue_label: cherry-picked metric; wrong denominator
    question: |-
      The claim compares Sotomayor's total bench experience (17 years) to the bench experience others *had when appointed*—but PolitiFact's own data shows Sotomayor had 17 years on the bench when nominated, while Roberts had only 2 years, Alito 14, and Breyer 12. On the actual metric invoked, Sotomayor ranks second, not first. Why pit 'total experience' against 'experience at appointment' unless the framing guarantees a win?
    why_it_matters: |-
      Shifting the goalposts from bench experience at appointment (where the claim fails) to total experience obscures whether the core assertion—that Sotomayor would arrive with exceptional credentials—is actually true.
    fix_suggestion: |-
      State plainly: 'Sotomayor would have 17 years of federal bench experience at appointment, more than Roberts (2) or Alito (14) at their appointments, but comparable to Breyer (12).' Then test the 'varied experience' claim separately with comparable metrics.
    replacement: null
    severity: medium
