  article: |-
    While al-Baghdadi may have used the name 'Abu Duaa' at one point, this is likely a nom de guerre, a fake name an individual assumes during war, that multiple members of IS used… 'We either arrested or killed a man of that name about half a dozen times.'
  critiques:
  - agent: data_expert
    text_quote: |-
      While al-Baghdadi may have used the name 'Abu Duaa' at one point, this is likely a nom de guerre, a fake name an individual assumes during war, that multiple members of IS used… 'We either arrested or killed a man of that name about half a dozen times.'
