- source: 'PolitiFact fact-check (ruling: false): Wrong year, five-year gap'
  article: |-
    Although King told The Daily Beast he remembered al-Baghdadi being released from Camp Bucca in 2009, the Defense Department disputed this account. According to a statement from the Pentagon, al-Baghdadi was captured in February 2004 and then released a few months later in December.
  critiques:
  - agent: data_expert
    text_quote: |-
      Although King told The Daily Beast he remembered al-Baghdadi being released from Camp Bucca in 2009, the Defense Department disputed this account. According to a statement from the Pentagon, al-Baghdadi was captured in February 2004 and then released a few months later in December.
    span:
    - 0
    - 282
    issue_label: Wrong year, five-year gap
    question: |-
      The claim pins al-Baghdadi's release to 2009, but official Pentagon records and FOIA documents place his release in December 2004—nearly five years earlier, before Obama took office. Why did reporting treat a colonel's fuzzy five-year-old recollection as equal to contemporaneous detainee files?
    why_it_matters: |-
      A five-year dating error flips the entire claim's political thrust—and collapses the supposed link between the release and the Obama administration.
    fix_suggestion: |-
      Check primary documents (Pentagon statements, FOIA detainee records) before relying on a source's memory of an encounter from years prior, especially when the source later concedes he 'could be mistaken' about timing.
    replacement: null
    severity: high
