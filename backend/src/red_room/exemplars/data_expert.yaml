    slate.com — print-vs-online-how-the-print-edition-of-the-new-york-times-trumps-the-online-ve: small sample size, generalizability unexamined
  article: |-
    The discussion of the University of Oregon study showing print readers 'remember significantly more news stories than online news readers' and 'remembered significantly more topics,' with only 45 readers tested.
  critiques:
  - agent: data_expert
    text_quote: |-
      The discussion of the University of Oregon study showing print readers 'remember significantly more news stories than online news readers' and 'remembered significantly more topics,' with only 45 readers tested.
    span:
    - 0
    - 211
    issue_label: small sample size, generalizability unexamined
    question: |-
      The author cites this study as confirmation of his print-superiority bias, but does he adequately caveat that 45 readers is a small sample? Does he explore whether these findings would hold for different demographics, different websites, different reading habits, or different types of news?
    why_it_matters: |-
      Citing a study without interrogating its limitations lets readers believe the finding is more conclusive than it actually is, especially when the author is arguing from anecdotal evidence himself.
    fix_suggestion: |-
      Acknowledge explicitly that 45 is a small sample and that the study tested only one newspaper (the Times) in one format (web), so the conclusions may not generalize to all online news consumption or all readers.
    replacement: null
    severity: medium
