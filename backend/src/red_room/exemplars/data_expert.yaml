    In the 1,000 blog posts examined, bloggers used 2,246 sources, of which only 517 were from traditional media, and Watson found that local public-affairs bloggers are more likely to depend on original sources—documents, government databases, shoe-leather reporting (interviews, eyewitness reports, etc.)—than on media sources.
