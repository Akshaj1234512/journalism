  article: |-
    Selk asked his source Leanda Mason: 'Rather than giving me the conventional science interview, as best you can, just tell me what a day in the life of the spider was like, beginning at its birth.' He specifically requested experiential narrative from the scientist rather than expert commentary.
  critiques:
  - agent: features_editor
    text_quote: |-
      Selk asked his source Leanda Mason: 'Rather than giving me the conventional science interview, as best you can, just tell me what a day in the life of the spider was like, beginning at its birth.' He specifically requested experiential narrative from the scientist rather than expert commentary.
    span:
    - 0
    - 295
    issue_label: source interview reframed for narrative detail
    question: |-
      Instead of conducting a 'conventional science interview,' Selk asked his expert to narrate the spider's sensory and behavioral experience. 'From the get-go, we just made it a personal story about the spider rather than a scientific article.'
    why_it_matters: |-
      Asking scientists for lived-world details rather than expert analysis produces material that feels observed rather than translated.
    fix_suggestion: |-
      When interviewing experts on non-human subjects, try redirecting them away from 'what does this mean' toward 'what would this creature experience'—let them be eyewitnesses to behavior rather than interpreters of significance.
