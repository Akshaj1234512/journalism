    niemanstoryboard.org — the-pitch-erika-hayasaki-on-how-to-leave-the-newsroom-and-kill-it-as-a-freelance: characters as the gatekeep to reportability
  article: |-
    Once you have a world that fascinates you, you have to get access to people who can carry a feature story. With the corn story, I showed up in the community and found survivors. In a science story, you might begin with a study and find the people involved in the research or affected by it. The characters have to be willing to open up and spend time with you and must have a compelling story that is a microcosm of a bigger issue.
  critiques:
  - agent: features_editor
    text_quote: |-
      Once you have a world that fascinates you, you have to get access to people who can carry a feature story. With the corn story, I showed up in the community and found survivors. In a science story, you might begin with a study and find the people involved in the research or affected by it. The characters have to be willing to open up and spend time with you and must have a compelling story that is a microcosm of a bigger issue.
    span:
    - 0
    - 431
    issue_label: characters as the gatekeep to reportability
    question: |-
      Hayasaki emphasizes that 'the characters have to be willing to open up'—recognizing that a strong world or study is inert without human subjects who can both embody the idea and sustain a writer's access over months. How does this reframe what makes a story 'pitchable'?
    why_it_matters: |-
      It shifts the burden from having a clever idea to having secured (or at least assessed the likelihood of securing) willing, articulate human characters—a more honest metric of story viability.
    fix_suggestion: |-
      When vetting story ideas, writers should map character availability early, not late; a great world without characters is a lecture, not a feature.
    replacement: null
    severity: medium
