# Exemplars for features_editor
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the features_editor lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    niemanstoryboard.org — cutting-through-numbing-numbers-with-electrified-writing: closing that inverts the pattern
  article: |-
    He remixes its signature phrase: 'Over 104 years, we should have known better. Numbers should never have made us numb.' It's a small twist; the rearranging of a few words. But it provides a final surprise and a lesson in changing a pattern to make it stick.
  critiques:
  - agent: features_editor
    text_quote: |-
      He remixes its signature phrase: 'Over 104 years, we should have known better. Numbers should never have made us numb.' It's a small twist; the rearranging of a few words. But it provides a final surprise and a lesson in changing a pattern to make it stick.
    span:
    - 0
    - 257
    issue_label: closing that inverts the pattern
    question: |-
      By rearranging the signature phrase at the end—inverting 'numb to the numbers' into 'Numbers should never have made us numb'—doesn't Pierce give readers the satisfaction of recognizing a familiar pattern and then upending it?
    why_it_matters: |-
      The inversion of a repeated pattern in the closing creates surprise and closure at once, leaving readers with a sense that the argument has turned inside out and arrived at its destination.
    fix_suggestion: |-
      If you've established a pattern through repetition, consider inverting or remixing it in your final paragraph to signal that the argument has come full circle or reached new ground.
    replacement: null
    severity: medium
