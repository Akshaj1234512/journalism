    niemanstoryboard.org — the-pitch-erika-hayasaki-on-how-to-leave-the-newsroom-and-kill-it-as-a-freelance: opening with curiosity rather than assigned story
  article: |-
    I often start with a question or world that interests me. For example, my Kindle Single started when I was looking up news about avalanches and found a headline about boys who drowned in corn.
  critiques:
  - agent: features_editor
    text_quote: |-
      I often start with a question or world that interests me. For example, my Kindle Single started when I was looking up news about avalanches and found a headline about boys who drowned in corn.
    span:
    - 0
    - 192
    issue_label: opening with curiosity rather than assigned story
    question: |-
      How does Hayasaki's process of stumbling onto story ideas—following tangents, noticing unexpected details—differ from the typical assigned-beat model, and what does it suggest about how freelancers must generate their own friction?
    why_it_matters: |-
      Freelancers don't have editors assigning them beats; they must develop a methodology for reliably finding stories that will sustain months of reporting and that publications will actually want.
    fix_suggestion: |-
      Teach writers to practice deliberate curiosity: maintain research streams (news alerts, journal subscriptions, courthouse dockets) that generate unexpected collisions, not just follow pre-assigned topics.
