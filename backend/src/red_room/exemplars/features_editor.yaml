    niemanstoryboard.org — from-sept-11-to-covid-using-the-personal-to-write-the-global: opening scene establishes personal stakes before the global event
  article: |-
    At 8:45 AM on September 11, 2001, I arrived at Lenox Hill Hospital in Manhattan, pregnant and expecting a tour of the maternity ward. But the nurses behind the reception desk paid me no attention. They were all staring at the tiny television screen above the reception desk.
  critiques:
  - agent: features_editor
    text_quote: |-
      At 8:45 AM on September 11, 2001, I arrived at Lenox Hill Hospital in Manhattan, pregnant and expecting a tour of the maternity ward. But the nurses behind the reception desk paid me no attention. They were all staring at the tiny television screen above the reception desk.
    span:
    - 0
    - 274
    issue_label: opening scene establishes personal stakes before the global event
    question: |-
      The essay opens with a vivid, intimate scene—a pregnant woman arriving for a routine maternity tour, unaware of the tragedy unfolding—before revealing what's happening. Why does this work as an entry point to a larger meditation on how to write about shared global events through personal experience?
    why_it_matters: |-
      By grounding the reader in the author's specific sensory and emotional reality before widening the lens to the historical moment, the scene demonstrates the core craft principle the essay teaches: that personal detail is the vehicle through which readers can understand collective experience.
    fix_suggestion: |-
      When writing about large historical events, resist the urge to begin with the event itself; instead, begin with a specific, sensory moment from an individual's perspective, then gradually reveal the larger context.
