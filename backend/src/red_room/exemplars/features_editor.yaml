  article: |-
    No official sources. No direct quotes. No context beyond the moment she puts us in. Not even the hint of a context paragraph. It was written, as Knoll later told us, on tight deadline, in a rush of emotion and images.
  critiques:
  - agent: features_editor
    text_quote: |-
      No official sources. No direct quotes. No context beyond the moment she puts us in. Not even the hint of a context paragraph. It was written, as Knoll later told us, on tight deadline, in a rush of emotion and images.
    span:
