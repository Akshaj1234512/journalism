    issue_label: personal observation of a friend reveals a global pattern
    question: |-
      The author moves from her own experience to her friend Ameena's decision to wear a hijab for the first time as a response to post-9/11 discrimination. How does this shift from 'I' to 'we' (via a specific other person) allow her to write about global change without abandoning the personal perspective?
    why_it_matters: |-
      Using a specific relationship and direct observation of someone close to you allows a personal essayist to credibly report on larger social patterns and shifts without claiming omniscience or losing intimacy.
