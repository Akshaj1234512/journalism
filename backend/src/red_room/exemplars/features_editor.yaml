    niemanstoryboard.org — avi-selk-eulogizes-the-long-life-and-too-soon-death-of-spider-16-and-what-she-ta: anthropomorphism through fact, not adjective
  article: |-
    Selk says he deliberately avoided overt anthropomorphism: 'I'm not overtly trying to humanize the spider. I'm just sort of pointing out things, knowing that the reader might read between the lines and do the work for me. Like by pointing out it has a mother, and it is doing the same things its mother did, and by not calling it an 'it' but always calling it a 'she.'
  critiques:
  - agent: features_editor
    text_quote: |-
      Selk says he deliberately avoided overt anthropomorphism: 'I'm not overtly trying to humanize the spider. I'm just sort of pointing out things, knowing that the reader might read between the lines and do the work for me. Like by pointing out it has a mother, and it is doing the same things its mother did, and by not calling it an 'it' but always calling it a 'she.'
    span:
    - 0
    - 367
    issue_label: anthropomorphism through fact, not adjective
    question: |-
      Selk drew a careful line between making readers relate to the spider and making it cheesy. He accomplished this by 'pointing out things, knowing that the reader might read between the lines and do the work for me'—using pronouns and observed behavior rather than explicit comparison.
    why_it_matters: |-
      Readers are more willing to project emotion onto animals when they discover the resemblance themselves rather than being told to feel it.
    fix_suggestion: |-
      Let factual details about behavior (motherhood, repetition of learned actions, female pronouns) invite reader connection instead of stating emotional equivalence outright.
    replacement: null
    severity: medium
