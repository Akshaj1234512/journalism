    issue_label: abandoning conventional structure for emotional authenticity under deadline
    question: |-
      Knoll dispensed entirely with traditional news scaffolding—official attribution, direct quotes, explanatory context—and instead wrote from close observation and the subject's interior thoughts. How does this unconventional approach land on deadline, and what does it risk in terms of credibility?
    why_it_matters: |-
      Stripping away conventional attribution and nut-paragraph structure forces the narrative to earn credibility through sensory specificity and emotional authenticity rather than official validation, a move that works only if reporting is deep enough.
    fix_suggestion: |-
      If you're abandoning traditional structure, ensure you've conducted enough reporting (in this case, a 90-minute recorded interview) to justify writing from inside your subject's head without letting readers question whether you're inventing interiority.
