# Exemplars for opinion_editor
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the opinion_editor lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    niemanstoryboard.org — an-editors-sensitive-guide-to-interviewing-victims-of-trauma: distinguishing authentic purpose from self-serving rationalization
  article: |-
    Your purpose must emanate from an honest place. You have to believe there is some greater good in telling the story. I'm not talking about a souped-up pitch aimed at convincing a trauma survivor or a victim's family to talk to you. And I'm not talking about a seemingly lofty purpose that, boiled down, is more about your reflected glory in the storytelling than the experiences of those whose stories you tell.
  critiques:
  - agent: opinion_editor
    text_quote: |-
      Your purpose must emanate from an honest place. You have to believe there is some greater good in telling the story. I'm not talking about a souped-up pitch aimed at convincing a trauma survivor or a victim's family to talk to you. And I'm not talking about a seemingly lofty purpose that, boiled down, is more about your reflected glory in the storytelling than the experiences of those whose stories you tell.
    span:
    - 0
    - 411
    issue_label: distinguishing authentic purpose from self-serving rationalization
    question: |-
      Your purpose must emanate from an honest place. You have to believe there is some greater good in telling the story... I'm not talking about a seemingly lofty purpose that, boiled down, is more about your reflected glory in the storytelling than the experiences of those whose stories you tell.
    why_it_matters: |-
      Holding reporters accountable to genuine ethical motivation—not just plausible-sounding justifications—is the difference between journalism that serves survivors and journalism that exploits them.
    fix_suggestion: |-
      Before pursuing a trauma story, write down your actual purpose in plain language, then ask yourself honestly whether it centers the survivor's dignity and agency or your own professional advancement.
