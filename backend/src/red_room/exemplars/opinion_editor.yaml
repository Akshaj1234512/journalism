    span:
    - 0
    - 336
    issue_label: sourcing of quoted language and paraphrase
    question: |-
      The interviewer asks whether the phrases Petri used were direct quotes or reconstructions from headlines and comments. Petri confirms some came from 'accounts' and some from comment sections—but the distinction between what's quoted versus paraphrased versus synthesized isn't entirely clear.
    why_it_matters: |-
      When a columnist is using language as evidence of cultural patterns, readers need to know whether they're seeing direct quotes from the public record or the writer's synthesis of a tone she observed.
    fix_suggestion: |-
      If a piece relies on quoted or representative language to make its argument, be explicit about sourcing: 'These are actual headlines' vs. 'This is the tone I've seen in comments' vs. 'This is my paraphrase of a pattern.' The form of the piece shouldn't obscure the origin of the evidence.
