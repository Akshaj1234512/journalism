  article: |-
    Were all the phrases you used in your piece taken from published reports about Kavanaugh's accusers and defenders? I'd seen a lot of them in headlines. The first couple were from accounts of what happened. Then you get into the comments where people will be like, 'She was setting herself up for this' or 'She should have been careful.'
