    niemanstoryboard.org — an-investigative-journalist-takes-a-yearly-leap-out-of-the-comfort-zone-into-fic: thematic armature beneath plot
  article: |-
    A major lesson, though, is that to truly resonate with readers, a story has to operate on multiple levels. You need the strong characters and cliffhangers and twists to pull you along, but what's the deeper thing the story is really about? Redemption. Forgiveness. Healing. Once you settle on that, it should inform and shape the structure, plot and dialogue and everything else that goes into the piece.
  critiques:
  - agent: opinion_editor
    text_quote: |-
      A major lesson, though, is that to truly resonate with readers, a story has to operate on multiple levels. You need the strong characters and cliffhangers and twists to pull you along, but what's the deeper thing the story is really about? Redemption. Forgiveness. Healing. Once you settle on that, it should inform and shape the structure, plot and dialogue and everything else that goes into the piece.
    span:
    - 0
    - 404
    issue_label: thematic armature beneath plot
    question: |-
      How do you prevent a story from being merely entertaining? Borowski insists that beneath the plot mechanics, you must identify the true subject—the theme—and let that govern all your structural and dialogue choices. 'What is the story about?' has two answers: the plot and the deeper idea.
    why_it_matters: |-
      A story that operates only on the level of plot feels thin and forgettable; when plot serves a thematic purpose (redemption, healing, forgiveness), the reader carries something away that lingers.
    fix_suggestion: |-
      Before you draft, write down your story's plot summary in one sentence, then write down its thematic summary in one sentence. Every scene should serve both.
    replacement: null
    severity: high
