  article: |-
    My editor said, 'Just spit it out, man. You got an opinion. Spit it out.' My advice is to give it a chance. You don't have to give up your reporting skills.
  critiques:
  - agent: opinion_editor
    text_quote: |-
      My editor said, 'Just spit it out, man. You got an opinion. Spit it out.' My advice is to give it a chance. You don't have to give up your reporting skills.
    span:
