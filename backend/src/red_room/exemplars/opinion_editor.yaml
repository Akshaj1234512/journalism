    - 156
    issue_label: opinion must be declarative, not hedged
    question: |-
      Gerritt admits that when he first started writing editorials, 'one of my weaknesses was that my editorials and columns lacked strong opinion and read like well-reported feature stories.' His editor had to push him to state his position plainly rather than bury it in reporting. This suggests a common trap for reporters moving into opinion work.
    why_it_matters: |-
      An editorial without a clear, forceful position reads as reporting, not argument—it fails to do the work opinion is supposed to do, which is to persuade or illuminate a stance.
    fix_suggestion: |-
      When moving from reporting to opinion, explicitly separate the reporting foundation from the claim you're making. State your position early and plainly, then use reporting to support it. Don't let evidence do the work that argument should do.
