  article: |-
    TheRedPilledNews claimed the Times had stated 'as fact' that 'Soros and Clinton Paid Woman to Accuse Trump of Sexual Attack.' The Times article outlined efforts to 'capitalize upon and amplify allegations' and provide 'financial backing to their accusers,' but explicitly did not state that anyone had paid women to fabricate false allegations.
