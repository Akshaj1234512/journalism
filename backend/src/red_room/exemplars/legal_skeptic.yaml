      TheRedPilledNews claimed the Times had stated 'as fact' that 'Soros and Clinton Paid Woman to Accuse Trump of Sexual Attack.' The Times article outlined efforts to 'capitalize upon and amplify allegations' and provide 'financial backing to their accusers,' but explicitly did not state that anyone had paid women to fabricate false allegations.
    span:
    - 0
    - 344
    issue_label: Unsubstantiated criminal conspiracy claim
    question: |-
      TheRedPilledNews accused Clinton and Soros of paying women to make false allegations—a serious criminal claim. But PolitiFact found the Times article never stated this, only that some lawyers accepted donations to vet and support accusers. Where's the evidence that allegations were intentionally fabricated rather than vetting costs covered?
    why_it_matters: |-
      Conflating financial support for accusers with paying women to lie is a defamation-adjacent claim that requires explicit proof, not inference from fundraising practices.
