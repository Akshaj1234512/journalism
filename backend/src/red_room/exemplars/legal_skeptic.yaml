      Sometimes we obscure names not because the women ask for it, but because our legal department does. We use real first names as a second choice and go to pseudonyms only if we have to.
    span:
    - 0
    - 183
    issue_label: Name anonymization hierarchy and legal vetting
    question: |-
      What's the anonymization ladder? Real full name first, then real first name only, then pseudonym as a last resort—and sometimes legal will require anonymity even if the source doesn't ask for it.
    why_it_matters: |-
      This shows how to balance source protection with searchability and accountability; full names are preferable for reader trust and verification, but legal exposure can override source preference.
    fix_suggestion: |-
      Understand that anonymity decisions aren't just about source comfort—they're also about legal risk. Expect a legal review on sensitive stories and be prepared to argue for or against full naming.
    replacement: null
    severity: medium
