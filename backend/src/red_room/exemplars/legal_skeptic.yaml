  - agent: legal_skeptic
    text_quote: |-
      I never spoke to them, but it wasn't for lack of trying. Apart from contacting publicists, I reached out to all three architects who'd worked on the project; the owners' lawyer; their representative on the construction site; one of their fellow investors in various cultural productions they've backed; and the Juilliard School, where he'd been a trustee, and set up a scholarship for struggling jazz musicians.
