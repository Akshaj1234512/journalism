  article: |-
    Brewer is accused in a lawsuit filed Tuesday in Cook County of diverting more than 400,000 dollars from the trust, hiding the funds in offshore accounts, and threatening his former secretary into silence. Brewer's lawyer said the claims were 'a fiction' and would be contested at trial.
