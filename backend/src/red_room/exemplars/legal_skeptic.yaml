      Conrad Black held that 'Murdoch has no loyalty to anyone or anything except his company'...and has 'betrayed every political leader who ever helped him in any country, except Ronald Reagan and perhaps Tony Blair.'
    span:
    - 0
    - 213
    issue_label: sweeping character attack from convicted felon
    question: |-
      The piece quotes Conrad Black—identified as a 'convicted felon'—making sweeping character judgments about Murdoch's lifetime of betrayal. Is Black a credible source for this kind of universal moral claim about Murdoch's nature, and does the convict status weaken or strengthen the passage?
    why_it_matters: |-
      Sourcing damaging character claims to someone with their own credibility problems can undermine the argument rather than strengthen it, even if the quote is accurate.
