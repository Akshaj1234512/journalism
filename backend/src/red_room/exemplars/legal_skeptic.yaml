    - 0
    - 411
    issue_label: right-to-reply documented but owners don't respond
    question: |-
      Margolick makes specific, critical claims about the owners' indifference and callousness but never speaks to them. Does documenting the attempt to reach them (and their silence) shield the piece legally, or does the piece still need their side?
    why_it_matters: |-
      Right-to-reply attempts—especially when documented and detailed—create a strong editorial defense. The owners' refusal to respond becomes part of the story and doesn't require the writer to soften his characterization.
    fix_suggestion: |-
      Always attempt to reach the subjects of criticism through multiple channels and report those attempts in the piece. The fact that you tried and they refused or ignored you is newsworthy in itself and protects you legally.
