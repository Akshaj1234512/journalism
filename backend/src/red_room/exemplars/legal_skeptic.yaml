- source: |-
    slate.com — al-gore-washed-up-politician-finds-a-new-venue-for-his-ideas-press-criticism.htm: strong accusation relying on indirect evidence
  article: |-
    The entire piece names just one corrupt news organization: the Fox News Channel. Yes, it's always fun to cane the Fox News Channel for its crimes, but Gore doesn't have the goods. Instead of citing a 'refereed' news story broadcast by Fox, he quotes from an email from a Fox News Washington Managing Editor Bill Sammon.
  critiques:
  - agent: legal_skeptic
    text_quote: |-
      The entire piece names just one corrupt news organization: the Fox News Channel. Yes, it's always fun to cane the Fox News Channel for its crimes, but Gore doesn't have the goods. Instead of citing a 'refereed' news story broadcast by Fox, he quotes from an email from a Fox News Washington Managing Editor Bill Sammon.
    span:
    - 0
    - 319
    issue_label: strong accusation relying on indirect evidence
    question: |-
      Gore calls Fox News 'corrupt' but his only evidence is a leaked email from an editor instructing reporters to question climate data—not actual news stories showing bias. Is an instruction to question data the same as corruption? The distinction matters.
    why_it_matters: |-
      Calling an organization corrupt requires demonstrating corrupt behavior through its actual published work, not through internal email directives that might reflect editorial judgment rather than malfeasance.
    fix_suggestion: |-
      If you're going to use a leaked email as evidence of wrongdoing, explain explicitly why the contents constitute corruption rather than leaving readers to infer it.
    replacement: null
    severity: high
- source: |-
    slate.com — al-gore-washed-up-politician-finds-a-new-venue-for-his-ideas-press-criticism.htm: incomplete quotation altering meaning
  article: |-
    In his Rolling Stone piece, Gore quotes a 'philosopher' who wrote, 'The conversion of all questions of truth into questions of power has attacked the very heart of the distinction between true and false.' The quotation from Theodor W. Adorno... reads in its entirety, 'The conversion of all questions of truth into questions of power, a process that truth itself cannot escape if it is not to be annihilated by power, not only suppresses truth, as in earlier despotic orders, but has attacked the very heart of the distinction between true and false, which the hirelings of logic were in any case diligently working to abolish.'
  critiques:
  - agent: legal_skeptic
    text_quote: |-
      In his Rolling Stone piece, Gore quotes a 'philosopher' who wrote, 'The conversion of all questions of truth into questions of power has attacked the very heart of the distinction between true and false.' The quotation from Theodor W. Adorno... reads in its entirety, 'The conversion of all questions of truth into questions of power, a process that truth itself cannot escape if it is not to be annihilated by power, not only suppresses truth, as in earlier despotic orders, but has attacked the very heart of the distinction between true and false, which the hirelings of logic were in any case diligently working to abolish.'
    span:
    - 0
    - 628
    issue_label: incomplete quotation altering meaning
    question: |-
      Gore's version of the Adorno quote is missing crucial qualifiers about power 'annihilating' truth—language that complicates rather than simplifies the philosophical claim. The dropped text matters: it suggests Adorno was more nuanced than Gore's usage implies.
    why_it_matters: |-
      Selectively editing quotations to support your thesis, even without adding or changing words, misrepresents the source and constitutes intellectual dishonesty.
    fix_suggestion: |-
      Use ellipses to indicate omissions, as Gore did in his book 'Our Choice,' or quote the full passage. Never drop language that changes the meaning or force of the original claim.
    replacement: null
    severity: high
