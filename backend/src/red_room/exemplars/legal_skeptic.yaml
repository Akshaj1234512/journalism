# Exemplars for legal_skeptic
# Real editorial-room critique material pulled from two sources:
#   1. PolitiFact fact-checks (via LIAR_RAW_RAWFC, 11k items)
#   2. Nieman Storyboard + Slate Press Box craft criticism articles
#      (Annotation Tuesday, Essays on Craft, 5 Questions)
# Each was passed through Claude Haiku to extract specific editor-
# room observations, classified into the legal_skeptic lane, and
# the top 15 were selected with a diversity constraint
# (round-robin across distinct sub-issue buckets) so the exemplars
# cover the lane's failure-mode range rather than 15
# variants of the same critique.
#
- source: |-
    niemanstoryboard.org — take-two-avi-selk-on-the-life-and-death-of-a-spider-aggregation-and-writing-fast: aggregation without source verification chain
  article: |-
    CNN reported that there was a banner that said 'Death to Islam.' It was a buried detail in the CNN story, but I used it as my opening. Then we wrote a headline around it. Then CNN ran a correction, saying that banner was not actually at that rally.
  critiques:
  - agent: legal_skeptic
    text_quote: |-
      CNN reported that there was a banner that said 'Death to Islam.' It was a buried detail in the CNN story, but I used it as my opening. Then we wrote a headline around it. Then CNN ran a correction, saying that banner was not actually at that rally.
    span:
    - 0
    - 245
    issue_label: aggregation without source verification chain
    question: |-
      Selk took a buried detail from CNN and elevated it to his opening without independently verifying it—CNN had a reporter at the rally, so he thought it was safe. CNN later corrected the detail. Selk owned the error publicly but notes the trap: relying on another outlet's presence at an event doesn't guarantee their facts are correct.
    why_it_matters: |-
      Aggregation carries the risk of amplifying errors; sourcing to 'they were there' is insufficient protection when the original reporter's own reporting later gets corrected.
    fix_suggestion: |-
      Even when aggregating from outlets with on-the-ground sources, treat highly specific factual claims (especially inflammatory ones used as ledepoints) as requiring additional verification or explicit qualification of source reliability.
    replacement: null
    severity: high
