    PolitiFact fact-check (ruling: half-true): unsubstantiated connection to named party
  article: |-
    Eric Holder has never been listed on any public records associated with the property at 6210 Old National Highway, a fact which significantly undermines the claim made in the 2019 meme, that Holder and his wife Sharon 'own abortion clinics.'
  critiques:
  - agent: legal_skeptic
    text_quote: |-
      Eric Holder has never been listed on any public records associated with the property at 6210 Old National Highway, a fact which significantly undermines the claim made in the 2019 meme, that Holder and his wife Sharon 'own abortion clinics.'
    span:
    - 0
    - 241
    issue_label: unsubstantiated connection to named party
    question: |-
      The original 2012 reports and 2019 meme directly named Eric Holder as an owner. The fact-checker demolishes this by showing he's not on a single public record. Why is this not grounds for a 'false' rating on the Holder-specific prong, rather than half-true?
    why_it_matters: |-
      The claim's most serious allegation—directly tying the former Attorney General to the property—is conclusively disproven, yet the half-true rating suggests genuine ambiguity where none exists on this element.
    fix_suggestion: |-
      Break the ruling into parts: 'False' for the claim that Eric Holder owns property; 'True but misleading' or 'Mostly True' for the claim about his wife and sister-in-law's trustee status and the clinic's presence on the property.
    replacement: null
    severity: high
