- source: 'PolitiFact fact-check (ruling: half-true): unsubstantiated criminal verb'
  article: |-
    The claim, made in @asdomke's tweet, that Rosenberg was 'convicted of' several 1983 bombings, was therefore false. The claim in the headline of an article on Wayne Dupree's website that Rosenberg 'carried out' the bombings stands in contrast to the fact that she was never tried or convicted in relation to those incidents.
  critiques:
  - agent: legal_skeptic
    text_quote: |-
      The claim, made in @asdomke's tweet, that Rosenberg was 'convicted of' several 1983 bombings, was therefore false. The claim in the headline of an article on Wayne Dupree's website that Rosenberg 'carried out' the bombings stands in contrast to the fact that she was never tried or convicted in relation to those incidents.
    span:
    - 0
    - 323
    issue_label: unsubstantiated criminal verb
    question: |-
      The tweet and headlines claim Rosenberg was 'convicted' of or 'carried out' the 1983–1985 bombing campaign. But prosecutors dropped those charges in 1990 before trial. On what basis can you attribute specific bombings to someone who was never charged or convicted for them?
    why_it_matters: |-
      Attributing specific criminal acts without conviction or guilty plea is the shape of defamation; it inflates a person's culpability beyond what the law established.
    fix_suggestion: |-
      Revise to: 'Rosenberg was charged with aiding and abetting bombings in 1988, but those charges were dropped in 1990 before trial. She was convicted only of weapons and explosives possession in 1985.'
    replacement: null
    severity: high
- source: 'PolitiFact fact-check (ruling: half-true): anachronistic legal labeling'
  article: |-
    However, that definition was only added in 1992, years after Rosenberg was convicted of weapons and explosives possession and charged for her alleged role in the 1983-1985 bombing campaign, and her alleged role in a series of armed robberies by left-wing revolutionaries. In any event, despite the existence of a definition of domestic terrorism in federal law, a discrete criminal offense of domestic terrorism does not exist, and did not exist in the 1980s.
  critiques:
  - agent: legal_skeptic
    text_quote: |-
      However, that definition was only added in 1992, years after Rosenberg was convicted of weapons and explosives possession and charged for her alleged role in the 1983-1985 bombing campaign, and her alleged role in a series of armed robberies by left-wing revolutionaries. In any event, despite the existence of a definition of domestic terrorism in federal law, a discrete criminal offense of domestic terrorism does not exist, and did not exist in the 1980s.
    span:
    - 0
    - 459
    issue_label: anachronistic legal labeling
    question: |-
      The original posts and headlines call Rosenberg a 'convicted terrorist,' but no terrorism statute existed when her 1985 conviction occurred, and she was convicted only of weapons possession. Can a person be a 'convicted terrorist' when no terrorism conviction was possible under law at the time?
    why_it_matters: |-
      Using modern legal categories to describe historical conduct without that category obscures what Rosenberg was actually convicted of and misleads readers about the scope of legal culpability.
    fix_suggestion: |-
      If using 'terrorist,' add explicit qualifier: 'Rosenberg was convicted of weapons and explosives possession; she was charged but not convicted in connection with a 1983–1985 bombing campaign that could retrospectively fit definitions of domestic terrorism.'
