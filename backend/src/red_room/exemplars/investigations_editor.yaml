    niemanstoryboard.org — pitching-propublicas-local-reporting-network-focus-on-sources-and-impact: Question-only pitch insufficient for year-long project
  article: |-
    People identify something bad going on, but have no idea what's behind it. The proposal comes in with a question, and 'I want to investigate whether X, Y and Z is happening.' That is an excellent first question, but when you're in a year-long investigative project that has a deadline, you're going to need to know more about the project than asking those initial questions.
  critiques:
  - agent: investigations_editor
    text_quote: |-
      People identify something bad going on, but have no idea what's behind it. The proposal comes in with a question, and 'I want to investigate whether X, Y and Z is happening.' That is an excellent first question, but when you're in a year-long investigative project that has a deadline, you're going to need to know more about the project than asking those initial questions.
    span:
    - 0
    - 374
    issue_label: Question-only pitch insufficient for year-long project
    question: |-
      Blustain identifies a common weakness: pitches that are purely interrogative, offering a phenomenon to investigate but no emerging hypothesis or explanation for what's driving it. A year-long investigation needs more scaffolding than 'Is X happening?'
    why_it_matters: |-
      Editors need to see that the reporter has already begun to understand the causation and mechanics of the problem, not just spotted a symptom.
    fix_suggestion: |-
      Move beyond identifying the problem to proposing a preliminary explanation of how or why it's happening. What is your working theory about the root cause?
    replacement: null
    severity: medium
