      Rather than simply aggregating competing published accounts of the spider's death, Selk chose the slower path: reading the original study and then the historical study cited within it. He acknowledges this was *not* faster, but it yielded something the parroting cycle had missed.
    why_it_matters: |-
      Going to primary sources breaks aggregation loops and uncovers details competitors missed, creating genuinely fresh reporting even under deadline constraints.
