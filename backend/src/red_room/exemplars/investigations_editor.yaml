    issue_label: Specificity to place and moment, not generic pattern
    question: |-
      Ornstein emphasizes that editors should reject proposals where the problem is national but the reporting doesn't explain why this particular jurisdiction, at this particular time, is the right place to tell it. A criminal justice problem happening everywhere is not a reason to greenlight a local investigation unless the reporter can articulate the local angle.
    why_it_matters: |-
      Ensures that local investigative reporting serves actual community accountability rather than applying a generic national template to a local newsroom.
