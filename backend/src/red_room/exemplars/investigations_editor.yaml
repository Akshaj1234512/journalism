    question: |-
      Michelle Mizner describes the process of selecting which children to feature as organic, based on reporting that revealed which kids had the deepest understanding of the story's themes. How do you balance the temptation to pick the most photogenic or quotable subject against the one whose reporting demonstrates genuine knowledge?
