  article: |-
    I spent more than a month talking to Mark Hilinski (Tyler's father) before he revealed that Tyler had CTE. I was more interested in the timeless themes – a family's grief, an unexplainable tragedy.
  critiques:
  - agent: investigations_editor
    text_quote: |-
      I spent more than a month talking to Mark Hilinski (Tyler's father) before he revealed that Tyler had CTE. I was more interested in the timeless themes – a family's grief, an unexplainable tragedy.
    span:
    - 0
    - 197
    issue_label: reporter resists lead-friendly headline angle to honor complexity
    question: |-
      How did you resist the impulse to lead with CTE—the most journalistically convenient and sensational element—when the family hadn't immediately volunteered that information, and how did withholding that reveal until halfway through shape reader trust?
    why_it_matters: |-
      By honoring the reporting timeline (family reveals CTE slowly, not upfront), the writer avoids the 'football killed him' reductionism and creates space for readers to experience the family's own evolution from confusion to partial answers.
    fix_suggestion: |-
      When reporting sensitive stories, let the source's own pace of disclosure guide your story structure. What they volunteer first often reflects what matters most to understanding their experience, not what makes the best headline.
