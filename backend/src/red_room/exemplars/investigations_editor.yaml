  article: |-
    Holland took detailed notes during and after her mother's ICU hospitalization and EMDR therapy sessions, sometimes immediately after events and sometimes reconstructing from years earlier. For the therapy sessions, she didn't ask to see her therapist's notes, 'but knowing I had the option helped me, because I wanted to just be in the moment in the in the therapy so that it would work.'
  critiques:
  - agent: investigations_editor
    text_quote: |-
      Holland took detailed notes during and after her mother's ICU hospitalization and EMDR therapy sessions, sometimes immediately after events and sometimes reconstructing from years earlier. For the therapy sessions, she didn't ask to see her therapist's notes, 'but knowing I had the option helped me, because I wanted to just be in the moment in the in the therapy so that it would work.'
    span:
    - 0
    - 388
    issue_label: Real-time documentation vs. lived experience
    question: |-
      There's a tension between being an observer with a notebook and being a participant fully present in an emotional moment. How do you document something you're also experiencing without letting the documentation undermine the experience itself?
    why_it_matters: |-
      Taking contemporaneous notes increases accuracy and specificity, but the act of note-taking can distance you from emotional authenticity or create self-consciousness that shapes what actually happens.
    fix_suggestion: |-
      When reporting on your own emotional experiences, consider waiting until after the moment to take notes (as Holland did with therapy) if your presence of mind during the event is more important than perfect recall. For less volatile moments, detailed contemporaneous notes are worth the minor distancing effect.
