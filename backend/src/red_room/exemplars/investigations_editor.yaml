    niemanstoryboard.org — take-two-avi-selk-on-the-life-and-death-of-a-spider-aggregation-and-writing-fast: aggregation through data extraction, not prose mimicry
  article: |-
    When I am skimming an AP story or something, as much as I can I'm trying to distill the information away from the actual prose. I intentionally sometimes read stories backwards, or just randomly paste lines into a story... When you do it that way, and think about your own original outline and how you want to tell it, you end up with something unique.
  critiques:
  - agent: investigations_editor
    text_quote: |-
      When I am skimming an AP story or something, as much as I can I'm trying to distill the information away from the actual prose. I intentionally sometimes read stories backwards, or just randomly paste lines into a story... When you do it that way, and think about your own original outline and how you want to tell it, you end up with something unique.
    span:
    - 0
    - 352
    issue_label: aggregation through data extraction, not prose mimicry
    question: |-
      Selk describes deliberately separating information from prose when aggregating: he reads stories backwards, randomly reorders pasted lines, and rebuilds from his own outline to avoid accidentally echoing source structure or language. He contrasts this with a dismissed colleague who 'closely copied not just the information but the form of the story.'
    why_it_matters: |-
      This method transforms aggregated facts into genuinely original reporting by forcing the writer to conceptualize the story separately from its source narration, preventing plagiarism-adjacent prose duplication.
    fix_suggestion: |-
      When aggregating, extract facts into a raw text dump, then outline independently before writing. Avoid reading aggregated sources in final order; scramble them mentally so you reconstruct the narrative from your own logic.
    replacement: null
    severity: high
