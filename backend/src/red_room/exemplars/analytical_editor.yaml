    issue_label: abstract advice, no analysis, placeholder confusion
    question: |-
      You're giving instructions ('must forgive,' 'must brush it off') but not analyzing what patience *means* or *does* in these moments. And what are '@CAPS2' and '@CAPS3'? These markers break the argument.
    why_it_matters: |-
      The passage reads like a self-help listicle rather than reflection — no insight into why self-patience matters or how it actually works.
