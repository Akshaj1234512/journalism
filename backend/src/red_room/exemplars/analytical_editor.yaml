# Exemplars for analytical_editor
# Human-editable. Each list item below is one exemplar.
# To disable an exemplar without deleting it, comment out its lines with #.
# Field order: source, article, critiques (and per critique: agent, text_quote,
# span, issue_label, question, why_it_matters, fix_suggestion, replacement, severity).
#
- source: 'Cleanth Brooks, The Well Wrought Urn: paraphrase as the heresy of summary'
  article: |-
    In Hamlet's 'To be or not to be' soliloquy, Hamlet considers whether life is worth living. He weighs the suffering of existence against the unknown of death. He concludes that fear of the unknown keeps people alive.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      In Hamlet's 'To be or not to be' soliloquy, Hamlet considers whether life is worth living. He weighs the suffering of existence against the unknown of death. He concludes that fear of the unknown keeps people alive.
    span: [0, 215]
    issue_label: summary not analysis
    question: |-
      The paragraph paraphrases what the soliloquy says. The analytical work has not begun. What does the speech DO that the paraphrase cannot reach: the syntactic suspension across forty lines, the shift from 'I' to 'we,' the way the soliloquy never names suicide directly?
    why_it_matters: |-
      Summary tells the reader what they already saw on the page; analysis says what they would not have noticed on their own.
    fix_suggestion: |-
      Pick one of the formal features (the suspension, the pronoun shift, the unspeakable middle term) and read it as a pattern. What is the speech enacting, not just saying?
    replacement: null
    severity: high
- source: 'I.A. Richards, Practical Criticism: stay close before generalizing'
  article: |-
    Fitzgerald's The Great Gatsby is a critique of the American Dream. Throughout the novel, Fitzgerald shows the corruption beneath the surface of wealth, illustrating how the pursuit of money corrupts moral values.
  critiques:
  - agent: analytical_editor
    text_quote: Fitzgerald's The Great Gatsby is a critique of the American Dream.
    span: [0, 66]
    issue_label: generalization without close reading
    question: |-
      You reach the abstract conclusion in the first sentence and never come down to the words on the page. Where in the novel does the 'critique' actually live? The green-light passage? The valley of ashes description? The catalog of Gatsby's guest list? The conclusion is defensible; the reading has not started.
    why_it_matters: |-
      Generalizations without close reading sound like summaries of other people's readings, not your own engagement with the text.
    fix_suggestion: |-
      Pick one passage (the green light, Daisy's voice, the valley of ashes) and stay with it for a paragraph. Let the abstract claim emerge from the specifics, not stand in for them.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: the unexamined ''obviously'''
  article: |-
    Obviously, the conch in Lord of the Flies represents democracy and civilized order. When the conch breaks, civilization breaks too.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      Obviously, the conch in Lord of the Flies represents democracy and civilized order.
    span: [0, 83]
    issue_label: unearned 'obviously'
    question: |-
      Strong analysis earns the reading by tracing the move. 'Obviously' is the word that tries to skip the work. A serious reader could argue the conch represents arbitrary authority, or rule by ritual rather than democracy, or the colonial schoolmaster's bell that the boys are imitating. The reading is contestable; the 'obviously' hides that.
    why_it_matters: |-
      An unearned 'obviously' tells the reader you have not considered, or have not noticed, that other readings exist.
    fix_suggestion: |-
      Cut 'obviously' and earn the reading: 'I read the conch as a symbol of democratic order because of how it functions in the assembly scenes (chapter 2) and because of what happens to it when Roger acts (chapter 11).' Specifics earn the claim that 'obviously' tried to assume.
    replacement: 'I read the conch as a symbol of democratic order:'
    severity: medium
- source: Helen Vendler, on interpretive risk in literary criticism
  article: |-
    Shakespeare's Sonnet 18 ('Shall I compare thee to a summer's day?') is a beautiful love poem in which the speaker compares his beloved to summer and concludes that the beloved is more beautiful and lasting.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      Shakespeare's Sonnet 18 ('Shall I compare thee to a summer's day?') is a beautiful love poem in which the speaker compares his beloved to summer and concludes that the beloved is more beautiful and lasting.
    span: [0, 206]
    issue_label: no interpretive risk
    question: |-
      This is the safe reading every reader would already hold. Analytical writing has to say something the poem could push back on, something another smart reader might read differently. A risk reading: the sonnet is not actually about the beloved at all; it is about the speaker's claim to immortalize, and 'thy eternal summer' is the speaker's poem, not the beloved.
    why_it_matters: |-
      A reading no one would dispute carries no interpretive weight; the essay is restating the consensus the poem already enacts.
    fix_suggestion: |-
      Take a riskier position the poem could falsify. The 'risk reading' above is one; another is that the volta at line 9 shifts from comparison to claim of immortality, and the rest of the poem is about poetry's power, not the beloved's beauty.
    replacement: null
    severity: high
- source: David Lodge, The Art of Fiction, on noticing form (genre, narration)
  article: |-
    In The Great Gatsby, Nick Carraway tells us that Gatsby was 'gorgeous' and that there was 'something gorgeous about him.' This shows that Gatsby was a charismatic person who attracted attention.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      Nick Carraway tells us that Gatsby was 'gorgeous' and that there was 'something gorgeous about him.' This shows that Gatsby was a charismatic person who attracted attention.
    span: [21, 194]
    issue_label: form ignored
    question: |-
      You quote the description as if it were unmediated information about Gatsby. Lodge: a novel's narration is itself a formal choice. Gatsby is not narrated by Gatsby or by the omniscient narrator; he is narrated by Nick, who is unreliable in specific ways. 'Gorgeous' is Nick's word, not Fitzgerald's, and it tells us as much about Nick's relation to Gatsby as it does about Gatsby.
    why_it_matters: |-
      Ignoring the formal choice (who is narrating, in what voice) reads the novel as if it were a transcript instead of a constructed text.
    fix_suggestion: |-
      Add the form to the reading: 'Nick calls Gatsby gorgeous. That word is Nick's; we get Gatsby only through this particular narrator's fascination, which is itself part of what the novel is about.'
    replacement: null
    severity: medium
- source: 'E.H. Carr, What Is History?: anachronism in historical analysis'
  article: |-
    Thomas Jefferson was a hypocrite because he wrote that 'all men are created equal' while owning slaves. He clearly should have known better.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      Thomas Jefferson was a hypocrite because he wrote that 'all men are created equal' while owning slaves. He clearly should have known better.
    span: [0, 140]
    issue_label: anachronism in historical analysis
    question: |-
      To the historian: do not judge the past by present standards without naming the distance. Jefferson's contradiction is a real analytical subject, but the analytical work is what 'all men' could and could not mean in 1776, who was already arguing against slavery (the Quakers, Granville Sharp, Olaudah Equiano), and how Jefferson positioned himself in that argument. 'Should have known better' assumes a 21st-century vantage and stops.
    why_it_matters: |-
      Modern-projection forecloses the analytical work that would actually explain the contradiction.
    fix_suggestion: |-
      Stay inside the period long enough to see how Jefferson positioned himself: his Notes on the State of Virginia, his correspondence with Banneker, the omitted slavery passage from the Declaration draft. The hypocrisy reading lands harder when it earns itself.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: one moment, no pattern'
  article: |-
    Toni Morrison's Beloved is about the haunting of memory. In chapter 5, Sethe sees Beloved on the porch and recognizes her dead daughter. This moment shows how the past returns to haunt the present.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      In chapter 5, Sethe sees Beloved on the porch and recognizes her dead daughter. This moment shows how the past returns to haunt the present.
    span: [57, 197]
    issue_label: one moment, no pattern
    question: |-
      You pick one scene and extract a sweeping claim about the whole novel from it. Analytical claims need a pattern: two or three moments that together support the reading. The novel has many returns of the past (Sethe's scarred back, Paul D's tobacco-tin heart, the Sweet Home memories), and they do not all work the same way. Which pattern of return does your reading rest on?
    why_it_matters: |-
      A claim about the whole novel that rests on one moment can be defeated by any second moment that complicates it.
    fix_suggestion: |-
      Find the second moment. Does the pattern hold across Paul D's memory work? Does Denver's relation to the past extend it or complicate it? Use the second moment to specify what kind of haunting your reading actually claims.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: misreading'
  article: |-
    In 'The Road Not Taken,' Robert Frost argues that taking the unconventional path is what makes a meaningful life. He famously concludes 'I took the one less traveled by, / And that has made all the difference.'
  critiques:
  - agent: analytical_editor
    text_quote: |-
      In 'The Road Not Taken,' Robert Frost argues that taking the unconventional path is what makes a meaningful life.
    span: [0, 113]
    issue_label: 'misreading: the poem says the opposite'
    question: |-
      The poem says the opposite of the standard reading. Frost's speaker writes that 'the passing there / Had worn them really about the same' (lines 9-10) and that he 'shall be telling this with a sigh' (line 16). The 'less traveled' claim is what the speaker will later tell himself, ironically; the poem is about the stories we construct to justify the choices we already made. Frost himself called it a 'tricky poem.'
    why_it_matters: |-
      An interpretive claim that the text directly contradicts is the line a careful reader (or grader) will catch first.
    fix_suggestion: |-
      Re-read the second and fourth stanzas with the misreading in mind. The poem's actual claim ('two roads about the same, and I will tell myself otherwise later') is more interesting than the popular reading; build the analysis on what the poem actually does.
    replacement: null
    severity: high
- source: I.A. Richards, on quote-and-restate
  article: |-
    When Lincoln says 'four score and seven years ago,' he means 87 years ago. This shows that he is being formal.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      When Lincoln says 'four score and seven years ago,' he means 87 years ago. This shows that he is being formal.
    span: [0, 110]
    issue_label: quote and restate
    question: |-
      You quote the line and restate its arithmetic meaning. That is decoding, not analysis. The analytical work would be: why 'four score and seven' rather than '87'? The biblical cadence (Psalm 90:10), the way it places the founding in epic time rather than calendar time, the rhetorical effect on a Civil War audience standing on a battlefield. The line is doing several things; restating its surface arithmetic misses all of them.
    why_it_matters: Restatement burns the chance the quote gave you to read what it
      actually does.
    fix_suggestion: |-
      Pick one of the things the phrasing does (biblical register, epic time-frame, the cadence) and read it: 'the phrasing places 1776 in epic time. To an 1863 audience standing where seven thousand men had died three days before, the cadence offers a frame larger than the calendar.'
    replacement: null
    severity: medium
- source: 'Standard writing-center diagnostic: pattern, no through-line'
  article: |-
    The Great Gatsby is full of color symbolism. Daisy wears white. The light at the end of her dock is green. The valley of ashes is gray. Gatsby's car is yellow. These colors create a vivid atmosphere.
  critiques:
  - agent: analytical_editor
    text_quote: These colors create a vivid atmosphere.
    span: [160, 199]
    issue_label: pattern noted, no through-line
    question: |-
      You notice four color details, which is genuine observation. Then the analysis lands on 'vivid atmosphere,' which does not say what the colors together do. The through-line that pulls observation into interpretation has not been drawn. Do the colors organize a moral geography (white for the unattainable, gray for what wealth produces, green for unreachable longing)? Does Gatsby's yellow place him in the ashes despite his striving? Pattern needs a claim.
    why_it_matters: |-
      Without a through-line, observations are decoration; the essay has not earned an interpretive reading.
    fix_suggestion: |-
      Pick the strongest through-line your details could support and argue it. The 'moral geography' reading is one option; the 'colors that organize money' reading is another. Either is stronger than 'vivid atmosphere.'
    replacement: null
    severity: medium
