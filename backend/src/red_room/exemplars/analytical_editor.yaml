- source: 'AES2 (score 4/6): observation without insight, summary as analysis'
  article: |-
    The author understands the dangers of trying to research Venus up close. He mentions the dangers of how hot is is, "On the planet's surface, temperatures average over 800 degrees Farenheit", and how dense and thick it is, "A thick atomsphere of almost 97 percent carbon dioxide blankets Venus.", but he believes that Venus should still be explored, despite all these risks that could kill humans if they got too close and melt spacecrafts, which is a quite a lot of money lost.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      The author understands the dangers of trying to research Venus up close. He mentions the dangers of how hot is is, "On the planet's surface, temperatures average over 800 degrees Farenheit", and how dense and thick it is, "A thick atomsphere of almost 97 percent carbon dioxide blankets Venus.", but he believes that Venus should still be explored, despite all these risks that could kill humans if they got too close and melt spacecrafts, which is a quite a lot of money lost.
    span:
    - 0
    - 477
    issue_label: observation without insight, summary as analysis
    question: |-
      You've spotted that the author acknowledges dangers and still advocates exploration—that's correct—but you don't analyze *how* or *why* he makes that move persuasive. Does he minimize the risks? Reframe them as acceptable costs? Show readers why acknowledging danger actually *strengthens* his credibility here.
    why_it_matters: |-
      You're summarizing the author's move instead of examining its rhetorical effect, which means you're not actually analyzing the text.
    fix_suggestion: |-
      Revise: 'By conceding the extreme risks—800-degree temperatures, crushing atmosphere—the author establishes credibility; he's not hiding dangers. He then asks readers to weigh those costs against the proximity advantage, implying that proximity *justifies* the expense. This turns an objection into a reason to explore.'
    replacement: null
    severity: high
