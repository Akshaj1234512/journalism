# Exemplars for analytical_editor
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'PERSUADE_2.0 (score 4/6): summarizing quote without analytical move'
  article: |-
    The author sugests that studying Venus is a worthy pursuit despite the dangers it presents and supports that when they say, "Striving to meet the challenge presented by Venus has value, not only because of the insight to be gained on the planet itself, but also because human curiosity will likely lead us into many equaly intimidating endeavors."
  critiques:
  - agent: analytical_editor
    text_quote: |-
      The author sugests that studying Venus is a worthy pursuit despite the dangers it presents and supports that when they say, "Striving to meet the challenge presented by Venus has value, not only because of the insight to be gained on the planet itself, but also because human curiosity will likely lead us into many equaly intimidating endeavors."
    span:
    - 0
    - 347
    issue_label: summarizing quote without analytical move
    question: |-
      You've identified what the author says, but where's your analysis of *how* that statement supports the larger claim? What rhetorical move is the author making here—is this an appeal to human nature, a practical justification, a philosophical argument?
    why_it_matters: |-
      The paragraph reads as passive summary rather than active evaluation; you're reporting the evidence but not interpreting its persuasive force.
    fix_suggestion: |-
      Add after the quote: 'Here the author pivots from danger to purpose, arguing that Venus's challenge isn't a drawback but a feature—it trains human ambition for even greater feats. This reframes risk as opportunity, which is the core of the author's persuasive strategy.'
    replacement: null
    severity: medium
- source: 'AES2 (score 2/6): telling not showing, no analysis'
  article: |-
    Luke was also taking a ride in Venice, Italy, a city with streets of water too. He was looking at a lot of things in Greece. His next stop was at China.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      Luke was also taking a ride in Venice, Italy, a city with streets of water too. He was looking at a lot of things in Greece. His next stop was at China.
    span:
    - 0
    - 152
    issue_label: telling not showing, no analysis
    question: |-
      You're listing places Luke visited like a checklist ('Venice... Greece... China') but you're not doing anything with them. What did these places mean to Luke? How did they change him? Right now it's just names on a map.
    why_it_matters: |-
      The essay reads like a travel itinerary, not an argument about Luke's growth or the program's impact.
    fix_suggestion: |-
      Pick one place and develop it: 'When Luke saw the Acropolis in Greece, he realized for the first time that his small-town life had been narrow. He had been looking at ancient history in a textbook; now he was standing in it.' Show the moment; don't just name it.
    replacement: null
    severity: high
- source: 'PERSUADE_2.0 (score 3/6): observation without analysis, misses the point'
  article: |-
    The only difference is that this landform has unusual shadows that make it look like an Egyptian Pharaoh.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      The only difference is that this landform has unusual shadows that make it look like an Egyptian Pharaoh.
    span:
    - 0
    - 105
    issue_label: observation without analysis, misses the point
    question: |-
      You're noting that shadows create an illusion, but you're not *analyzing* why that matters to your argument. This is actually your strongest point—optical illusion explains everything—but you've buried it and left it hanging. Why do shadows fool us? What does this tell us about pareidolia or how our brains interpret familiar shapes? Make the insight explicit.
    why_it_matters: |-
      You've identified the mechanism that kills the alien theory, but you don't unpack it, so the reader doesn't feel the weight of your conclusion.
    fix_suggestion: |-
      Expand: 'The Face is a classic case of pareidolia—our brains' tendency to see familiar patterns, especially faces, in random shapes. The mesa's shadows happen to align in a way that triggers this illusion, which is why it resembled a human face to Viking 1's lower-resolution camera. Higher resolution erases the illusion because it reveals the actual, jagged geological features underneath.'
    replacement: null
    severity: medium
- source: |-
    Feedback_Prize_ELL (score 3.3246998805754875/5): conclusion restates without insight
