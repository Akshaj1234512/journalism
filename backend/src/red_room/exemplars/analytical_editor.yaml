- source: 'AES2 (score 3/6): summary instead of analysis'
  article: |-
    The author gives the reader an experiment to try, which is similar to what the coding system does. After the experiment he then asked, "by the way, did making a happy face in this experiment also make you feel slightly happy?" He then provided information about how just using the coding system could make you happy.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      The author gives the reader an experiment to try, which is similar to what the coding system does. After the experiment he then asked, "by the way, did making a happy face in this experiment also make you feel slightly happy?" He then provided information about how just using the coding system could make you happy.
    span:
    - 0
    - 316
    issue_label: summary instead of analysis
    question: |-
      You're just reporting what the author did—he gave an experiment, he asked a question, he provided information. But *why* does the author include that experiment? What's he trying to persuade the reader to believe by putting that question in? You need to analyze his rhetorical move, not narrate it.
    why_it_matters: |-
      You're not actually using the evidence to build your argument; you're just describing the source material, which makes your essay feel passive and dependent.
    fix_suggestion: |-
      Reframe: 'The author uses a personal experiment to demonstrate that facial expressions aren't just expressions—they *create* emotions. By asking readers to smile and notice their own mood shift, he's proving that FACS could help students by using their body to regulate their emotions, not just reflect them.'
    replacement: null
    severity: medium
- source: 'ASAP-7 (score 17/30): abstract advice, no analysis, placeholder confusion'
  article: |-
    Whether youre a kid or an adult, you must forgive yourself when you do wrong. If you come in late for work, you must brush it off and say to yourself, @CAPS2, dont do it again. @CAPS3 that you forget about everything but what you just said.
  critiques:
  - agent: analytical_editor
    text_quote: |-
      Whether youre a kid or an adult, you must forgive yourself when you do wrong. If you come in late for work, you must brush it off and say to yourself, @CAPS2, dont do it again. @CAPS3 that you forget about everything but what you just said.
