# Exemplars for logic_auditor
# Pulled from real student essays across PERSUADE 2.0, Feedback Prize ELL,
# AES2, ASAP 7+8 (narrative), and ETS GRE Issue + Argument official samples.
# Classified per editor lane via Claude Haiku, then top 15
# selected with a diversity constraint (round-robin across distinct
# sub-issue buckets) so the exemplars cover the lane's full failure-mode
# range rather than 15 variants of the same critique.
#
- source: 'PERSUADE_2.0 (score 3/6): assumption without evidence'
  article: |-
    Most of the students at this school could be doing extra credit instead of going to a game. They can easily ask all their teachers for this simple way to raise their grades. Most of our teachers give extra credit and most of the time it is substantial!
  critiques:
  - agent: logic_auditor
    text_quote: |-
      Most of the students at this school could be doing extra credit instead of going to a game. They can easily ask all their teachers for this simple way to raise their grades. Most of our teachers give extra credit and most of the time it is substantial!
    span:
    - 0
    - 252
    issue_label: assumption without evidence
    question: |-
      You're assuming extra credit is always available and always substantial, but you haven't shown that. Do all teachers offer it? Can all students realistically do it *and* stay on a team? You're treating your hopes as facts.
    why_it_matters: |-
      Your whole argument hinges on the idea that students have easy access to grade recovery—if that's not true, the B-average policy might just lock out struggling students who *do* care about sports and improvement.
    fix_suggestion: |-
      Acknowledge the assumption: 'If teachers continue to offer extra credit and tutoring opportunities, students can raise their grades without losing sports.' Or survey whether extra credit is actually available across departments.
    replacement: null
    severity: high
