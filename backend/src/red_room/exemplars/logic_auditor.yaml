# Exemplars for logic_auditor
# Human-editable. Each list item below is one exemplar.
# To disable an exemplar without deleting it, comment out its lines with #.
# Field order: source, article, critiques (and per critique: agent, text_quote,
# span, issue_label, question, why_it_matters, fix_suggestion, replacement, severity).
#
- source: |-
    Weston, A Rulebook for Arguments, Rule 9: generalize from more than a few examples
  article: |-
    Many critics see Hamlet as fundamentally indecisive. A.C. Bradley, in his 1904 Shakespearean Tragedy, describes the prince as 'paralysed by reflection.'
  critiques:
  - agent: logic_auditor
    text_quote: Many critics see Hamlet as fundamentally indecisive.
    span: [0, 52]
    issue_label: one example, sweeping claim
    question: |-
      You quote one critic (Bradley) to support 'many critics.' One example does not warrant a generalization. The 'many' is doing rhetorical work the evidence does not earn.
    why_it_matters: |-
      A claim about consensus that rests on a single source is not a claim about consensus.
    fix_suggestion: |-
      Either narrow the claim to 'Bradley reads Hamlet as fundamentally indecisive,' or cite two or three other critics across different periods who hold the same view.
    replacement: Bradley reads Hamlet as fundamentally indecisive.
    severity: medium
- source: 'Hurley, A Concise Introduction to Logic: post hoc reasoning'
  article: |-
    After the Treaty of Versailles in 1919, German nationalism rose sharply through the 1920s. The treaty therefore caused the rise of National Socialism.
  critiques:
  - agent: logic_auditor
    text_quote: The treaty therefore caused the rise of National Socialism.
    span: [91, 150]
    issue_label: sequence read as cause
    question: |-
      The treaty came first; the nationalism rose afterward. The argument reads that order as a causal mechanism. Sequence is not causation, and you have not shown the mechanism (reparations economics, war-guilt clause, occupation of the Ruhr) that would close the gap.
    why_it_matters: |-
      Sequence dressed as cause is one of the most easily challenged moves in a history paper.
    fix_suggestion: |-
      Either show the mechanism that links treaty to outcome, or weaken the verb to 'shaped' or 'contributed to' and identify the specific clause or consequence you mean.
    replacement: |-
      The treaty's war-guilt clause and reparations regime contributed to the rise of National Socialism.
    severity: high
- source: 'Weston, A Rulebook for Arguments, Rule 11: avoid false dilemmas'
  article: |-
    Either Reconstruction was a moral triumph that the South ungratefully rejected, or it was a Northern occupation that failed on its own terms.
  critiques:
  - agent: logic_auditor
    text_quote: |-
      Either Reconstruction was a moral triumph that the South ungratefully rejected, or it was a Northern occupation that failed on its own terms.
    span: [0, 141]
    issue_label: false dichotomy
    question: |-
      These are not the only two options. Eric Foner's reading (Reconstruction as a serious, partly successful experiment in interracial democracy that was rolled back by violence and federal abandonment) is the standard third position and the strongest one to engage.
    why_it_matters: |-
      Framing the question as two extremes forecloses the analysis that would actually answer it.
    fix_suggestion: |-
      Rewrite to name at least three positions, or argue against the strongest available reading (Foner's) rather than against the two weakest.
    replacement: null
    severity: high
- source: 'Mill, On Liberty, Chapter 2: steel-man the opposing view'
  article: |-
    Defenders of the war argue that it was necessary because the regime was evil. This is obviously wrong because regimes the United States has tolerated have also been evil.
  critiques:
  - agent: logic_auditor
    text_quote: Defenders of the war argue that it was necessary because the regime
      was evil.
    span: [0, 77]
    issue_label: straw counter
    question: |-
      No serious defender of the war argued from 'the regime was evil' as the load-bearing premise. The strongest defenses turned on WMD intelligence and on regional containment. Argue against the strongest version, not the weakest.
    why_it_matters: |-
      Defeating the weak version leaves the strong version untouched and the reader unconvinced.
    fix_suggestion: |-
      Replace this counter with the strongest available defense (intelligence assessments at the time, regional containment doctrine), then argue against it.
    replacement: null
    severity: high
- source: 'Aristotle, Rhetoric: the hidden premise (the enthymeme)'
  article: |-
    The play's anti-feminist message is clear because Shakespeare consistently portrays women negatively.
  critiques:
  - agent: logic_auditor
    text_quote: |-
      The play's anti-feminist message is clear because Shakespeare consistently portrays women negatively.
    span: [0, 101]
    issue_label: premise contains conclusion
    question: |-
      The 'anti-feminist message' is what the essay is supposed to be arguing. The premise ('Shakespeare portrays women negatively') already assumes the reading. When the premise smuggles the conclusion in, the argument moves in a circle.
    why_it_matters: |-
      An argument that assumes what it tries to prove does no work the reader has to follow.
    fix_suggestion: |-
      Either argue first that the portrayals are negative (with specific evidence the reader could contest), then derive the message from that, or rewrite the premise so it is something a reasonable reader could grant without already agreeing with you.
    replacement: null
    severity: high
- source: Williams, Style, on key terms that shift meaning
  article: |-
    Lady Macbeth's power over her husband is the engine of the play's first half. By the sleepwalking scene, that power has collapsed, and the audience sees her as a woman the king's power has destroyed.
  critiques:
  - agent: logic_auditor
    text_quote: the king's power has destroyed
    span: [168, 198]
    issue_label: key term shifts meaning
    question: |-
      'Power' in your first sentence means personal influence over Macbeth. 'Power' in your second sentence means political and gendered subjection. The argument treats them as one term doing the same work, which conceals the move you are making.
    why_it_matters: |-
      When a key term shifts under the argument, the conclusion seems to follow but does not.
    fix_suggestion: |-
      Either use two different words for the two ideas (e.g. 'influence' and 'authority'), or name the shift explicitly: 'her personal influence collapses in proportion as the play's political order reasserts itself.'
    replacement: null
    severity: medium
- source: 'Standard writing-center diagnostic: wrong-domain authority'
  article: As Freud noted, capitalism alienates the worker from the product of his
    labour.
  critiques:
  - agent: logic_auditor
    text_quote: As Freud noted, capitalism alienates the worker from the product of
      his labour.
    span: [0, 79]
    issue_label: wrong-domain attribution
    question: |-
      Freud did not write that. Marx did, in the 1844 Manuscripts. Even setting attribution aside: Freud is not the authority on the labour theory of alienation. Wrong author and wrong domain in one sentence.
    why_it_matters: A wrong-domain citation is the easiest line for a grader or critic
      to discredit.
    fix_suggestion: |-
      Attribute the claim to Marx (1844 Manuscripts), or, if you mean a related Freudian idea (the analyst's reading of alienation as a psychic process), name that claim instead.
    replacement: |-
      As Marx argued in the 1844 Manuscripts, capitalism alienates the worker from the product of his labour.
    severity: high
- source: 'Weston, A Rulebook for Arguments: scope and counterexamples'
  article: |-
    Every reader of Pride and Prejudice recognises that Mr. Darcy's first proposal is humiliating to Elizabeth.
  critiques:
  - agent: logic_auditor
    text_quote: |-
      Every reader of Pride and Prejudice recognises that Mr. Darcy's first proposal is humiliating to Elizabeth.
    span: [0, 107]
    issue_label: sweeping claim without scope
    question: |-
      'Every reader' is the widest scope the language allows. A counterexample exists almost anywhere a real essay looks: at least one reading tradition emphasises the proposal scene as awkward sincerity rather than insult. A claim at maximum scope invites a counterexample at minimum cost.
    why_it_matters: |-
      Universal claims are easiest to falsify, which makes them the weakest form of a real argument.
    fix_suggestion: |-
      Narrow the scope to a defensible level: 'Most twentieth-century readings,' or 'the dominant reading in feminist criticism since Gilbert and Gubar,' or simply 'I read this scene as.'
    replacement: |-
      Most readers since Gilbert and Gubar have read Mr. Darcy's first proposal as humiliating to Elizabeth.
    severity: medium
- source: 'They Say / I Say, Chapter 6: planting a naysayer'
  article: |-
    This essay argues that Lady Macbeth is the play's true villain, the figure whose ambition sets the murders in motion and whose collapse arrives only after she has already wrecked the kingdom. Across five sections I trace her speeches, her appeals to her husband, and the staging conventions that frame her in shadow.
  critiques:
  - agent: logic_auditor
    text_quote: |-
      This essay argues that Lady Macbeth is the play's true villain, the figure whose ambition sets the murders in motion and whose collapse arrives only after she has already wrecked the kingdom.
    span: [0, 191]
    issue_label: no naysayer for a contested thesis
    question: |-
      Your thesis is a contested reading and you let no opposing voice into the essay. Janet Adelman's Suffocating Mothers reads Lady Macbeth's ambition as a forced masculine performance the play punishes more harshly than her husband's. A reader who took that reading seriously is who you have to convince.
    why_it_matters: |-
      Without the strongest opposing reading on the page, the essay never argues against the position it most needs to defeat.
    fix_suggestion: |-
      Add a paragraph that names the Adelman reading at its strongest, then argues against it. Concede what is right about it; show why your reading still holds.
    replacement: null
    severity: high
- source: 'They Say / I Say, Chapter 6: avoid the empty rebuttal'
  article: |-
    While some might disagree, the evidence is clear that the Glass-Steagall repeal in 1999 was the direct cause of the 2008 financial crisis.
  critiques:
  - agent: logic_auditor
    text_quote: While some might disagree, the evidence is clear that
    span: [0, 53]
    issue_label: hand-wave rebuttal
    question: |-
      'While some might disagree' followed by 'the evidence is clear' asserts a rebuttal without arguing one. The strongest critics of this causal story (Calomiris, Admati, the Financial Crisis Inquiry Commission's own dissent) argue that securitisation, capital requirements, and shadow banking were the mechanisms; Glass-Steagall is at most one factor. Your sentence does not engage them.
    why_it_matters: Asserting that the evidence is clear is not the same as showing
      it is.
    fix_suggestion: |-
      Either cite which evidence settles the question and acknowledge the strongest competing accounts (FCIC majority vs. Dissent, for example), or weaken the verb to 'contributed to' and treat the causation as a live question.
    replacement: null
    severity: medium
- source: 'Standard writing-center diagnostic: concession without integration'
  article: |-
    Admittedly, the New Deal did not end the Great Depression; wartime spending did. Nevertheless, the New Deal saved American capitalism.
  critiques:
  - agent: logic_auditor
    text_quote: |-
      Admittedly, the New Deal did not end the Great Depression; wartime spending did. Nevertheless, the New Deal saved American capitalism.
    span: [0, 134]
    issue_label: concession not integrated
    question: |-
      You concede the most damaging point (the New Deal did not end the Depression) and then proceed as if the concession had no consequences. If wartime spending did the heavy lifting, what work is the 'saved capitalism' thesis still doing? The concession needs to reshape the claim, not just sit beside it.
    why_it_matters: A concession that is not integrated reads as a checkbox, not an
      argument.
    fix_suggestion: |-
      Either narrow the thesis to what the concession leaves intact ('the New Deal stabilised the financial system and the political coalition that won the war'), or take the concession seriously and abandon the broader claim.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: false unity'
  article: Feminist critics argue that the novel reinforces patriarchal norms.
  critiques:
  - agent: logic_auditor
    text_quote: Feminist critics argue that the novel reinforces patriarchal norms.
    span: [0, 67]
    issue_label: false unity in the opposing camp
    question: |-
      'Feminist critics' is not one position. Gilbert and Gubar, bell hooks, and Judith Butler would read this novel in three different ways, and at least one of them would side with you. Flattening the camp into one voice hides the disagreements you could be using.
    why_it_matters: |-
      Treating a divided opposing camp as a monolith makes the rebuttal too easy and the engagement too shallow.
    fix_suggestion: |-
      Name the specific critic or tradition (e.g. 'second-wave readings since Gilbert and Gubar') and identify a counter-reading inside the same broad tradition that supports your claim.
    replacement: |-
      Second-wave readings since Gilbert and Gubar argue that the novel reinforces patriarchal norms.
    severity: medium
