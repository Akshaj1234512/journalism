# Exemplars for research_editor
# Human-editable. Each list item below is one exemplar.
# To disable an exemplar without deleting it, comment out its lines with #.
# Field order: source, article, critiques (and per critique: agent, text_quote,
# span, issue_label, question, why_it_matters, fix_suggestion, replacement, severity).
#
- source: 'Joseph Bizup, BEAM: sources used as Background, Exhibit, Argument, or Method'
  article: |-
    Smith (2019) argues that minimum-wage increases have small employment effects. In the next section, Jones (2021) finds that minimum-wage increases reduce employment substantially. In a third study, Brown (2017) finds mixed results depending on the local economy.
  critiques:
  - agent: research_editor
    text_quote: |-
      Smith (2019) argues that minimum-wage increases have small employment effects. In the next section, Jones (2021) finds that minimum-wage increases reduce employment substantially. In a third study, Brown (2017) finds mixed results depending on the local economy.
    span: [0, 262]
    issue_label: source-by-source summary, no synthesis
    question: |-
      Three sources, three paragraphs, no conversation. The body of a research paper has to do more than summarize sources sequentially. Smith and Jones directly contradict each other; that contradiction is the analytical opportunity. Brown is the synthesis Jones and Smith both have to confront. The essay treats them as three separate testimonies instead of as a conversation.
    why_it_matters: |-
      Source-by-source layout is a bibliography in essay form; the reader gets summaries, not a research contribution.
    fix_suggestion: |-
      Rewrite as a conversation: 'Smith and Jones reach opposite conclusions on the same question, and Brown's local-economy finding is the most likely reconciler. Here is why.' Sources stop being paragraphs and start being voices.
    replacement: null
    severity: high
- source: 'Booth, Colomb & Williams, The Craft of Research: the writer''s contribution'
  article: |-
    Several studies have examined the relationship between social media use and adolescent depression. Twenge (2017) finds a strong correlation. Orben and Przybylski (2019) find that the effect is small. Haidt (2024) argues that the effect is real and consequential. In conclusion, the relationship between social media and depression is complex.
  critiques:
  - agent: research_editor
    text_quote: In conclusion, the relationship between social media and depression
      is complex.
    span: [263, 342]
    issue_label: no writer's contribution
    question: |-
      The essay reports the conversation faithfully and contributes nothing. A research paper has to add a claim, a synthesis, a complication, a way of weighing the sources against each other. 'Complex' is what the field already says; if you stop there, you have summarized without entering. What do you think reconciles Twenge and Orben? Where does Haidt's mechanism account go further than the others, or fall short?
    why_it_matters: |-
      Reporting the disagreement without entering it leaves the essay as a literature review, not a research argument.
    fix_suggestion: |-
      Take a position on the synthesis. 'The Orben smallness finding is on average effects; Twenge's and Haidt's claims are about distribution effects on heavy users. The disagreement is partly an artifact of which mean is being measured.' Even a partial synthesis counts as a contribution.
    replacement: null
    severity: high
- source: 'They Say / I Say, Chapter 4: the art of quoting'
  article: |-
    According to the World Health Organization, 'Mental health is a state of mental well-being that enables people to cope with the stresses of life, realize their abilities, learn well and work well, and contribute to their community. It is an integral component of health and well-being that underpins our individual and collective abilities to make decisions, build relationships and shape the world we live in. Mental health is a basic human right.'
  critiques:
  - agent: research_editor
    text_quote: |-
      'Mental health is a state of mental well-being that enables people to cope with the stresses of life, realize their abilities, learn well and work well, and contribute to their community. It is an integral component of health and well-being that underpins our individual and collective abilities to make decisions, build relationships and shape the world we live in. Mental health is a basic human right.'
    span: [44, 449]
    issue_label: quote density, no integration
    question: |-
      Eighty-eight words of block quote with no follow-up that does anything with it. A quote is the start of the writer's analytical move, not its replacement. The WHO definition is doing 100% of the work in this paragraph; the writer's voice is absent.
    why_it_matters: |-
      Long unintegrated quotes hand the analytical work to the source; the writer's contribution disappears.
    fix_suggestion: |-
      Cut the quote to the load-bearing clause ('a basic human right'), then spend the rest of the paragraph in your own voice, arguing what follows from that framing for the policy question the paper is engaging.
    replacement: null
    severity: medium
- source: 'Booth, Colomb & Williams, The Craft of Research: the cherry-pick'
  article: |-
    Multiple studies confirm that homeschooling produces strong academic outcomes. Smith (2018), Jones (2019), and Brown (2020) all find that homeschooled students score above the national average on standardized tests. The evidence is clear.
  critiques:
  - agent: research_editor
    text_quote: Multiple studies confirm that homeschooling produces strong academic
      outcomes.
    span: [0, 78]
    issue_label: cherry-picked sources
    question: |-
      Three sources cited, all supporting the same conclusion, all from advocacy-adjacent journals. The strongest research engages the strongest contrary source on the question. The Coalition for Responsible Home Education has critiqued the selection-bias problem in the literature you cite; Lubienski's peer-reviewed work argues the comparison is not apples-to-apples. The essay reads only the friendly half of the field.
    why_it_matters: |-
      A cherry-picked source base looks confident on first read and dissolves the moment a reader checks the field.
    fix_suggestion: |-
      Add the strongest contrary source (Lubienski is the obvious one), engage its critique on the selection-bias issue, then make your synthesis. The argument is stronger when it survives the best counter.
    replacement: null
    severity: high
- source: 'Bizup, BEAM: wrong source type for the claim'
  article: |-
    Studies have shown that meditation can rewire the brain to reduce anxiety. According to a 2023 Forbes article, regular meditation practice produces measurable neuroplastic changes in the prefrontal cortex.
  critiques:
  - agent: research_editor
    text_quote: |-
      According to a 2023 Forbes article, regular meditation practice produces measurable neuroplastic changes in the prefrontal cortex.
    span: [75, 205]
    issue_label: wrong source type for technical claim
    question: |-
      A claim about measurable neuroplastic changes in the prefrontal cortex needs the peer-reviewed neuroscience literature (Davidson, Hölzel, the original MBSR fMRI studies) cited directly, not a Forbes article reporting on them. The source's role has to match the weight of the claim. A popular-press source as the citation for a technical neuroscience finding will be the first thing a reviewer flags.
    why_it_matters: |-
      Wrong source type for the claim is the single fastest way to lose credibility in a research paper.
    fix_suggestion: |-
      Replace the Forbes citation with the underlying study (Hölzel et al. 2011 in Social Cognitive and Affective Neuroscience is the standard one). Use Forbes only if your claim is about public coverage of the science, not about the science itself.
    replacement: null
    severity: high
- source: 'Standard writing-center diagnostic: the writer''s voice disappears'
  article: |-
    As Smith (2018) argues, the policy has been ineffective. Jones (2019) writes that the policy was poorly designed from the start. Brown (2021) notes that the implementation failed. Wilson (2022) concludes that the policy should be repealed.
  critiques:
  - agent: research_editor
    text_quote: |-
      As Smith (2018) argues, the policy has been ineffective. Jones (2019) writes that the policy was poorly designed from the start. Brown (2021) notes that the implementation failed. Wilson (2022) concludes that the policy should be repealed.
    span: [0, 239]
    issue_label: writer's voice missing
    question: |-
      Four sources, four sentences, no writer. The reader cannot tell what you think, what synthesis you are drawing, or what the four sources together support that no one of them does alone. The paragraph is ventriloquism.
    why_it_matters: |-
      When the writer's voice disappears, the paper reads as a source-list, not a research argument.
    fix_suggestion: |-
      Add the synthesizing voice: 'Smith, Jones, Brown, and Wilson all converge on a failure diagnosis, but they disagree on whether the failure was design or implementation. That distinction matters for what should follow.' Your job is the conversation among them.
    replacement: null
    severity: medium
- source: They Say / I Say, on signal phrases that do work
  article: |-
    Studies show that climate change is real (Smith, 2020; Jones, 2018; Brown, 2019; Wilson, 2021; Davis, 2022).
  critiques:
  - agent: research_editor
    text_quote: (Smith, 2020; Jones, 2018; Brown, 2019; Wilson, 2021; Davis, 2022)
    span: [41, 107]
    issue_label: citation thicket
    question: |-
      Five citations on one claim with no signal phrase that points the reader to which source actually grounds it. A reader who wants to check the claim cannot tell whether to read Smith, Davis, or all five. A citation has to lead the reader to a specific source they could verify.
    why_it_matters: |-
      Citation thickets feel rigorous and are actually unrigorous: the reader cannot verify anything.
    fix_suggestion: |-
      Pick the one most authoritative source as the load-bearing citation, mention it by name in the signal phrase, and use the others sparingly: 'The 2023 IPCC Synthesis Report (Lee et al.) Is the standard summary of the evidence.' Save the others for places where their specific contribution is what is being cited.
    replacement: (Lee et al., 2023, IPCC Synthesis Report)
    severity: medium
- source: 'Bizup, BEAM: sources used as Background where they should be Exhibit'
  article: |-
    The civil rights movement was a pivotal moment in American history (Branch, 1988). It transformed American politics (Garrow, 1986).
  critiques:
  - agent: research_editor
    text_quote: |-
      The civil rights movement was a pivotal moment in American history (Branch, 1988). It transformed American politics (Garrow, 1986).
    span: [0, 131]
    issue_label: sources as Background only, never Exhibit
    question: |-
      Branch's Parting the Waters and Garrow's Bearing the Cross are foundational works in the field, and you are citing them only as Background ('it was pivotal,' 'it transformed politics'). A research paper opens sources up as Exhibit, reading what they actually argue, not just naming them as authorities for uncontroversial claims. What does Branch's narrative reveal that Garrow's does not? Where do their interpretations of King differ?
    why_it_matters: |-
      Sources cited only as Background are decoration; the analytical work the paper could do with them is missed.
    fix_suggestion: |-
      Open one of them as Exhibit. Quote Branch's reading of a specific moment, then put Garrow next to it. The sources start doing work for the argument instead of dressing it.
    replacement: null
    severity: medium
- source: 'Standard writing-center diagnostic: synthesis confused with summary of
    synthesis'
  article: |-
    There is significant scholarly disagreement about the causes of the 1929 stock market crash. Some scholars emphasize monetary policy; others emphasize structural weaknesses in the banking system; still others emphasize speculation. Many causes are involved.
  critiques:
  - agent: research_editor
    text_quote: |-
      There is significant scholarly disagreement about the causes of the 1929 stock market crash. Some scholars emphasize monetary policy; others emphasize structural weaknesses in the banking system; still others emphasize speculation. Many causes are involved.
    span: [0, 257]
    issue_label: report of disagreement, no synthesis
    question: |-
      You name three positions and report that scholars disagree. Reporting the existence of a disagreement is not synthesis; synthesis is entering the disagreement. Friedman and Schwartz's monetary account, Galbraith's speculation account, and Bernanke's banking-fragility account differ on what mattered most and what would have prevented the crash. Take a position on which one carries the most weight, given what you know.
    why_it_matters: |-
      Reporting that scholars disagree, without engaging the disagreement, leaves the essay as a literature survey.
    fix_suggestion: |-
      Pick the position you find most persuasive (Bernanke's bank-balance-sheet account is the strongest in modern scholarship), say why, and acknowledge what Friedman's and Galbraith's accounts add that yours has to reckon with.
    replacement: null
    severity: medium
- source: 'Standard writing-center diagnostic: source-by-source becomes the structure'
  article: |-
    Section II: Smith's Argument. Smith argues that... Section III: Jones's Response. Jones responds that... Section IV: Brown's Synthesis. Brown synthesizes by...
  critiques:
  - agent: research_editor
    text_quote: |-
      Section II: Smith's Argument. Smith argues that... Section III: Jones's Response. Jones responds that... Section IV: Brown's Synthesis. Brown synthesizes by...
    span: [0, 159]
    issue_label: structure is source-by-source
    question: |-
      The structure of the paper itself is source-by-source. That is a literature-review structure, not a research-essay structure. A research essay organizes by question or by claim, then brings sources in where they speak to the question. Reorganize around the moves the paper is making, not around the sources it consults.
    why_it_matters: |-
      When the structure is source-by-source, the synthesis has nowhere to live because every paragraph is owned by a single source.
    fix_suggestion: |-
      Reorganize around the analytical questions: 'What is the disagreement?' 'What evidence is on each side?' 'What does the strongest synthesis look like?' Bring Smith, Jones, and Brown into each section where they have something to say. Sections become moves, not source-summaries.
    replacement: null
    severity: high
